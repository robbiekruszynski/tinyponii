function bindBtn(id,dn,up){
  const el=document.getElementById(id);if(!el)return;
  const pd=e=>e.preventDefault();
  el.addEventListener('touchstart',e=>{pd(e);dn();},{passive:false});
  el.addEventListener('touchend',  e=>{pd(e);up();},{passive:false});
  el.addEventListener('touchcancel',e=>{pd(e);up();},{passive:false});
  el.addEventListener('mousedown',dn); el.addEventListener('mouseup',up); el.addEventListener('mouseleave',up);
}

// ============================================================
// TILE HELPERS
// ============================================================
function extTile(col,row){
  if(col<0||col>=ECOLS||row<0||row>=EROWS)return T_VOID;
  return EXT_MAP[row][col];
}
function caveTile(col,row){
  if(col<0||col>=CCOLS||row<0||row>=CROWS)return T_CAVE_W;
  return CAVE_MAP[row][col];
}
function canStepExt(x,y){
  const pts=[[x+2,y+2],[x+16,y+2],[x+2,y+20],[x+16,y+20]];
  return pts.every(([px,py])=>EXT_WALK.has(extTile(Math.floor(px/TILE),Math.floor(py/TILE))));
}
function canStepCave(x,y){
  const pts=[[x+2,y+2],[x+16,y+2],[x+2,y+20],[x+16,y+20]];
  return pts.every(([px,py])=>CAVE_WALK.has(caveTile(Math.floor(px/TILE),Math.floor(py/TILE))));
}
function canStepInd(x,y){
  return x>=60&&x+18<=580&&y>=60&&y+22<=390;
}

// 6. EXTERIOR MAP DRAWING  (with camera)
// ============================================================
function updateCamera(){
  G.camX=Math.max(0,Math.min(Math.floor(G.mx+9-W/2),(ECOLS-20)*TILE));
  G.camY=Math.max(0,Math.min(Math.floor(G.my+11-H/2),(EROWS-15)*TILE));
}

function drawExtTile(col,row){
  const sx=col*TILE-G.camX, sy=row*TILE-G.camY;
  if(sx>W||sx<-TILE||sy>H||sy<-TILE)return;
  const t=EXT_MAP[row][col];
  switch(t){
    case T_VOID:
      r(sx,sy,TILE,TILE,C.void); break;
    case T_SIDE:
      r(sx,sy,TILE,TILE,C.side);
      r(sx,sy,1,TILE,C.sideL); r(sx,sy,TILE,1,C.sideL);
      r(sx+TILE-1,sy,1,TILE,C.sideD); r(sx,sy+TILE-1,TILE,1,C.sideD);
      break;
    case T_GRASS:
      r(sx,sy,TILE,TILE,C.grass);
      r(sx+3,sy+3,10,10,C.grassL); r(sx+18,sy+16,10,10,C.grassL);
      break;
    case T_WATER:
      r(sx,sy,TILE,TILE,C.water);
      r(sx+4,sy+6,TILE-8,4,C.waterL);
      r(sx+2,sy+16,TILE-4,4,'rgba(255,255,255,0.15)');
      break;
    case T_APT:
      r(sx,sy,TILE,TILE,C.apt);
      r(sx+2,sy+2,TILE-4,TILE-4,C.aptW);
      r(sx+4,sy+4,10,8,C.aptL); r(sx+18,sy+4,10,8,C.aptL);
      r(sx+4,sy+18,10,8,C.aptL); r(sx+18,sy+18,10,8,C.aptL);
      break;
    case T_HOUSE:
      r(sx,sy,TILE,TILE,C.house);
      r(sx+2,sy+2,TILE-4,TILE-4,C.houseR);
      // Curved roof hint on top row (house now at rows 11-13)
      if(row===11){
        r(sx,sy,TILE,8,C.houseRoof);
        r(sx+4,sy+2,TILE-8,6,'#e07050');
      }
      // Lantern glow when farewell needed
      if(G.hasBoarding&&!G.farewellDone&&row===12){
        const lg=Math.floor(G.tick/10)%6; const lgoff=lg<3?lg:5-lg;
        r(sx+13,sy+2+lgoff,6,6,'#f8c060');
      }
      // Window
      r(sx+6,sy+8,8,8,'#f8d898');
      r(sx+18,sy+8,8,8,'#f8d898');
      break;
    case T_CAFE:
      r(sx,sy,TILE,TILE,C.cafe);
      r(sx+1,sy+1,TILE-2,TILE-2,C.cafeWall);
      // "NO TITLE" signage hint on top tiles (cafe now at rows 2-4)
      if(row===2){
        r(sx,sy,TILE,8,C.cafeD);
        ctx.fillStyle=C.white; ctx.font='7px monospace';
        if(col===5) ctx.fillText('NO TITLE',sx+2,sy+7);
      }
      r(sx+4,sy+8,TILE-8,TILE-14,'#c8d8e8');
      break;
    case T_CAVE_W:
      r(sx,sy,TILE,TILE,C.cave);
      r(sx+2,sy+2,TILE-4,TILE-4,C.caveL);
      r(sx+6,sy+6,8,8,C.caveDk); r(sx+20,sy+16,8,8,C.caveDk);
      // Stalagmite-ish on top rows
      if(row<=2){r(sx+12,sy,6,TILE/2,C.caveDk);}
      break;
    case T_APT_D:
      r(sx,sy,TILE,TILE,C.side);
      r(sx+8,sy+2,TILE-16,TILE-4,C.aptW);
      r(sx+10,sy+4,TILE-20,TILE-12,'#5a7898');
      break;
    case T_HOUSE_D:
      r(sx,sy,TILE,TILE,C.grass);
      r(sx+8,sy+2,TILE-16,TILE-4,C.houseRoof);
      r(sx+10,sy+4,TILE-20,TILE-12,'#f8c080');
      break;
    case T_CAFE_D:
      r(sx,sy,TILE,TILE,C.side);
      r(sx+8,sy+2,TILE-16,TILE-4,C.cafeD);
      r(sx+10,sy+4,TILE-20,TILE-12,'#8ab8d8');
      break;
    case T_CAVE_E: {
      r(sx,sy,TILE,TILE,C.side);
      r(sx+4,sy+2,TILE-8,TILE-2,C.caveDk);
      r(sx+8,sy+6,TILE-16,TILE-10,'#0a0a0a');
      // Glow if all cleared
      if(G.cleared.every(v=>v)){
        r(sx+8,sy+6,TILE-16,TILE-10,'rgba(200,180,80,0.15)');
      }
      break;
    }
    case T_ENC1: case T_ENC2: {
      const id=t-T_ENC1;
      const done=G.cleared[id];
      r(sx,sy,TILE,TILE,done?C.side:C.enc);
      r(sx,sy,1,TILE,C.sideL); r(sx,sy,TILE,1,C.sideL);
      if(!done){
        const sa=Math.floor(G.tick/12)%4;
        r(sx+13,sy+2+sa,4,4,C.encG);
        r(sx+14,sy+2,2,8,C.encG);
      }
      break;
    }
    case T_TAXI: {
      const ok=G.hasBoarding&&G.farewellDone;
      r(sx,sy,TILE,TILE,C.side);
      r(sx,sy,1,TILE,C.sideL);
      if(ok){
        r(sx+3,sy+8,26,14,C.taxi);
        r(sx+7,sy+10,18,8,C.taxiD);
        r(sx+3,sy+20,6,5,'#1a1818'); r(sx+23,sy+20,6,5,'#1a1818');
        const ab=Math.floor(G.tick/8)%6,aoff=ab<3?ab:5-ab;
        r(sx+12+aoff,sy+2,4,4,C.encG);
      } else {
        // Taxi hint only if boarding acquired
        if(G.hasBoarding&&!G.farewellDone){
          ctx.fillStyle='rgba(200,160,80,0.4)';
          ctx.font='8px monospace';ctx.textAlign='center';
          ctx.fillText('?',sx+TILE/2,sy+TILE/2+4);
          ctx.textAlign='left';
        }
      }
      break;
    }
  }
}

const CAVE_DRAW_OFFSET_Y = 20; // shift cave down a bit, leaving room for HUD

function drawCaveMap(){
  r(0,0,W,H,C.caveDk);
  for(let row=0;row<CROWS;row++){
    for(let col=0;col<CCOLS;col++){
      const t=CAVE_MAP[row][col];
      const x=col*TILE, y=row*TILE+CAVE_DRAW_OFFSET_Y;
      switch(t){
        case T_CAVE_W:
          r(x,y,TILE,TILE,C.cave);
          r(x+2,y+2,TILE-4,TILE-4,C.caveL);
          if(row<2)r(x+8,y,6,TILE/2,C.caveDk);
          break;
        case T_CF:
          r(x,y,TILE,TILE,C.caveF);
          r(x,y,TILE,1,C.caveFL); r(x,y,1,TILE,C.caveFL);
          break;
        case T_CEXIT:
          r(x,y,TILE,TILE,C.caveF);
          r(x,y,4,TILE,'rgba(180,220,80,0.2)'); // subtle exit glow
          break;
        case T_CENC:
          if(!G.cleared[2]){
            r(x,y,TILE,TILE,C.enc);
            const sa=Math.floor(G.tick/12)%4;
            r(x+13,y+2+sa,4,4,C.encG); r(x+14,y+2,2,8,C.encG);
          } else {
            r(x,y,TILE,TILE,C.caveF);
          }
          break;
        case T_BOARD:
          r(x,y,TILE,TILE,C.caveF);
          if(G.cleared[2]&&!G.hasBoarding){
            const glow=Math.sin(G.tick*0.1)*0.3+0.7;
            ctx.fillStyle=`rgba(240,220,80,${glow})`;
            ctx.fillRect(x+6,y+8,20,14);
            r(x+8,y+10,16,10,'#f8f0c0');
            ctx.fillStyle='#a08000';ctx.font='7px monospace';
            ctx.fillText('BCN',x+9,y+18);
          }
          break;
      }
    }
  }
  // Torch flicker effects
  const tf=Math.sin(G.tick*0.15)*8;
  ctx.fillStyle=`rgba(240,140,40,${0.12+tf*0.005})`;
  ctx.fillRect(2*TILE,4*TILE+CAVE_DRAW_OFFSET_Y-8,TILE,TILE);
  ctx.fillStyle=`rgba(240,140,40,${0.10+tf*0.004})`;
  ctx.fillRect(10*TILE,3*TILE+CAVE_DRAW_OFFSET_Y-8,TILE,TILE);
}

// ============================================================
// MOVEMENT HELPERS
// ============================================================
function moveExt(dx,dy,dt){
  if(!dx&&!dy)return;
  const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;
  const nx=G.mx+dx*SPEED*dt, ny=G.my+dy*SPEED*dt;
  if(canStepExt(nx,G.my))G.mx=nx;
  if(canStepExt(G.mx,ny))G.my=ny;
  G.mx=Math.max(TILE+1,Math.min(G.mx,(ECOLS-2)*TILE-19));
  G.my=Math.max(TILE+1,Math.min(G.my,(EROWS-2)*TILE-23));
  if(Math.abs(dx)>Math.abs(dy)){
    G.facing=dx>0?'right':'left';
  } else {
    G.facing=dy>0?'down':'up';
  }
}
function moveCave(dx,dy,dt){
  if(!dx&&!dy)return;
  const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;
  const nx=G.caveX+dx*SPEED*dt, ny=G.caveY+dy*SPEED*dt;
  if(canStepCave(nx,G.caveY))G.caveX=nx;
  if(canStepCave(G.caveX,ny))G.caveY=ny;
  G.caveX=Math.max(0,Math.min(G.caveX,(CCOLS-1)*TILE-19));
  G.caveY=Math.max(0,Math.min(G.caveY,(CROWS-1)*TILE-23));
  if(Math.abs(dx)>Math.abs(dy)){
    G.facing=dx>0?'right':'left';
  } else {
    G.facing=dy>0?'down':'up';
  }
}
function moveInd(dx,dy,dt){
  if(!dx&&!dy)return;
  const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;
  const nx=G.indX+dx*SPEED*dt, ny=G.indY+dy*SPEED*dt;
  if(canStepInd(nx,G.indY))G.indX=nx;
  if(canStepInd(G.indX,ny))G.indY=ny;
  if(Math.abs(dx)>Math.abs(dy)){
    G.facing=dx>0?'right':'left';
  } else {
    G.facing=dy>0?'down':'up';
  }
}

function checkExtSpecial(aPressed){
  const cx=G.mx+9, cy=G.my+11;
  const col=Math.floor(cx/TILE), row=Math.floor(cy/TILE);
  const t=extTile(col,row);
  // Auto-triggers (step-on)
  if(t===T_ENC1&&!G.cleared[0])return{type:'enc',id:0};
  if(t===T_ENC2&&!G.cleared[1])return{type:'enc',id:1};
  if(t===T_CAVE_E) return{type:'cave'};
  if(t===T_TAXI&&G.hasBoarding&&G.farewellDone)return{type:'airport'};
  // Buildings require A-press to enter
  if(aPressed){
    if(t===T_HOUSE_D)return{type:'indoor',loc:'house'};
    if(t===T_CAFE_D) return{type:'indoor',loc:'cafe'};
  }
  // Show prompt when standing on a door
  if(t===T_HOUSE_D||t===T_CAFE_D)return{type:'door_prompt'};
  return null;
}
function checkCaveSpecial(){
  const cx=G.caveX+9, cy=G.caveY+11;
  const col=Math.floor(cx/TILE), row=Math.floor(cy/TILE);
  const t=caveTile(col,row);
  if(t===T_CENC&&!G.cleared[2])return{type:'enc',id:2};
  if(t===T_BOARD&&G.cleared[2]&&!G.hasBoarding&&!G.boardingPickup)return{type:'boarding'};
  if(t===T_CEXIT)return{type:'exit'};
  return null;
}

// ============================================================
// 10. STATE MACHINE & GAME LOOP
// ============================================================
function getInput(){
  let dx=0,dy=0;
  if(G.keys['ArrowLeft']||G.keys['a'])dx-=1;
  if(G.keys['ArrowRight']||G.keys['d'])dx+=1;
  if(G.keys['ArrowUp']||G.keys['w'])dy-=1;
  if(G.keys['ArrowDown']||G.keys['s'])dy+=1;
  dx+=G.tdir.x; dy+=G.tdir.y;
  return{dx:Math.max(-1,Math.min(1,dx)),dy:Math.max(-1,Math.min(1,dy))};
}

let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;G.tick++;
  ctx.clearRect(0,0,W,H);
  const {dx,dy}=getInput();

  // ── TITLE ──
  if(G.mode==='TITLE'){
    drawTitle();
    if(G.aBtn){G.aBtn=false;G.mode='INTRO';flashScreen();}
  }

  // ── INTRO (bedroom cutscene) ──
  else if(G.mode==='INTRO'){
    drawIntroBedroom();
    if(G.aBtn){
      G.aBtn=false;
      G.introLine++;
      if(G.introLine>=INTRO_LINES.length){
        G.mode='EXPLORE';G.introLine=0;flashScreen();
      }
    }
  }

  // ── EXPLORE (exterior map) ──
  else if(G.mode==='EXPLORE'){
    moveExt(dx,dy,dt);
    // Position history for Kobe
    G.hist.push({x:G.mx,y:G.my});
    if(G.hist.length>HIST_LEN)G.hist.shift();
    const hi=Math.max(0,G.hist.length-1-DOG_DELAY);
    G.kx=G.hist[hi].x-6; G.ky=G.hist[hi].y+6;
    // Camera
    updateCamera();
    // Check special tiles
    G.cooldown=Math.max(0,G.cooldown-dt);
    let onDoorPrompt=false;
    if(G.cooldown<=0){
      const hit=checkExtSpecial(G.aBtn);
      if(hit&&hit.type!=='door_prompt'){
        if(hit.type==='indoor')G.aBtn=false; // consume A for building entry
        G.cooldown=1.5;
        if(hit.type==='enc'){
          G.curEnc=hit.id;G.dline=0;G.mode='BATTLE';flashScreen();
        } else if(hit.type==='indoor'){
          G.prevMX=G.mx;G.prevMY=G.my;
          G.indLoc=hit.loc;
          G.indX=240;G.indY=300;
          G.indKX=210;G.indKY=310;
          if(hit.loc==='house'){G.visitedHouse=true;}
          else{G.visitedCafe=true;}
          if(hit.loc==='house'&&G.hasBoarding&&!G.farewellDone){
            G.mode='FAREWELL';
            G.fwSub=0;G.fwTimer=0;G.fwLine=0;G.fwFade=0;
          } else {
            G.mode='INDOOR';
          }
          flashScreen();
        } else if(hit.type==='cave'){
          G.caveX=2*TILE+8;G.caveY=2*TILE+8;
          G.caveKX=TILE+8;G.caveKY=2*TILE+14;
          G.mode='CAVE';flashScreen();
        } else if(hit.type==='airport'){
          G.mode='AIRPORT';G.airSub=0;G.airLine=0;G.airChoice=0;
          G.kobeBoltActive=false;G.kobeBoltX=148;
          flashScreen();
        }
      } else if(hit&&hit.type==='door_prompt'){
        onDoorPrompt=true;
      }
    }
    drawExtMap();
    drawExtNPCs();
    // Kobe
    const ks=G.kx-G.camX, ky2=G.ky-G.camY;
    drawKobe(ks,ky2,G.tick);
    // May
    const msx=G.mx-G.camX, msy=G.my-G.camY;
    drawMay(msx,msy,G.tick,G.facing||'down');
    drawHUD();
    // Farewell indicator: glowing text above house when boarding pass obtained
    if(G.hasBoarding&&!G.farewellDone){
      const hsx=21*TILE+16-G.camX, hsy=11*TILE-12-G.camY;
      if(hsx>-40&&hsx<W+40&&hsy>-20&&hsy<H){
        const pa=Math.floor(G.tick/14)%4, po=pa<2?pa:3-pa;
        r(hsx-28,hsy-4+po,72,18,'rgba(0,0,0,0.7)');
        ctx.fillStyle='#f8c860';ctx.font='bold 10px monospace';ctx.textAlign='center';
        ctx.fillText('home \u2665 visit family',hsx+8,hsy+10+po);
        ctx.textAlign='left';
      }
    }
    // A: Enter prompt when standing on a building door
    if(onDoorPrompt){
      r(msx-28,msy-26,80,16,'rgba(0,0,0,0.8)');
      ctx.fillStyle='#a8e870';ctx.font='bold 10px monospace';
      ctx.fillText('A: Enter',msx-24,msy-13);
    }
    // Hint (first 500 ticks)
    if(G.tick<500){
      r(0,H-22,W,22,'rgba(0,0,0,0.5)');
      ctx.fillStyle='rgba(200,190,160,0.8)';ctx.font='11px monospace';ctx.textAlign='center';
      ctx.fillText('WASD/Arrows: move \u2014 A/Space to enter buildings',W/2,H-7);
      ctx.textAlign='left';
    }
  }

  // ── BATTLE ──
  else if(G.mode==='BATTLE'){
    drawBattle();
    if(G.aBtn){
      G.aBtn=false;
      G.dline++;
      if(G.dline>=ENC_DATA[G.curEnc].lines.length){
        G.cleared[G.curEnc]=true;
        if(G.curEnc===2){
          // Cave encounter done → return to cave
          G.mode='CAVE';
        } else {
          G.mode='EXPLORE';
        }
        G.curEnc=-1;G.dline=0;G.cooldown=1.6;flashScreen();
      }
    }
  }

  // ── INDOOR ──
  else if(G.mode==='INDOOR'){
    moveInd(dx,dy,dt);
    // Kobe follows in interior
    G.indKX=G.indX-28; G.indKY=G.indY+6;
    // Exit check (bottom of room)
    if(G.indY>360&&G.cooldown<=0){
      G.mode='EXPLORE'; G.mx=G.prevMX; G.my=G.prevMY;
      G.cooldown=1.2; updateCamera(); flashScreen();
    }
    if(G.indLoc==='house')
      drawHouseInterior(G.indX,G.indY,G.tick,false,0,null,null,null,null,false);
    else
      drawCafeInterior(G.indX,G.indY,G.tick);
    // Exit hint
    if(G.indY>300){
      r(W/2-80,H-50,160,26,'rgba(0,0,0,0.6)');
      ctx.fillStyle='rgba(200,190,160,0.8)';ctx.font='12px monospace';ctx.textAlign='center';
      ctx.fillText('Walk south to exit',W/2,H-32);ctx.textAlign='left';
    }
    G.cooldown=Math.max(0,G.cooldown-dt);
  }

  // ── CAVE ──
  else if(G.mode==='CAVE'){
    moveCave(dx,dy,dt);
    // Kobe in cave
    G.caveHist.push({x:G.caveX,y:G.caveY});
    if(G.caveHist.length>HIST_LEN)G.caveHist.shift();
    const chi=Math.max(0,G.caveHist.length-1-DOG_DELAY);
    G.caveKX=G.caveHist[chi].x-6;
    G.caveKY=G.caveHist[chi].y+6;
    G.cooldown=Math.max(0,G.cooldown-dt);
    if(G.cooldown<=0){
      const ch=checkCaveSpecial();
      if(ch){
        if(ch.type==='enc'){
          G.curEnc=ch.id;G.dline=0;G.mode='BATTLE';G.cooldown=1.5;flashScreen();
        } else if(ch.type==='boarding'){
          G.boardingPickup=true;
          G.pickLine=0;G.mode='BOARDING';G.cooldown=1.5;flashScreen();
        } else if(ch.type==='exit'){
          G.mode='EXPLORE';G.cooldown=1.5;updateCamera();flashScreen();
        }
      }
    }
    drawCaveMap();
    // Draw Kobe + May offset by cave draw offset
    drawKobe(G.caveKX,G.caveKY+CAVE_DRAW_OFFSET_Y,G.tick);
    drawMay(G.caveX,G.caveY+CAVE_DRAW_OFFSET_Y,G.tick,G.facing||'down');
    // Cave HUD
    r(0,0,W,24,'rgba(0,0,0,0.7)');
    ctx.fillStyle=C.white;ctx.font='bold 13px monospace';
    ctx.fillText('The Cave',8,17);
    if(!G.cleared[2]){ctx.fillStyle='rgba(200,160,80,0.8)';ctx.fillText('\u26a0 Something lurks here...',120,17);}
    else if(!G.hasBoarding){ctx.fillStyle=C.gold;ctx.fillText('\u2605 Find the boarding pass!',120,17);}
  }

  // ── BOARDING PASS PICKUP ──
  else if(G.mode==='BOARDING'){
    drawCaveMap();
    drawKobe(G.caveKX,G.caveKY+CAVE_DRAW_OFFSET_Y,G.tick);
    drawMay(G.caveX,G.caveY+CAVE_DRAW_OFFSET_Y,G.tick,G.facing||'down');
    const bl=BOARDING_LINES[Math.min(G.pickLine,BOARDING_LINES.length-1)];
    if(G.pickLine===2)drawWoof(G.caveKX+4,G.caveKY+CAVE_DRAW_OFFSET_Y);
    drawDialog([bl.tx],bl.sp);
    if(G.aBtn){
      G.aBtn=false;
      G.pickLine++;
      if(G.pickLine>=BOARDING_LINES.length){
        G.hasBoarding=true;
        G.mode='CAVE';G.cooldown=1.5;
      }
    }
  }

  // ── FAREWELL ──
  else if(G.mode==='FAREWELL'){
    G.fwTimer+=dt;
    if(G.fwSub===0){
      // NPCs walk toward May — auto after 1.2s
      drawFarewellScene();
      if(G.fwTimer>1.2){G.fwSub=1;G.fwLine=0;}
    } else if(G.fwSub===1){
      drawFarewellScene();
      if(G.aBtn){
        G.aBtn=false;
        G.fwLine++;
        if(G.fwLine>=FAREWELL_LINES.length){G.fwSub=2;G.fwTimer=0;G.fwFade=0;}
      }
    } else {
      // Fade out
      G.fwFade+=dt*1.2;
      drawFarewellScene();
      if(G.fwFade>=1.2){
        G.farewellDone=true;
        G.mode='EXPLORE';
        G.mx=G.prevMX;G.my=G.prevMY;
        G.cooldown=1.5;updateCamera();flashScreen();
      }
    }
  }

  // ── AIRPORT ──
  else if(G.mode==='AIRPORT'){
    drawAirport();
    if(G.airSub===0){
      // Agent asks
      drawDialog([AIRPORT_AGENT],'Gate Agent');
      if(G.aBtn){G.aBtn=false;G.airSub=1;}
    } else if(G.airSub===1){
      // YES/NO choice
      drawDialog([AIRPORT_AGENT],'Gate Agent');
      drawYesNo(G.airChoice);
      if(G.keys['ArrowUp']||G.keys['w'])G.airChoice=0;
      if(G.keys['ArrowDown']||G.keys['s'])G.airChoice=1;
      if(G.aBtn){
        G.aBtn=false;
        if(G.airChoice===0){
          G.airSub=2;G.airLine=0; // YES path
        } else {
          G.airSub=3;G.airLine=0;G.kobeBoltActive=true;G.kobeBoltX=148; // NO path
        }
      }
    } else if(G.airSub===2){
      // YES result
      const lines=AIRPORT_YES;
      const l=lines[Math.min(G.airLine,lines.length-1)];
      drawDialog([l.tx],l.sp||'');
      if(G.aBtn){
        G.aBtn=false;G.airLine++;
        if(G.airLine>=lines.length){
          G.mode='TAKEOFF';G.toPhase=0;G.toTimer=0;
          G.planeX=60;G.planeY=340;G.cloudOff=0;flashScreen();
        }
      }
    } else if(G.airSub===3){
      // NO path — Kobe bolts
      if(G.kobeBoltActive){G.kobeBoltX+=220*dt;}
      const noLines=G.airLine<AIRPORT_NO_1.length?AIRPORT_NO_1:AIRPORT_NO_2;
      const noIdx=G.airLine<AIRPORT_NO_1.length?G.airLine:G.airLine-AIRPORT_NO_1.length;
      const nL=noLines[Math.min(noIdx,noLines.length-1)];
      drawDialog([nL.tx],nL.sp||'');
      if(G.aBtn){
        G.aBtn=false;G.airLine++;
        const total=AIRPORT_NO_1.length+AIRPORT_NO_2.length;
        if(G.airLine>=total){
          G.mode='TAKEOFF';G.toPhase=0;G.toTimer=0;
          G.planeX=60;G.cloudOff=0;flashScreen();
        }
      }
    }
  }

  // ── TAKEOFF ──
  else if(G.mode==='TAKEOFF'){
    G.toTimer+=dt;G.cloudOff+=80*dt;
    if(G.toPhase===0){
      G.planeX+=G.toTimer*60*dt; // accelerate
      drawTakeoff();
      if(G.planeX>W+50){G.toPhase=1;G.toTimer=0;}
    } else if(G.toPhase===1){
      drawTakeoff();
      if(G.toTimer>2){G.toPhase=2;G.toTimer=0;}
    } else if(G.toPhase===2){
      drawTakeoff();
      if(G.aBtn&&G.toTimer>4){
        G.aBtn=false;G.mode='CREDITS';G.credTimer=0;
      }
    }
  }

  // ── CREDITS ──
  else if(G.mode==='CREDITS'){
    G.credTimer+=dt;
    drawCredits();
    if(G.aBtn&&G.credTimer>4){
      G.aBtn=false;
      // Restart
      G.mode='TITLE';G.cleared=[false,false,false];
      G.hasBoarding=false;G.farewellDone=false;G.boardingPickup=false;
      G.mx=2*TILE+8;G.my=8*TILE+8;G.kx=2*TILE-18;G.ky=8*TILE+14;
      G.hist.length=0;for(let i=0;i<HIST_LEN;i++)G.hist.push({x:G.mx,y:G.my});
      G.caveHist.length=0;for(let i=0;i<HIST_LEN;i++)G.caveHist.push({x:G.caveX,y:G.caveY});
      G.visitedHouse=false;G.visitedCafe=false;G.introLine=0;G.tick=0;
    }
  }

  G.aBtn=false;
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
