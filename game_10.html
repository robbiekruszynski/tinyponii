/** Harbour / river fish — ~35% fewer than old bottom-only pond (12 tiles × 3), spread across every water body */
function initWaterFish(){
  const regions=[];
  const seen=new Set();
  const k=(c,r)=>`${c},${r}`;
  for(let row=0;row<EROWS;row++){
    for(let col=0;col<ECOLS;col++){
      if(EXT_MAP[row][col]!==T_WATER||seen.has(k(col,row)))continue;
      const cells=[];
      const st=[[row,col]];
      while(st.length){
        const [r,c]=st.pop();
        const kk=k(c,r);
        if(seen.has(kk))continue;
        if(r<0||c<0||r>=EROWS||c>=ECOLS)continue;
        if(EXT_MAP[r][c]!==T_WATER)continue;
        seen.add(kk);
        cells.push([r,c]);
        st.push([r+1,c],[r-1,c],[r,c+1],[r,c-1]);
      }
      regions.push(cells);
    }
  }
  const cellRegion=new Array(ECOLS*EROWS).fill(-1);
  const cellIdx=new Array(ECOLS*EROWS).fill(-1);
  regions.forEach((cells,rid)=>{
    cells.forEach((pair,i)=>{
      const [r,c]=pair;
      const ix=c+r*ECOLS;
      cellRegion[ix]=rid;
      cellIdx[ix]=i;
    });
  });
  const OLD_TOTAL_FISH=36;
  const TOTAL_FISH=Math.max(regions.length*2, Math.floor(OLD_TOTAL_FISH*0.62));
  const sumTiles=regions.reduce((s,a)=>s+a.length,0)||1;
  const fishPerRegion=regions.map(cells=>{
    const nFish=Math.max(2, Math.round(TOTAL_FISH*cells.length/sumTiles));
    const nTiles=cells.length;
    const arr=new Array(nTiles).fill(0);
    for(let j=0;j<nFish;j++) arr[j%nTiles]++;
    return arr;
  });
  return {regions,cellRegion,cellIdx,fishPerRegion};
}
const WATER_FISH=initWaterFish();

function playBusHonk(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    const ac=new AC();
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='square';
    o.frequency.setValueAtTime(280,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(110,ac.currentTime+0.14);
    g.gain.setValueAtTime(0.09,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime+0.42);
  }catch(_){}
}

function mayFlatFootBlocked(px,py){
  if(G.indLoc!=='may_apt')return false;
  const RX=MAY_APT_RX, RY=MAY_APT_RY;
  for(const o of MAY_FLAT_LAYOUT_REL){
    const ax=RX+o.x, ay=RY+o.y;
    if(px>ax&&px<ax+o.w&&py>ay&&py<ay+o.h)return true;
  }
  return false;
}
/** Sprite-centre / point → zone hit for future SPACE/use prompts ({ id, name, … }). */
function mayFlatFurnitureAt(px,py){
  const RX=MAY_APT_RX, RY=MAY_APT_RY;
  for(let i=MAY_FLAT_LAYOUT_REL.length-1;i>=0;i--){
    const o=MAY_FLAT_LAYOUT_REL[i];
    const ax=RX+o.x, ay=RY+o.y;
    if(px>=ax&&px<=ax+o.w&&py>=ay&&py<=ay+o.h)return o;
  }
  return null;
}
function mayFlatAptExitTriggered(){
  const RX=MAY_APT_RX, RY=MAY_APT_RY;
  const dz=MAY_FLAT_DOOR_ZONE_REL;
  const fx=G.indX+9, fy=G.indY+22;
  return fy>=RY+dz.y+dz.h-14 && fx>=RX+dz.x&&fx<=RX+dz.x+dz.w;
}
function mayFlatNearDoorPrompt(){
  const RX=MAY_APT_RX, RY=MAY_APT_RY;
  const dz=MAY_FLAT_DOOR_ZONE_REL;
  const fx=G.indX+9, fy=G.indY+18;
  return fy>=RY+dz.y-28 && fx>=RX+dz.x-12 && fx<=RX+dz.x+dz.w+12;
}
/** AIRPODS encounter (id 5) — interact near couch / rug zone */
function mayFlatNearAirpods(){
  if(G.indLoc!=='may_apt'||G.cleared[5])return false;
  const RX=MAY_APT_RX, RY=MAY_APT_RY;
  const ax=RX+168, ay=RY+86;
  const fx=G.indX+9, fy=G.indY+18;
  return Math.hypot(fx-ax, fy-ay)<56;
}

function extTile(col,row){
  if(col<0||col>=ECOLS||row<0||row>=EROWS)return T_VOID;
  return EXT_MAP[row][col];
}
// Any foot/hit box sample overlapping a door tile (single-point checks miss the narrow house door)
function doorTileUnderMay(){
  const seeds=[];
  for(const [px,py] of [[G.mx+9,G.my+8],[G.mx+9,G.my+14],[G.mx+9,G.my+22],[G.mx+9,G.my+30],[G.mx+5,G.my+18],[G.mx+13,G.my+18]]){
    seeds.push([Math.floor(px/TILE),Math.floor(py/TILE)]);
  }
  const seen=new Set();
  for(const [col,row] of seeds){
    for(const [dc,dr] of [[0,0],[0,-1],[0,-2],[0,1],[-1,0],[1,0]]){
      const c=col+dc,r=row+dr;
      const key=c+','+r;
      if(seen.has(key))continue;
      seen.add(key);
      const tt=extTile(c,r);
      if(tt===T_HOUSE_D||tt===T_CAFE_D||tt===T_JO_DOOR||tt===T_APT_D)return tt;
    }
  }
  return null;
}
// Known walkable tiles directly south of exterior doors (Grandma + Jo) — avoids landing on unwalkable walls / wrong overlap after interior exit

  G.mx=20*TILE+8; G.my=13*TILE+8; G.facing='up';

}
function caveTile(col,row){
  if(col<0||col>=CCOLS||row<0||row>=CROWS)return T_CAVE_W;
  return CAVE_MAP[row][col];
}
function canStepExt(x,y){
  const pts=[[x+2,y+2],[x+16,y+2],[x+2,y+20],[x+16,y+20]];
  return pts.every(([px,py])=>EXT_WALK.has(extTile(Math.floor(px/TILE),Math.floor(py/TILE))));
}
function canStepCave(x,y){
  const pts=[[x+2,y+2],[x+16,y+2],[x+2,y+20],[x+16,y+20]];
  return pts.every(([px,py])=>CAVE_WALK.has(caveTile(Math.floor(px/TILE),Math.floor(py/TILE))));
}
function canStepInd(x,y){
  const house=G.indLoc==='house'||G.indLoc==='jo_house';
  const apt=G.indLoc==='may_apt';
  const RX=apt?MAY_APT_RX:(house?160:180), RY=apt?MAY_APT_RY:(house?80:100), RW=apt?MAY_APT_RW:(house?320:280);
  const pts=[[x+2,y+2],[x+16,y+2],[x+2,y+20],[x+16,y+20]];
  const maxPy=apt?MAY_APT_MAXPY:(house?340:325);
  const inBounds=([px,py])=>px>=RX+10&&px<=RX+RW-30&&py>=RY+20&&py<=maxPy;
  if(apt)return pts.every(p=>inBounds(p)&&!mayFlatFootBlocked(p[0],p[1]));
  return pts.every(inBounds);
}

function drawKobe(ox,oy,tick=0,facing='right'){
  // Yorkshire Terrier: blue-steel body, rich gold-tan face, perky ears
  const x=Math.floor(ox),y=Math.floor(oy),b=Math.floor(tick/8)%2;
  const tw=Math.floor(tick/6)%4;
  const STEEL='#3a3848',TAN='#c8960a',LTTAN='#e0b020',MUZZ='#e8dcc8',NOSE='#1a1010',EAR='#2a2030';
  const fl=facing==='left'||facing==='up';
  // Tail wags on opposite side from head
  if(fl){ r(x+22,y+2+tw,4,3,STEEL); r(x+24,y+tw,3,3,TAN); }
  else   { r(x-2,y+2+tw,4,3,STEEL); r(x-4,y+tw,3,3,TAN); }
  // Body
  r(x+2,y+5,18,10,STEEL); r(x+2,y+10,14,5,TAN); r(x+2,y+5,18,3,'#2a2838');
  // Head position flips
  const hx=fl?x-1:x+13;
  r(hx,y,12,11,TAN); r(hx,y,12,3,STEEL);
  // Ears
  r(hx,y-4,5,5,EAR);     r(hx+7,y-4,5,5,EAR);
  r(hx+1,y-2,3,3,TAN);   r(hx+8,y-2,3,3,TAN);
  // Muzzle
  const mx=fl?x-3:x+21;
  r(mx,y+5,6,5,MUZZ); r(mx+2,y+9,3,2,NOSE);
  // Eye
  const ex=fl?hx+2:hx+2;
  r(ex,y+3,3,3,NOSE); r(ex+1,y+3,1,1,'#ffffff');
  // Beard patch
  r(hx+1,y+7,8,4,LTTAN);
  // Legs
  r(x+4,y+13,3,5-b,TAN); r(x+9,y+13,3,5+b,TAN); r(x+14,y+13,3,5-b,TAN);
}

function drawCharlie(ox,oy,tick=0,facing='right'){

      ctx.translate(x+dw,y+b);
      ctx.scale(-1,1);
      ctx.drawImage(img,0,0,img.naturalWidth,img.naturalHeight,0,0,dw,dh);

      ctx.drawImage(img,0,0,img.naturalWidth,img.naturalHeight,x,y+b,dw,dh);

  const mx=fl?x-3:x+21;

function drawPlayBarkBubble(px,py,tick,seed,calm){
  calm=!!calm;
  const strs=calm?['woof.','arf.']:['woof!','arf!','yip!','ruff!'];
  const ti=calm?Math.floor(tick/22):Math.floor(tick/11);
  const str=strs[(ti+seed)%strs.length];
  const bob=Math.sin((calm?tick*0.07:tick*0.14)+seed)*(calm?1.2:3);
  const x=Math.floor(px-10), y=Math.floor(py-32+bob);
  const w=str.length*6+12, h=14;
  r(x,y,w,h,'rgba(255,252,252,0.96)');
  ctx.strokeStyle='rgba(55,48,72,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
  ctx.fillStyle='#241828'; ctx.font='bold 9px monospace';
  ctx.fillText(str,x+7,y+11);
}

function encounterMapStyle(sprite,pulse){
  const p=0.12+pulse*0.22, e=0.45+pulse*0.35;
  switch(sprite){
    case 'invoice': return [`rgba(220,140,60,${p})`,`rgba(255,190,120,${e})`,'rgba(255,230,200,0.92)'];
    case 'agent': return [`rgba(130,110,210,${p})`,`rgba(190,170,255,${e})`,'rgba(230,220,255,0.92)'];
    case 'dishes': return [`rgba(80,160,220,${p})`,`rgba(120,200,255,${e})`,'rgba(180,230,255,0.92)'];
    case 'bus': return [`rgba(255,200,40,${p})`,`rgba(255,210,80,${e})`,'rgba(255,230,120,0.92)'];
    case 'airpods': return [`rgba(170,195,225,${p})`,`rgba(210,235,255,${e})`,'rgba(200,230,255,0.92)'];
    case 'naked': return [`rgba(200,70,100,${p})`,`rgba(255,130,150,${e})`,'rgba(255,200,210,0.92)'];
    default: return [`rgba(240,80,40,${p})`,`rgba(255,200,40,${e})`,'rgba(255,240,200,0.92)'];
  }
}

function drawEncounterSpriteOnTile(sprite,sx,sy,tk){
  ctx.save();
  switch(sprite){
    case 'agent':
      ctx.translate(sx+2,sy+4); ctx.scale(0.82,0.82); drawAgent(0,0); break;
    case 'invoice':
      ctx.translate(sx+8,sy+14); ctx.scale(0.70,0.70); drawInvoice(-14,-14,tk); break;
    case 'dishes':
      ctx.translate(sx-4,sy+2); ctx.scale(0.55,0.55); drawDishesEncounter(0,0,tk); break;
    case 'bus':{
      const sc=0.52;
      // Native drawBusEncounter(0,0) spans roughly x≈4–94, y≈8–59 — center so it sits on the pulse tile (road), not beside it
      const ncx=49, ncy=34;
      ctx.translate(Math.round(sx+TILE/2-ncx*sc), Math.round(sy+TILE/2-ncy*sc));
      ctx.scale(sc,sc);
      drawBusEncounter(0,0,tk);
      break;
    }
    case 'airpods':
      ctx.translate(sx+16,sy+20); ctx.scale(0.19,0.19); drawAirPodsEncounter(-16,-24,tk); break;
    case 'naked':{
      const ns=1.12;
      const bw=24, bh=39;
      ctx.translate(sx+Math.floor((TILE-bw*ns)/2), sy+Math.floor(TILE-bh*ns)+2);
      ctx.scale(ns,ns);
      drawNaked(0,0,tk);
      break;
    }
    default: break;
  }
  ctx.restore();
}

  const pulseRate=enc.sprite==='bus'?0.18:0.12;
  const pulse=(Math.sin(tk*pulseRate)*0.5+0.5);
  const [fillTint,edgeTint,arrowTint]=encounterMapStyle(enc.sprite,pulse);
  r(sx,sy,TILE,TILE,fillTint);
  r(sx,sy,TILE,2,edgeTint);
  r(sx,sy+TILE-2,TILE,2,edgeTint);
  r(sx,sy,2,TILE,edgeTint);
  r(sx+TILE-2,sy,2,TILE,edgeTint);
  drawEncounterSpriteOnTile(enc.sprite,sx,sy,tk);
  ctx.fillStyle='#f8f8e8'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
  const words=enc.name.split(' ');
  // Naked sprite draws tall above the tile anchor — keep both lines fully above the head
  const nk=enc.sprite==='naked';
  const y1=nk?sy-26:sy-14;
  const y2=nk?sy-18:sy-6;
  if(words.length>=2){
    ctx.fillText(words[0],sx+TILE/2,y1);
    ctx.fillText(words.slice(1).join(' '),sx+TILE/2,y2);
  } else ctx.fillText(enc.name,sx+TILE/2,nk?sy-22:sy-8);
  ctx.textAlign='left';
  const bobRate=enc.sprite==='bus'?0.2:0.15;
  const bob=Math.floor(Math.sin(tk*bobRate)*3);
  ctx.fillStyle=arrowTint; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText('\u25bc',sx+TILE/2,sy+TILE+10+bob); ctx.textAlign='left';
}

/** Dark pine / scrub silhouettes along mountain foot — seed varies placement per tile */
function drawEdgePineSilhouettes(ctx,sx,sy,westFace,seed){
  const fol='#122218', dk='#0e1810', tr='#1a1410';
  const count=3+(seed%4);
  for(let i=0;i<count;i++){
    const h=10+(seed*3+i*11)%9;
    const w=4+(seed+i*7)%3;
    let tx, ty=sy+TILE-h-2;
    if(westFace){
      tx=sx+4+((seed*19+i*23)%11)+i*3;
      if(tx+w>sx+TILE-10) tx=sx+TILE-14-w-i;
    } else {
      tx=sx+TILE-8-((seed*19+i*23)%11)-w-i*3;
      if(tx<sx+12) tx=sx+12+i;
    }
    r(tx,ty+h-6,w,6,tr);
    r(tx-1,ty+4,w+2,h-8,fol);
    r(tx+(westFace?1:-1),ty,w+(westFace?2:2),Math.floor(h*0.55),dk);
    r(tx+(westFace?2:0),ty-2,w,5,'#183020');
  }
}

    ctx.lineTo(sx+5,sy+10);
    ctx.lineTo(sx+2,bot);

    ctx.lineTo(pkMain+2,topMain+5);

  ctx.beginPath();
  if(westFace){
    ctx.moveTo(sx+9,sy+TILE-3);
    ctx.lineTo(sx+6,sy+11);
    ctx.lineTo(Math.min(pkMain-4,sx+TILE-10),sy+9);
  } else {
    ctx.moveTo(sx+TILE-10,sy+TILE-3);
    ctx.lineTo(sx+TILE-7,sy+11);
    ctx.lineTo(Math.max(pkMain+4,sx+12),sy+9);
  }
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle='rgba(210,95,40,0.45)';
  if(westFace) r(pkMain-10,sy+5,12,5,'rgba(210,95,40,0.45)');
  else r(pkMain-2,sy+5,12,5,'rgba(210,95,40,0.45)');

  r(pkMain-1,topMain-1,2,2,'#f2f6fc');
  r(pkMain+(westFace?-3:1),topMain+1,2,2,'rgba(228,236,248,0.85)');
  if(v%2===0) r(pkMain+(westFace?2:-4),topMain+2,2,2,'rgba(200,210,230,0.7)');

  ctx.fillStyle='#3a332c';
  ctx.beginPath();
  const spTop=sy+4+(v%4)*2;
  if(westFace){
    ctx.moveTo(sx+TILE-8,sy+TILE-1);
    ctx.lineTo(sx+TILE-14,sy+16);
    ctx.lineTo(sx+TILE-20,spTop);
  } else {
    ctx.moveTo(sx+9,sy+TILE-1);
    ctx.lineTo(sx+15,sy+16);
    ctx.lineTo(sx+21,spTop);
  }
  ctx.closePath();
  ctx.fill();
}

function updateCamera(){
  G.camX=Math.max(0,Math.min(Math.floor(G.mx+9-W/2),(ECOLS-20)*TILE));
  G.camY=Math.max(0,Math.min(Math.floor(G.my+11-H/2),(EROWS-15)*TILE));
}

function drawExtTile(col,row){
  const sx=col*TILE-G.camX, sy=row*TILE-G.camY;
  if(sx>W||sx<-TILE||sy>H||sy<-TILE)return;
  const t=EXT_MAP[row][col];
  const tk=G.tick;

  // Determine if this tile is on a car road (for street rendering)
  const isHRoad=(row===1||row===13||row===18); // row 1 = north arterial (westbound cars), not sidewalk
  const isVRoad=(col===4||col===14);  // vertical car roads

  switch(t){
    case T_VOID: {
      // Sky shows through most void tiles (north edge etc.).
      // West/east columns and south rim stay opaque so sunset layers don't bleed in stripes.
      if(col===0||col===ECOLS-1||row===EROWS-1)
        r(sx,sy,TILE,TILE,'#0a0a14');
      if(col===ECOLS-1&&row>=2&&row<=17){
        drawVoidMountainBackdrop(ctx,sx,sy,false,row,col);
        drawEastVoidMountainExtra(ctx,sx,sy,row,col);
      }
      break;
    }

    case T_SIDE: {
      if(isHRoad||isVRoad){
        // Dark asphalt road
        r(sx,sy,TILE,TILE,'#252320');
        r(sx,sy,TILE,TILE,'rgba(180,80,20,0.05)');
        // Yellow centre dashes
        if(isHRoad&&col%2===0) r(sx+2,sy+TILE/2-1,TILE-4,2,'#d4a800');
        if(isVRoad&&row%2===0) r(sx+TILE/2-1,sy+2,2,TILE-4,'#d4a800');
        // SIDEWALK KERBS — raised lighter strips at road edges (pedestrian zones)
        if(isHRoad){
          r(sx,sy,TILE,4,'#9a8a68'); // top kerb = sidewalk strip
          r(sx,sy+TILE-4,TILE,4,'#9a8a68'); // bottom kerb
          r(sx,sy,TILE,1,'#baa880'); // highlight
          r(sx,sy+TILE-4,TILE,1,'#baa880');
        }
        if(isVRoad){
          r(sx,sy,4,TILE,'#9a8a68');
          r(sx+TILE-4,sy,4,TILE,'#9a8a68');
          r(sx,sy,1,TILE,'#baa880');
          r(sx+TILE-4,sy,1,TILE,'#baa880');
        }
        // Crosswalk zebra at intersections
        if((col===4&&(row===1||row===13||row===18))||(col===14&&(row===1||row===13||row===18))){
          for(let cw=0;cw<3;cw++) r(sx+4+cw*9,sy+5,6,TILE-10,'rgba(255,255,255,0.09)');
        }
        if((col+row*3)%5===0) r(sx+8,sy+18,12,4,'rgba(100,120,180,0.10)');
      } else {
        // Pavement / sidewalk — lighter warm flagstone
        r(sx,sy,TILE,TILE,'#7a6e52');
        if((col+row)%2===0) r(sx+1,sy+1,TILE-2,TILE-2,'#857560');
        r(sx,sy,TILE,1,'#9a8a6a'); r(sx,sy,1,TILE,'#9a8a6a');
        r(sx+TILE-1,sy,1,TILE,'#5a5040'); r(sx,sy+TILE-1,TILE,1,'#5a5040');
        if((col*7+row*3)%9===0) r(sx+6,sy+20,14,4,'rgba(200,80,40,0.07)');
      }
      if(col===ECOLS-2&&!(isHRoad||isVRoad)){
        drawMountain(ctx,sx,sy,false,row,col);
        drawEastSidewalkMountainExtra(ctx,sx,sy,row,col);
        drawEdgePineSilhouettes(ctx,sx,sy,false,row*37+col*19);
        if((row+col)%4!==2)
          drawEdgePineSilhouettes(ctx,sx,sy,false,row*41+col*23+11);
        if((row+col)%3!==1)
          drawEdgePineSilhouettes(ctx,sx,sy,false,row*49+col*31+17);
      }
      break;
    }

    case T_MTN: {
      // Mountains behind grandma — dark silhouette at dusk
      const mh=(col*5+row*7)%3;
      r(sx,sy,TILE,TILE,'#2a2838'); // deep purple-grey base
      const pk=mh===0?3:mh===1?5:1;
      r(sx+pk,sy+2,TILE-pk*2,TILE-4,'#343048');
      r(sx+pk+4,sy+2,TILE-pk*2-8,TILE/2+2,'#3e3858'); // ridge
      // Warm amber sky-glow on peak tops
      r(sx+pk+6,sy+2,TILE-pk*2-12,6,'rgba(220,110,40,0.4)');
      // Dark tree silhouettes at base
      r(sx+2,sy+TILE-10,4,10,'#1a1828');
      r(sx+9,sy+TILE-14,5,14,'#1a1828');
      r(sx+18,sy+TILE-11,4,11,'#1a1828');
      r(sx+24,sy+TILE-13,5,13,'#1a1828');
      break;
    }

    case T_GRASS:{
      // Dusk grass — deep green with amber edge
      r(sx,sy,TILE,TILE,'#2e4820');
      r(sx+2,sy+2,TILE-4,TILE-4,'#384e28');
      r(sx,sy,TILE,2,'rgba(180,90,20,0.2)'); // warm edge
      const eastStrip=EXT_MAP[row][ECOLS-2]===T_SIDE&&row!==1&&row!==13&&row!==18;
      if(col===ECOLS-3&&eastStrip&&row>=6&&row<=12)
        drawMountainMiniEastOnGrass(ctx,sx,sy,row,col);
      break;
    }

    case T_WATER: {
      // Harbour water — static highlights (no scrolling shimmer / flash)
      r(sx,sy,TILE,TILE,'#1e4878');
      r(sx,sy,TILE,TILE,'rgba(40,100,180,0.6)');
      r(sx+4,sy+7,TILE-8,3,'rgba(100,170,230,0.28)');
      r(sx+6,sy+18,TILE-12,2,'rgba(140,200,250,0.22)');
      r(sx+2,sy+24,TILE-4,2,'rgba(70,130,200,0.22)');
      r(sx,sy,TILE,TILE,'rgba(200,100,30,0.06)');
      const wi=col+row*ECOLS;
      const rid=WATER_FISH.cellRegion[wi];
      if(rid>=0){
        const nf=WATER_FISH.fishPerRegion[rid][WATER_FISH.cellIdx[wi]];
        for(let fi=0;fi<nf;fi++){
          const fk=tk*0.04+col*7+row*11+fi*19;
          const ox=Math.sin(fk+fi*2.1)*5+(fi*11+col*3)%14;
          const oy=Math.cos(fk*0.7+fi)*3+fi*5;
          ctx.fillStyle='rgba(8,24,48,0.22)';
          ctx.beginPath();
          ctx.ellipse(sx+TILE/2+ox-4,sy+TILE/2+oy,10-fi*2,4-fi,0.15*(fi-1),0,Math.PI*2);
          ctx.fill();
        }
      }
      break;
    }

    case T_APT: {
      // Apartment building — HK residential tower, warm lit windows at dusk
      const aptBase=(col%2===0)?'#2e3a4e':'#283244';
      r(sx,sy,TILE,TILE,aptBase);
      r(sx+1,sy+1,TILE-2,TILE-2,'rgba(0,0,0,0.2)');
      // Window grid — most lit warm at dusk
      for(let wr=0;wr<2;wr++) for(let wc=0;wc<2;wc++){
        const lit=(col*5+row*7+wr*3+wc*11)%5!==0;
        const wx=sx+4+wc*14, wy=sy+5+wr*12;
        r(wx,wy,8,7,lit?'#f0c870':'#1a2030');
        if(lit){ r(wx+1,wy+1,3,2,'rgba(255,220,160,0.5)'); }
      }
      // AC units
      if((col+row)%3===0) r(sx+2,sy+3,6,4,'#1e2838');
      break;
    }

    case T_HOUSE:
      r(sx,sy,TILE,TILE,'#7a3828');
      r(sx+2,sy+2,TILE-4,TILE-4,'#b05838');
      if(row===9){
        r(sx,sy,TILE,7,C.houseRoof);
        r(sx+4,sy+1,TILE-8,6,'rgba(220,100,40,0.5)'); // sunset glow on roof
      }
      if(G.hasBoarding&&!G.farewellDone&&row===10){
        const lg=Math.floor(tk/10)%6; const lgoff=lg<3?lg:5-lg;
        r(sx+13,sy+2+lgoff,6,6,'#f8c060');
      }
      r(sx+6,sy+8,8,8,'#f8e898'); r(sx+18,sy+8,8,8,'#f8e898');
      break;

    case T_JO_HOUSE:
      r(sx,sy,TILE,TILE,'#7a3828');
      r(sx+2,sy+2,TILE-4,TILE-4,'#b05838');
      if(row===9){
        r(sx,sy,TILE,7,C.houseRoof);
        r(sx+4,sy+1,TILE-8,6,'rgba(220,100,40,0.5)');
      }
      r(sx+6,sy+8,8,8,'#f8e898'); r(sx+18,sy+8,8,8,'#f8e898');
      break;

    case T_CAFE:
      // NO TITLE — white building. Sign text drawn as overlay in drawExtNPCs (after all tiles).
      r(sx,sy,TILE,TILE,'#e8e4dc');
      r(sx+1,sy+1,TILE-2,TILE-2,'rgba(220,140,60,0.06)');
      // Header bar (dark strip — text added by overlay)
      if(row===2) r(sx,sy,TILE,16,'#111111');
      // Storefront glass drawn once in drawNoTitleCafeWindowOverlay (multi-tile, ~4× prior area)
      break;

    case T_BLDG: {
      // ── HK CITY BUILDING — rich dusk palette ──
      // Vary building style by position (grandma / village side cols 17+ → warm red tones like village houses)
      const villageEast=col>=17;
      const style=(col*3+row*7)%5;
      const bases=villageEast
        ?['#5a2218','#682818','#4a1e14','#722820','#5e2618']
        :['#1e2d42','#243040','#1a2838','#2a3048','#223038'];
      const accents=villageEast
        ?['#7a3830','#884028','#6a3028','#904038','#783428']
        :['#2e4060','#384858','#283850','#384068','#304050'];
      r(sx,sy,TILE,TILE,bases[style]);

      // Building face with subtle texture
      r(sx+1,sy+1,TILE-2,TILE-2,accents[style]);

      // Sunset glow on upper faces — amber-orange wash
      r(sx,sy,TILE,Math.floor(TILE*0.4),'rgba(200,90,30,0.12)');

      // Window grid — mix of warm yellow (lit) and dark (off)
      const winRows=2, winCols=2;
      for(let wr=0;wr<winRows;wr++) for(let wc=0;wc<winCols;wc++){
        const hash=(col*7+row*13+wr*5+wc*11)%7;
        const lit=hash!==0&&hash!==3;
        const warm=hash===1||hash===4; // warm vs cool light
        const wx=sx+5+wc*13, wy=sy+5+wr*12;
        r(wx,wy,7,8,lit?(warm?'#f0c860':'#a0c0e8'):'#0e1820');
        if(lit&&warm) r(wx+1,wy+1,2,2,'rgba(255,220,140,0.6)');
        if(lit&&!warm) r(wx+1,wy+1,2,2,'rgba(160,200,240,0.4)');
      }

      // Neon sign — cooler HK towers only (skip on village-red facades)
      if(!villageEast&&(col*11+row*7)%24===0){
        const flk=Math.floor(tk/9)%4!==0;
        if(flk){
          r(sx+2,sy+TILE-10,TILE-4,8,'rgba(200,40,60,0.75)');
          ctx.fillStyle='rgba(255,150,160,0.9)';ctx.font='5px monospace';ctx.textAlign='center';
          const signs=['酒','樓','茶','粥','港'];
          ctx.fillText(signs[(col+row)%signs.length],sx+TILE/2,sy+TILE-4);
          ctx.textAlign='left';
        }
      }

      // AC condensers
      if((col+row*2)%4===0){ r(sx+2,sy+4,7,5,'#151e2a'); r(sx+10,sy+4,7,5,'#151e2a'); }
      if(row===1||row===9){ if(col%4===0) r(sx+10,sy,10,5,'#0e1820'); }
      if(col%5===0) r(sx,sy+6,2,TILE-6,'#0e1820');
      break;
    }

    case T_BRIDGE: {
      // Wooden bridge planks over water — warm wood tones
      r(sx,sy,TILE,TILE,'#8a6838');
      // Plank lines
      for(let p=0;p<4;p++) r(sx+1,sy+p*8+2,TILE-2,5,'#a07840');
      // Rail posts
      r(sx+2,sy,3,TILE,'#6a4820'); r(sx+TILE-5,sy,3,TILE,'#6a4820');
      // Rope rail
      ctx.strokeStyle='#c8943a';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(sx+3,sy+3);ctx.lineTo(sx+3,sy+TILE-3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+TILE-4,sy+3);ctx.lineTo(sx+TILE-4,sy+TILE-3);ctx.stroke();
      // Water shimmer underneath (visible between planks)
      r(sx+4,sy+6,TILE-8,2,'rgba(72,120,168,0.4)');
      r(sx+4,sy+14,TILE-8,2,'rgba(72,120,168,0.3)');
      r(sx+4,sy+22,TILE-8,2,'rgba(72,120,168,0.4)');
      break;
    }

    case T_VILG: {
      // Village dirt path — warm earth, quiet feel
      const vbase=(col+row)%2===0?'#9a7a4a':'#8a6e3e';
      r(sx,sy,TILE,TILE,vbase);
      // Subtle pebble texture
      if((col*5+row*3)%7===0){ r(sx+8,sy+10,4,3,'#7a5e30'); r(sx+20,sy+18,3,4,'#7a5e30'); }
      if((col*3+row*7)%9===0){ r(sx+16,sy+6,4,3,'#b08a50'); }
      // Edge softening
      r(sx,sy,TILE,1,'rgba(0,0,0,0.08)');
      r(sx,sy,1,TILE,'rgba(0,0,0,0.08)');
      if(col===23&&EXT_MAP[row][col+1]===T_SHRINE){
        const dishSouth=row+1<EROWS&&EXT_MAP[row+1][col]===T_ENC_DISHES;
        if(!dishSouth) drawMountainShrineWestNeighbor(ctx,sx,sy);
      }
      break;
    }

    case T_VBLDG: {
      // Traditional Chinese village building — warm terracotta, paper windows, lanterns
      const vbStyle=(col*5+row*11)%3;
      const wallCol=['#a05030','#b86040','#c87050'][vbStyle];
      const roofCol='#5a1808';
      r(sx,sy,TILE,TILE,wallCol);
      r(sx+2,sy+2,TILE-4,TILE-4,['#c87040','#d88050','#c06030'][vbStyle]);
      // Curved roof strip on top
      r(sx,sy,TILE,7,roofCol);
      r(sx+4,sy+1,TILE-8,5,'rgba(160,60,20,0.5)');
      r(sx+10,sy,TILE-20,3,roofCol);
      // Paper window
      r(sx+7,sy+8,8,7,'#f8e898');
      r(sx+8,sy+9,6,5,'rgba(210,190,110,0.4)');
      // Door arch
      r(sx+11,sy+19,10,TILE-21,'#4a2008');
      r(sx+12,sy+16,8,5,'#5a2808');
      // Hanging lantern (some tiles)
      if((col*7+row*3)%4===0){
        const lg=Math.floor(tk/14)%4,lgo=lg<2?lg:3-lg;
        r(sx+13,sy+2+lgo,6,9,'#e84020');
        r(sx+14,sy+10+lgo,4,3,'#f8c060');
      }
      // Moss/vine
      if((col*3+row*9)%6===0) r(sx,sy+12,3,TILE-14,'rgba(40,80,20,0.35)');
      break;
    }

    case T_TREE: {
      r(sx,sy,TILE,TILE,'#3a5820'); // dark ground
      r(sx+12,sy+22,8,TILE-22,'#5a3010'); // trunk
      r(sx+4,sy+17,24,10,'#1e5010');  r(sx+6,sy+11,20,9,'#286018');
      r(sx+8,sy+6,16,8,'#2e7020');   r(sx+10,sy+2,12,7,'#38801e');
      r(sx+14,sy+2,5,5,'rgba(80,160,40,0.5)'); r(sx+8,sy+7,6,4,'rgba(60,140,30,0.4)');
      break;
    }

    case T_SHRINE: {
      drawMountainsBehindGoldenShrine(ctx,sx,sy,row,col);
      r(sx,sy,TILE,TILE,'#c8a458');
      r(sx+4,sy+20,TILE-8,12,'#8a2010'); r(sx+5,sy+19,TILE-10,3,'#c83010');
      r(sx+8,sy+10,TILE-16,11,'#c04020'); r(sx+9,sy+11,TILE-18,9,'#d85030');
      r(sx+6,sy+6,TILE-12,6,'#c89020'); r(sx+4,sy+4,TILE-8,4,'#e0a820');
      r(sx+8,sy+0,TILE-16,6,'#f0b820'); r(sx+12,sy-2,TILE-24,5,'#f8cc30');
      r(sx+8,sy+9,TILE-16,2,'#f8d040'); r(sx+8,sy+18,TILE-16,2,'#f8d040');
      r(sx+12,sy+14,8,8,'#1a0a04'); r(sx+13,sy+14,6,4,'rgba(255,200,80,0.2)');
      const ig2=Math.floor(tk/12)%4,igo2=ig2<2?ig2:3-ig2;
      r(sx+14,sy+6+igo2,4,3,'rgba(255,200,60,0.7)'); r(sx+13,sy+4+igo2,6,4,'rgba(255,150,40,0.3)');
      r(sx+6,sy+20,2,6,'#d8a040'); r(sx+24,sy+20,2,6,'#d8a040');
      ctx.fillStyle='rgba(220,180,100,0.25)';
      ctx.fillRect(sx+7,sy+12+igo2,2,8); ctx.fillRect(sx+25,sy+10+igo2,2,10);
      break;
    }

    case T_CAVE_W:
      r(sx,sy,TILE,TILE,C.cave);
      r(sx+2,sy+2,TILE-4,TILE-4,C.caveL);
      r(sx+6,sy+6,8,8,C.caveDk); r(sx+20,sy+16,8,8,C.caveDk);
      if(row<=2){ r(sx+12,sy,6,TILE/2,C.caveDk); }
      break;

    case T_APT_D:
      r(sx,sy,TILE,TILE,'#3a3428');
      r(sx+8,sy+2,TILE-16,TILE-4,C.aptW);
      r(sx+10,sy+4,TILE-20,TILE-12,'#5a7898');
      break;

    case T_HOUSE_D:
      r(sx,sy,TILE,TILE,'#252320');
      r(sx+8,sy+2,TILE-16,TILE-4,C.houseRoof);
      r(sx+10,sy+4,TILE-20,TILE-12,'#f8c080');
      break;

    case T_JO_DOOR:
      r(sx,sy,TILE,TILE,'#252320');
      r(sx+8,sy+2,TILE-16,TILE-4,C.houseRoof);
      r(sx+10,sy+4,TILE-20,TILE-12,'#f8c080');
      break;

    case T_CAFE_D:
      r(sx,sy,TILE,TILE,'#4e4840');
      r(sx+8,sy+2,TILE-16,TILE-4,'#1a1a1a');
      r(sx+10,sy+4,TILE-20,TILE-12,'rgba(180,200,220,0.9)');
      break;

    case T_CAVE_E: {
      r(sx,sy,TILE,TILE,'#3a3428');
      r(sx+4,sy+2,TILE-8,TILE-2,C.caveDk);
      r(sx+8,sy+6,TILE-16,TILE-10,'#0a0a0a');
      if(G.cleared.every(v=>v)) r(sx+8,sy+6,TILE-16,TILE-10,'rgba(200,180,80,0.15)');
      break;
    }

    case T_ENC1: case T_ENC2: {
      const idx=t-T_ENC1;
      drawEncounterTileCommon(ENC_DATA[idx],idx,sx,sy,tk,isHRoad);
      break;
    }

    case T_ENC_DISHES:
      drawEncounterTileCommon(ENC_DATA[3],3,sx,sy,tk,isHRoad);
      break;

    case T_TAXI: {
      const ok=G.hasBoarding&&G.farewellDone;
      r(sx,sy,TILE,TILE,'#4e4840');
      if(ok){
        r(sx+3,sy+8,26,14,C.taxi);
        r(sx+7,sy+10,18,8,C.taxiD);
        r(sx+3,sy+20,6,5,'#1a1818'); r(sx+23,sy+20,6,5,'#1a1818');
        const ab=Math.floor(tk/8)%6,aoff=ab<3?ab:5-ab;
        r(sx+12+aoff,sy+2,4,4,C.encG);
      } else if(G.hasBoarding&&!G.farewellDone){
        ctx.fillStyle='rgba(200,160,80,0.5)';ctx.font='10px monospace';ctx.textAlign='center';
        ctx.fillText('?',sx+TILE/2,sy+TILE/2+4);ctx.textAlign='left';
      }
      break;
    }
  }
}

// opts.skyOnly: gradient + sun + rays + clouds only (no baked mountains/skyline/harbour).
// Use when parallax draws the sole horizon — avoids double-stacked city silhouettes (title screen).
function drawSunsetSky(opts){
  opts=opts||{};
  const skyOnly=!!opts.skyOnly;
  const t=G.tick;
  const ph=Math.sin(t*0.0006)*0.5+0.5;

  // Northern sky band + deep void below — full-width sunset only reads from the top
  const skyBand=Math.floor(H*0.64);
  const sky=ctx.createLinearGradient(0,0,0,skyBand);
  sky.addColorStop(0.00,`rgb(${18+Math.floor(ph*10)},10,${50+Math.floor(ph*20)})`);
  sky.addColorStop(0.18,`rgb(${55+Math.floor(ph*25)},22,${80+Math.floor(ph*20)})`);
  sky.addColorStop(0.36,`rgb(${150+Math.floor(ph*40)},${60+Math.floor(ph*20)},50)`);
  sky.addColorStop(0.55,`rgb(${220+Math.floor(ph*25)},${115+Math.floor(ph*28)},40)`);
  sky.addColorStop(0.72,`rgb(${235},${145+Math.floor(ph*20)},55)`);
  sky.addColorStop(0.88,`rgb(${160+Math.floor(ph*22)},${72+Math.floor(ph*15)},38)`);
  sky.addColorStop(1.00,`rgb(${42+Math.floor(ph*18)},${28},${22})`);
  ctx.fillStyle='#0a0a14'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,skyBand);

  // Sun — large, upper-right
  const sunX=W*0.82, sunY=H*0.065;
  const oh=ctx.createRadialGradient(sunX,sunY,40,sunX,sunY,210);
  oh.addColorStop(0,'rgba(255,185,60,0.48)'); oh.addColorStop(0.4,'rgba(240,100,20,0.20)'); oh.addColorStop(1,'rgba(180,30,0,0)');
  ctx.fillStyle=oh; ctx.beginPath(); ctx.arc(sunX,sunY,210,0,Math.PI*2); ctx.fill();
  const ih=ctx.createRadialGradient(sunX,sunY,12,sunX,sunY,65);
  ih.addColorStop(0,'rgba(255,248,195,0.92)'); ih.addColorStop(0.5,'rgba(255,185,60,0.68)'); ih.addColorStop(1,'rgba(255,80,10,0)');
  ctx.fillStyle=ih; ctx.beginPath(); ctx.arc(sunX,sunY,65,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(255,${220+Math.floor(ph*28)},90,1)`;
  ctx.beginPath(); ctx.arc(sunX,sunY,24,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,252,235,0.88)';
  ctx.beginPath(); ctx.arc(sunX,sunY,13,0,Math.PI*2); ctx.fill();

  // Rays
  ctx.save(); ctx.globalAlpha=0.058+ph*0.032;
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2-Math.PI*0.22;
    ctx.fillStyle=`rgba(255,${125+i*6},40,1)`;
    ctx.beginPath(); ctx.moveTo(sunX,sunY);
    ctx.lineTo(sunX+Math.cos(a-0.028)*H*2.5, sunY+Math.sin(a-0.028)*H*2.5);
    ctx.lineTo(sunX+Math.cos(a+0.028)*H*2.5, sunY+Math.sin(a+0.028)*H*2.5);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  if(!skyOnly){
  // Far mountains — shifted up so more skyline reads against the northern sky
  const may=H*0.50;
  ctx.save(); ctx.globalAlpha=0.55;
  const mtnA=[[0,85,72],[72,58,58],[130,105,62],[192,68,68],[260,115,57],[317,78,62],[379,100,58],[437,64,68],[505,120,58],[563,72,68],[631,95,58],[686,60,62],[746,110,57],[803,70,62]];
  ctx.fillStyle=`rgba(${50+Math.floor(ph*14)},${36+Math.floor(ph*10)},${76+Math.floor(ph*18)},1)`;
  for(const [bx,bh,bw] of mtnA){
    for(let s=0;s<9;s++){const f=s/9,ww=bw*(1-f*0.65);ctx.fillRect(bx+(bw-ww)/2,may-bh*f-bh/9,ww,bh/9+2);}
    ctx.fillStyle='rgba(210,105,42,0.25)'; ctx.fillRect(bx+bw*0.38,may-bh,bw*0.28,bh*0.30);
    ctx.fillStyle=`rgba(50,36,76,1)`;
  }
  ctx.restore();

  const mby=H*0.58;
  ctx.save(); ctx.globalAlpha=0.72;
  const mtnB=[[0,68,54],[54,42,48],[102,84,50],[152,53,54],[206,92,48],[254,46,52],[306,80,50],[356,58,54],[414,88,48],[462,44,54],[516,73,48],[564,54,52],[618,86,50],[668,46,54],[714,75,48],[762,60,52],[822,84,50],[872,42,56]];
  ctx.fillStyle=`rgba(${30+Math.floor(ph*10)},${20+Math.floor(ph*8)},${52+Math.floor(ph*14)},1)`;
  for(const [bx,bh,bw] of mtnB){
    for(let s=0;s<7;s++){const f=s/7,ww=bw*(1-f*0.60);ctx.fillRect(bx+(bw-ww)/2,mby-bh*f-bh/7,ww,bh/7+2);}
    for(let tr=0;tr<4;tr++){ctx.fillStyle='rgba(14,9,26,0.85)';const tx=bx+tr*Math.floor(bw/4)+3;ctx.fillRect(tx,mby-11,3,12);ctx.fillRect(tx-4,mby-22,11,13);}
    ctx.fillStyle=`rgba(30,20,52,1)`;
  }
  ctx.restore();

  const sily=H*0.64;
  const smog=ctx.createLinearGradient(0,sily-65,0,sily+20);
  smog.addColorStop(0,'rgba(185,82,22,0)'); smog.addColorStop(0.5,'rgba(205,92,26,0.35)'); smog.addColorStop(1,'rgba(185,72,18,0)');
  ctx.fillStyle=smog; ctx.fillRect(0,sily-65,W,85);
  ctx.save(); ctx.globalAlpha=0.82;
  ctx.fillStyle=`rgba(${10+Math.floor(ph*5)},${6+Math.floor(ph*4)},${18+Math.floor(ph*8)},1)`;
  const sky2=[[0,40,42],[42,24,30],[72,54,26],[98,32,28],[126,66,23],[149,26,30],[179,48,24],[203,56,26],[229,38,28],[257,72,21],[278,28,30],[308,52,26],[334,62,23],[357,34,28],[385,68,21],[406,24,30],[436,50,24],[460,58,26],[486,40,28],[514,74,21],[535,26,30],[565,54,24],[589,62,23],[612,36,28],[640,76,21],[661,28,30],[691,52,24],[715,59,26],[741,38,28],[769,70,21],[789,26,30],[815,48,24],[839,56,26],[865,34,28]];
  for(const [bx,bh,bw] of sky2){
    ctx.fillRect(bx,sily-bh,bw,bh+18);
    if(bh>46)ctx.fillRect(bx+Math.floor(bw/2)-1,sily-bh-10,2,11);
    ctx.fillStyle='rgba(248,198,92,0.52)';
    for(let wr=0;wr<Math.floor(bh/14);wr++)for(let wc=0;wc<Math.floor(bw/9);wc++)
      if((bx*3+bh*7+wr*5+wc*11)%5!==0)ctx.fillRect(bx+2+wc*9,sily-bh+5+wr*13,5,7);
    ctx.fillStyle=`rgba(10,6,18,1)`;
  }
  ctx.restore();

  // Harbour reflection
  const hary=sily+12;
  const hg=ctx.createLinearGradient(0,hary,0,hary+H*0.18);
  hg.addColorStop(0,`rgba(${205+Math.floor(ph*30)},${95+Math.floor(ph*20)},26,0.40)`);
  hg.addColorStop(0.5,`rgba(${145},58,16,0.20)`); hg.addColorStop(1,'rgba(60,20,5,0)');
  ctx.fillStyle=hg; ctx.fillRect(0,hary,W,H*0.18);
  ctx.save(); ctx.globalAlpha=0.24+ph*0.10; ctx.strokeStyle=`rgba(255,${190+Math.floor(ph*42)},82,1)`; ctx.lineWidth=1;
  for(let sl=0;sl<7;sl++){const sy2=hary+sl*11;const sx2=((t*0.055+sl*75)%(W+110))-55;ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(sx2+55,sy2);ctx.stroke();}
  ctx.restore();

  } else {
  // One continuous dusk wash under the gradient — parallax layers sit on this (no second skyline from sky2/mountains)
  const wash=ctx.createLinearGradient(0,skyBand-90,0,H);
  wash.addColorStop(0,'rgba(52,34,38,0)');
  wash.addColorStop(0.22,'rgba(44,28,36,0.28)');
  wash.addColorStop(0.55,'rgba(28,20,34,0.72)');
  wash.addColorStop(1,'rgba(10,10,20,1)');
  ctx.fillStyle=wash;
  ctx.fillRect(0,skyBand-110,W,H-(skyBand-110)+8);
  }

  // Clouds — bigger and more visible
  ctx.save();
  for(const cs of [
    {sp:0.052,a:0.28+ph*0.08,cy:H*0.04,rs:[{r:90,h:16},{r:62,h:12},{r:40,h:10}]},
    {sp:0.082,a:0.20+ph*0.07,cy:H*0.10,rs:[{r:62,h:12},{r:42,h:10},{r:28,h:8}]},
    {sp:0.115,a:0.14+ph*0.05,cy:H*0.16,rs:[{r:44,h:10},{r:30,h:8},{r:20,h:6}]},
  ]){
    ctx.globalAlpha=cs.a; ctx.fillStyle='rgba(255,215,165,1)';
    for(let ci=0;ci<5;ci++){
      const cx=((t*cs.sp+ci*(W+90)/5)%(W+220))-110;
      for(let pi=0;pi<cs.rs.length;pi++){const {r:cr,h:ch}=cs.rs[pi];ctx.beginPath();ctx.ellipse(cx+pi*cr*0.52,cs.cy+pi*3,cr,ch,0,0,Math.PI*2);ctx.fill();}
    }
  }
  ctx.restore();
}


// ── PARALLAX BACKGROUND: 3 depth layers between sky and foreground ──
// Scrolls at fractional speeds relative to camera for depth illusion
function drawParallaxBg(opts){
  opts=opts||{};
  const hb=opts.horizonBoost|0;
  const t=G.tick;
  const phase=Math.sin(t*0.0006)*0.5+0.5;

  // Horizon Y — higher on screen → more parallax city reads above the tile field
  const horizY=Math.min(Math.floor(H*0.30), Math.max(5,-Math.floor(G.camY*0.35)+42))+hb;

  // ══ LAYER 1: Distant mountains (slowest parallax, 0.08× camera speed) ══
  const mx=-(G.camX*0.08);
  const mtnH=55;
  const mtnY=horizY+18;
  // Mountain silhouettes — purple-grey peaks blurred by distance
  ctx.save();ctx.globalAlpha=0.55;
  const mtnPeaks=[
    [0,mtnH*0.6,90],[90,mtnH*0.8,70],[160,mtnH*0.5,80],[240,mtnH*0.9,60],
    [300,mtnH*0.7,75],[375,mtnH*1.0,65],[440,mtnH*0.65,80],[520,mtnH*0.85,70],
    [590,mtnH*0.5,80],[670,mtnH*0.75,90],[760,mtnH*0.9,65],[825,mtnH*0.6,80],
  ];
  // Base gradient for mountains
  const mtnGrad=ctx.createLinearGradient(0,mtnY-mtnH,0,mtnY+20);
  mtnGrad.addColorStop(0,'rgba(55,45,80,0.9)');
  mtnGrad.addColorStop(0.6,'rgba(40,35,65,0.8)');
  mtnGrad.addColorStop(1,'rgba(30,25,50,0)');
  ctx.fillStyle=mtnGrad;
  for(const [bx,bh,bw] of mtnPeaks){
    const px=((bx+mx)%(W+200))-100; // parallax wrap
    // Draw as a trapezoid via overlapping rects
    const steps=Math.floor(bh/4);
    for(let s=0;s<steps;s++){
      const frac=s/steps;
      const w2=bw*(1-frac*0.7);
      const xoff=(bw-w2)/2;
      ctx.fillRect(px+xoff, mtnY-bh+s*4, w2, 5);
    }
    // Snow cap
    ctx.fillStyle='rgba(220,200,240,0.25)';
    ctx.fillRect(px+bw*0.3, mtnY-bh, bw*0.4, 8);
    ctx.fillStyle=mtnGrad;
    // Amber glow on peak edge from setting sun
    ctx.fillStyle='rgba(200,100,40,0.15)';
    ctx.fillRect(px+bw*0.55, mtnY-bh, bw*0.2, bh*0.4);
    ctx.fillStyle=mtnGrad;
  }
  ctx.restore();

  // ══ LAYER 2: Mid-distance blurred city (0.25× camera speed) ══
  const bx2=-(G.camX*0.25);
  const cityY=horizY+16;
  const cityBlds=[
    [10,65,24],[34,42,18],[52,78,22],[74,50,20],[94,88,18],[112,35,24],
    [136,70,20],[156,55,18],[174,82,22],[196,45,20],[216,68,18],[234,92,16],
    [250,50,22],[272,76,20],[292,58,18],[310,84,22],[332,48,20],[352,72,18],
    [370,62,22],[392,88,18],[410,44,24],[434,78,20],[454,56,18],[472,86,22],
    [494,48,20],[514,72,18],[532,60,22],[554,80,18],[572,46,24],[596,74,20],
    [616,58,18],[634,82,22],[652,50,20],[672,66,18],[690,90,22],[712,44,20],[734,76,22],[756,52,20],[778,84,24],[802,48,22],[826,68,20],
  ];
  ctx.save();ctx.globalAlpha=0.58;
  for(const [bbx,bbh,bbw] of cityBlds){
    const px=((bbx+bx2)%(W+300))-50;
    // Building face — very muted deep blue-purple
    const bldCol=`rgba(${28+Math.floor((bbx)%20)},${22+Math.floor((bbh)%15)},${52+Math.floor((bbx*bbh)%25)},1)`;
    ctx.fillStyle=bldCol;
    ctx.fillRect(px, cityY-bbh, bbw, bbh+8);
    // Tiny lit windows (sparse, warm)
    ctx.fillStyle='rgba(240,200,120,0.6)';
    for(let wr=0;wr<Math.floor(bbh/14);wr++){
      for(let wc=0;wc<Math.floor(bbw/10);wc++){
        if((bbx*3+bbh*7+wr*5+wc*11)%5!==0){
          ctx.fillRect(px+3+wc*9, cityY-bbh+4+wr*13, 4, 5);
        }
      }
    }
    // Sunset glow on upper face
    ctx.fillStyle='rgba(200,90,30,0.1)';
    ctx.fillRect(px, cityY-bbh, bbw, bbh*0.3);
    // Antenna
    if(bbh>70){ ctx.fillStyle='rgba(30,20,45,0.9)'; ctx.fillRect(px+bbw/2-1,cityY-bbh-7,2,8); }
  }
  // Ground haze below mid-city
  const cityHaze=ctx.createLinearGradient(0,cityY,0,cityY+18);
  cityHaze.addColorStop(0,'rgba(180,80,30,0.12)');
  cityHaze.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cityHaze;ctx.fillRect(0,cityY,W,18);
  ctx.restore();

  // ══ LAYER 3: Near-background buildings (0.45× camera speed, more detail) ══
  const bx3=-(G.camX*0.45);
  const nearY=horizY+26;
  const nearBlds=[
    [0,55,30],[30,38,22],[52,68,26],[78,45,24],[102,80,22],[124,52,28],
    [152,72,24],[176,60,22],[198,84,26],[224,48,24],[248,70,22],[270,58,28],
    [298,88,24],[322,46,22],[344,76,26],[370,62,24],[394,90,22],[416,50,28],
    [444,72,24],[468,58,22],[490,80,26],[516,44,24],[540,68,22],[562,56,28],
    [590,86,24],[614,48,22],[636,74,26],[662,58,24],[686,82,22],[708,52,28],
    [736,70,24],[760,60,22],[782,78,26],[808,44,24],[832,66,22],[856,54,28],
    [884,76,26],[918,48,24],[952,70,22],[986,54,26],
  ];
  ctx.save();ctx.globalAlpha=0.78;
  for(const [bbx,bbh,bbw] of nearBlds){
    const px=((bbx+bx3)%(W+400))-80;
    ctx.fillStyle=`rgba(${22+Math.floor(bbx%18)},${18+Math.floor(bbh%12)},${44+Math.floor((bbx*bbh)%22)},1)`;
    ctx.fillRect(px, nearY-bbh, bbw, bbh+5);
    // More visible windows — mix warm yellow and cool blue
    for(let wr=0;wr<Math.floor(bbh/12);wr++){
      for(let wc=0;wc<Math.floor(bbw/8);wc++){
        const lit=(bbx*7+bbh*5+wr*3+wc*11)%6;
        if(lit!==0&&lit!==3){
          const warm=lit<3;
          ctx.fillStyle=warm?'rgba(240,190,100,0.7)':'rgba(140,190,230,0.5)';
          ctx.fillRect(px+2+wc*8, nearY-bbh+3+wr*12, 4, 6);
        }
      }
    }
    // Amber-orange upper wash from sunset
    ctx.fillStyle='rgba(200,80,20,0.12)';
    ctx.fillRect(px, nearY-bbh, bbw, bbh*0.25);
    if(bbh>65){ ctx.fillStyle='rgba(25,18,40,0.95)'; ctx.fillRect(px+bbw/2-1,nearY-bbh-5,2,6); }
  }
  // Ground fade
  const nearHaze=ctx.createLinearGradient(0,nearY,0,nearY+14);
  nearHaze.addColorStop(0,'rgba(160,70,20,0.16)');
  nearHaze.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nearHaze;ctx.fillRect(0,nearY,W,14);
  ctx.restore();

  // ══ West of village green belt: ridge silhouettes (grandma-side horizon) ══
  const WEST_MTN_PARALLAX=0.11;
  const villageWestWx=17*TILE;
  const westAnchor=villageWestWx-G.camX*WEST_MTN_PARALLAX;
  ctx.save();
  ctx.globalAlpha=0.52;
  const westBase=horizY+18;
  const westGrad=ctx.createLinearGradient(0,westBase-68,0,westBase+24);
  westGrad.addColorStop(0,`rgba(${42+Math.floor(phase*12)},${28+Math.floor(phase*10)},${58+Math.floor(phase*14)},0.92)`);
  westGrad.addColorStop(0.55,'rgba(34,26,52,0.82)');
  westGrad.addColorStop(1,'rgba(22,18,38,0)');
  ctx.fillStyle=westGrad;
  const westPeaks=[
    [-40,58,48],[12,72,52],[66,48,44],[118,64,50],[172,52,46],[224,70,54],[276,44,40],
  ];
  for(const [ox,bh,bw] of westPeaks){
    const px=westAnchor+ox;
    if(px>W+100||px+bw<-100)continue;
    const steps=Math.max(4,Math.floor(bh/4));
    for(let s=0;s<steps;s++){
      const frac=s/steps,w2=bw*(1-frac*0.70),xoff=(bw-w2)/2;
      ctx.fillRect(px+xoff,westBase-bh+s*4,w2,5);
    }
    ctx.fillStyle='rgba(240,200,120,0.18)';
    ctx.fillRect(px+bw*0.26,westBase-bh,bw*0.42,8);
    ctx.fillStyle='rgba(200,85,35,0.12)';
    ctx.fillRect(px+bw*0.48,westBase-bh,bw*0.2,bh*0.38);
    ctx.fillStyle=westGrad;
  }
  ctx.restore();

  // ══ Beyond golden shrine (far map-east): ridge line stays right of the statue ══
  const EAST_MTN_PARALLAX=0.11;
  const shrineEastWx=25*TILE;
  const eastAnchor=shrineEastWx-G.camX*EAST_MTN_PARALLAX;
  ctx.save();
  ctx.globalAlpha=0.6;
  const eastBase=horizY+15;
  const eastGrad=ctx.createLinearGradient(0,eastBase-72,0,eastBase+28);
  eastGrad.addColorStop(0,`rgba(${46+Math.floor(phase*14)},${30+Math.floor(phase*10)},${68+Math.floor(phase*16)},0.94)`);
  eastGrad.addColorStop(0.58,'rgba(38,30,62,0.85)');
  eastGrad.addColorStop(1,'rgba(26,20,44,0)');
  ctx.fillStyle=eastGrad;
  const eastPeaks=[
    [0,62,54],[52,46,46],[100,72,52],[154,54,48],[204,66,50],[254,42,42],[296,58,46],[344,50,40],[388,56,44],
  ];
  for(const [ox,bh,bw] of eastPeaks){
    const px=eastAnchor+ox;
    if(px>W+120||px+bw<-120)continue;
    const steps=Math.max(4,Math.floor(bh/4));
    for(let s=0;s<steps;s++){
      const frac=s/steps,w2=bw*(1-frac*0.72),xoff=(bw-w2)/2;
      ctx.fillRect(px+xoff,eastBase-bh+s*4,w2,5);
    }
    ctx.fillStyle='rgba(248,210,130,0.22)';
    ctx.fillRect(px+bw*0.28,eastBase-bh,bw*0.44,9);
    ctx.fillStyle='rgba(215,95,38,0.16)';
    ctx.fillRect(px+bw*0.52,eastBase-bh,bw*0.22,bh*0.42);
    ctx.fillStyle=eastGrad;
  }
  ctx.restore();

  // ══ Moving clouds at 3 speeds ══
  ctx.save();
  for(let layer=0;layer<3;layer++){
    const speed=0.08+layer*0.06;
    const alpha=0.12+layer*0.06;
    const cloudY=horizY*0.3+layer*H*0.05;
    ctx.globalAlpha=alpha+phase*0.04;
    ctx.fillStyle='rgba(255,200,150,1)';
    for(let ci=0;ci<3;ci++){
      const cx=((t*speed+ci*(W/3)+layer*120)%(W+200))-100;
      const rad=50+layer*20+ci*10;
      ctx.beginPath();ctx.ellipse(cx,cloudY,rad,8+layer*3,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+rad*0.5,cloudY-5,rad*0.6,6+layer*2,0,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

// Animated cars — one-way loop on actual road tiles only.
// SOUTHBOUND: col4 rows 1→18  EASTBOUND: row18 cols4→14
// NORTHBOUND: col14 rows18→1  WESTBOUND: row1 cols14→4 (top road)
// BONUS: row13 eastbound cols4→13 (+ westbound lower lane)
// City Bus: single polyline visiting every overlay lane + short axis-aligned corner bridges (matches car centres).
let _cityBusRoute=null;
function cityBusRoute(){
  if(_cityBusRoute)return _cityBusRoute;
  const c4wx=4*TILE+2, c4top=1*TILE+2, c4bot=18*TILE+2;
  const r18wy=18*TILE+4, r18L=4*TILE, r18R=14*TILE;
  const c14wx=14*TILE+14, r1wy=1*TILE+14;
  const r13wy=13*TILE+4, r13wyB=13*TILE+14, r13R=13*TILE;
  const segs=[
    [c4wx,c4top,c4wx,r13wy],[c4wx,r13wy,r13R,r13wy],[r13R,r13wy,r13R,r13wyB],[r13R,r13wyB,c4wx,r13wyB],
    [c4wx,r13wyB,c4wx,c4bot],[c4wx,c4bot,c4wx,r18wy],[c4wx,r18wy,r18L,r18wy],[r18L,r18wy,r18R,r18wy],
    [r18R,r18wy,r18R,c4bot],[r18R,c4bot,c14wx,c4bot],[c14wx,c4bot,c14wx,c4top],[c14wx,c4top,c14wx,r1wy],
    [c14wx,r1wy,r18R,r1wy],[r18R,r1wy,r18L,r1wy],[r18L,r1wy,c4wx,r1wy],[c4wx,r1wy,c4wx,c4top],
  ];
  let total=0;
  const lens=segs.map(([ax,ay,bx,by])=>{
    const L=Math.abs(bx-ax)+Math.abs(by-ay);
    total+=L;
    return L;
  });
  _cityBusRoute={segs,lens,total};
  return _cityBusRoute;
}

/** World position along full street loop; encounter tile is centred on this point. */
function movingBusWorldXY(tick){
  const {segs,lens,total}=cityBusRoute();
  const speed=0.78;
  let s=(tick*speed)%total;
  for(let i=0;i<segs.length;i++){
    const Li=lens[i];
    if(s<Li){
      const [ax,ay,bx,by]=segs[i];
      const u=Li>0?s/Li:0;
      const px=ax+(bx-ax)*u;
      const py=ay+(by-ay)*u;
      return {wx:Math.floor(px-TILE/2),wy:Math.floor(py-TILE/2)};
    }
    s-=Li;
  }
  const [ax,ay]=segs[0];
  return {wx:Math.floor(ax-TILE/2),wy:Math.floor(ay-TILE/2)};
}

function drawMovingCityBusEncounter(tick){
  if(G.cleared[4])return;
  const {wx,wy}=movingBusWorldXY(tick);
  const sx=Math.floor(wx-G.camX);

const CAVE_DRAW_OFFSET_Y = 20; // shift cave down a bit, leaving room for HUD

// Wall-mounted torch — sconce + shaft + layered flame (warm flicker)
function drawCaveTorch(px,py,phase){
  const t=G.tick;
  const fk=Math.sin(t*0.17+phase)*0.5+0.5;
  const fk2=Math.sin(t*0.41+phase*1.9)*0.5+0.5;
  const flick=fk*0.62+fk2*0.38;
  const bx=Math.floor(px), by=Math.floor(py);

  // Wall shadow behind bracket (reads as mounted on cave wall)
  r(bx-10,by+6,12,28,'rgba(0,0,0,0.35)');
  // Iron sconce: strap + shelf holding the bowl
  r(bx-9,by+8,5,22,'#1e1814');
  r(bx-10,by+12,8,5,'#282018'); // arm into room
  r(bx-10,by+18,9,4,'#302218');
  // Fire bowl / cradle
  r(bx-8,by+7,12,6,'#3a2e22');
  r(bx-7,by+8,10,4,'#261e18');
  r(bx-6,by+11,8,2,'#141008'); // bowl lip shadow

  // Wooden shaft + bindings (classic handheld torch read)
  r(bx-5,by+14,8,30,'#463428');
  r(bx-6,by+22,10,3,'#2a2018');
  r(bx-6,by+34,10,3,'#2a2018');
  r(bx-6,by+42,10,2,'#1c1410'); // charred tip

  // Flame origin — sits in bowl, wanders slightly with draft
  const ox=Math.round((flick-0.5)*3), oy=Math.round((fk2-0.5)*2);
  const fx=bx+ox+2, fy=by+oy+5;

  ctx.save();
  // Wide ambient halo (reads as light on nearby rock)
  const halo=ctx.createRadialGradient(fx+5,fy-14,1,fx+6,fy-10,38+flick*14);
  halo.addColorStop(0,`rgba(255,245,190,${0.35+flick*0.35})`);
  halo.addColorStop(0.25,`rgba(255,160,55,${0.22+flick*0.18})`);
  halo.addColorStop(0.55,`rgba(200,80,25,${0.08+flick*0.06})`);
  halo.addColorStop(1,'rgba(60,20,8,0)');
  ctx.fillStyle=halo;
  ctx.fillRect(bx-36,by-52,88,72);

  // Outer flame body — stacked taper (pixel torch silhouette)
  const layers=[
    {x:-11,y:-24,w:26,h:15,a:`rgba(255,${72+fk*40},18,${0.82+flick*0.18})`},
    {x:-9,y:-32,w:22,h:13,a:`rgba(255,${108+fk*45},28,${0.78+flick*0.22})`},
    {x:-7,y:-40,w:17,h:11,a:`rgba(255,${150+fk*50},48,${0.72+flick*0.28})`},
    {x:-5,y:-47,w:12,h:9,a:`rgba(255,210,120,${0.65+flick*0.3})`},
    {x:-3,y:-54,w:8,h:8,a:`rgba(255,248,220,${0.55+flick*0.35})`},
  ];
  for(const L of layers){
    r(fx+L.x,fy+L.y,L.w,L.h,L.a);
  }
  // Core hotspot (bright tongue)
  const coreW=4+Math.round(flick*2), coreH=5+Math.round(fk*2);
  r(fx-Math.floor(coreW/2),fy-50,coreW,coreH,`rgba(255,255,235,${0.75+flick*0.25})`);

  // Occasional upward sparks
  const sp=(Math.floor(t*0.85+phase*40)%31);
  if(sp<5){
    const sx=fx+4+(sp%3), sy=fy-56-(sp+t)%9;
    r(sx,sy,2,2,`rgba(255,230,160,${0.6+flick*0.4})`);
    r(sx-3,sy-4,1,1,'rgba(255,200,80,0.85)');
  }
  ctx.restore();

  // Warm pool on floor below
  const fg=ctx.createLinearGradient(bx-40,by+42,bx+44,by+58);
  fg.addColorStop(0,'rgba(255,90,30,0)');
  fg.addColorStop(0.45,`rgba(255,110,45,${0.055+flick*0.07})`);
  fg.addColorStop(1,'rgba(255,90,30,0)');
  ctx.fillStyle=fg;
  ctx.fillRect(bx-42,by+40,88,22);
}

            r(x+4,y+6,TILE-8,TILE-12,'rgba(18,10,16,0.92)');
            const flick=Math.sin(G.tick*0.09)*0.5+0.5;
            r(x+10,y+8,TILE-20,TILE-18,`rgba(28,18,32,${0.45+flick*0.2})`);
            drawEncounterSpriteOnTile('naked', x, y, G.tick);
            ctx.fillStyle='#f8e8e8'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
            ctx.fillText('Naked',x+TILE/2,y-26);
            ctx.fillText('Man',x+TILE/2,y-18);
            ctx.textAlign='left';
            ctx.fillStyle=`rgba(140,25,38,${0.18+flick*0.32})`;
            ctx.fillRect(x+22,y+12,4,3);
          } else {
            r(x,y,TILE,TILE,C.caveF);
            r(x,y,TILE,1,C.caveFL); r(x,y,1,TILE,C.caveFL);
          }
          break;
        case T_BOARD:

          if(G.cleared[2]&&!G.hasBoarding){

            ctx.fillStyle='#706030';ctx.font='7px monospace';
            ctx.fillText('BCN',x+9,y+18);
          }
          break;
      }
    }
  }
  // Wall torches — spaced along the cave route (flicker phases staggered)
  drawCaveTorch(2*TILE+10,3*TILE+off-6,0);
  drawCaveTorch(8*TILE+4,4*TILE+off-8,1.7);
  drawCaveTorch(14*TILE-6,5*TILE+off-4,0.9);
  drawCaveTorch(17*TILE+2,4*TILE+off-6,3.1);

  ctx.fillStyle='rgba(18,8,28,0.22)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.fillRect(0,0,W,72);

  ctx.fillStyle='rgba(0,0,0,0.32)';
  ctx.fillRect(0,CROWS*TILE+off,W,H-(CROWS*TILE+off));
}

// Bright clear-day vista for May's flat window — no rain

  const ph=Math.sin(t*0.0007)*0.5+0.5;

  const sk=ctx.createLinearGradient(0,0,0,skyH);
  sk.addColorStop(0,`rgb(${218+Math.floor(ph*28)},${238+Math.floor(ph*14)},255)`);
  sk.addColorStop(0.38,`rgb(${255},${228+Math.floor(ph*18)},${178+Math.floor(ph*12)})`);
  sk.addColorStop(0.72,`rgb(${255},${194+Math.floor(ph*14)},${132+Math.floor(ph*10)})`);
  sk.addColorStop(1,`rgb(${248},${168+Math.floor(ph*12)},${108})`);
  ctx.fillStyle='#f4fbff';
  ctx.fillRect(0,0,W,H);

  ctx.fillRect(0,0,W,skyH);

  const sunX=W*0.74, sunY=H*0.06;

  outer.addColorStop(0,'rgba(255,254,248,0.98)');

  outer.addColorStop(0.48,'rgba(255,210,120,0.28)');
  outer.addColorStop(1,'rgba(255,175,90,0)');
  ctx.fillStyle=outer;
  ctx.beginPath(); ctx.arc(sunX,sunY,240,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fffef8';
  ctx.beginPath(); ctx.arc(sunX,sunY,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,252,215,0.95)';
  ctx.beginPath(); ctx.arc(sunX,sunY,17,0,Math.PI*2); ctx.fill();

  const drift=Math.sin(t*0.018)*14;
  ctx.globalAlpha=0.96;

// Paint order for May flat (lower = drawn first / farther back in room).
function mayFlatPieceZ(t){
  if(t==='moving_boxes')return 0;
  if(t==='kitchen')return 1;
  if(t==='fridge')return 2;
  if(t==='table_large'||t==='table_small')return 3;
  if(t==='couch')return 4;
  return 2;
}

    r(sinkX+3,sinkY+3,sinkW-6,6,'#b8bcc0');

    r(tcx-2,sinkY-9,8,2,'#989ca0');
    const stoveX=ax+36, stoveY=ay+3, stoveW=w-(stoveX-ax)-8;

    ctx.beginPath(); ctx.moveTo(x1+4,yTop+Math.floor(b2h*0.4)); ctx.lineTo(x1+bw-4,yTop+Math.floor(b2h*0.4)); ctx.stroke();

}

// Shared May flat — schematic layout + bottom-left door
function drawMayFlatRoom(RX,RY,RW,RH,tick,opts){
  opts=opts||{};
  const skipWindow=!!opts.skipWindow;

  const hg=ctx.createRadialGradient(W*0.5,H*0.46,80,W*0.52,H*0.58,420);
  hg.addColorStop(0,'#151210'); hg.addColorStop(1,'#2a2420');
  ctx.fillStyle=hg; ctx.fillRect(0,0,W,H);

  const floor='#ccb892';
  r(RX,RY,RW,RH,floor);
  const flatG=MAY_FLAT_GRID;
  const kCut=MAY_FLAT_KITCHEN_X0;
  ctx.save();
  ctx.beginPath();
  ctx.rect(RX,RY,kCut,RH);
  ctx.clip();
  for(let py=RY;py<RY+RH;py+=flatG){
    ctx.fillStyle='rgba(52,38,26,0.07)';
    ctx.fillRect(RX,py+flatG-1,kCut,1);
    ctx.fillStyle='rgba(255,252,248,0.05)';
    ctx.fillRect(RX,py,kCut,1);
  }
  for(let px=RX+flatG;px<RX+kCut;px+=flatG*3){
    ctx.fillStyle='rgba(52,38,26,0.055)';
    ctx.fillRect(px,RY,1,RH);
  }
  ctx.restore();

  // Kitchen zone floor — ceramic checkerboard (east strip), distinct from wood planks
  (function mayFlatKitchenFloor(){
    const kx=RX+MAY_FLAT_KITCHEN_X0, kw=MAY_FLAT_KITCHEN_W, ky=RY, kh=RH;
    const cs=MAY_FLAT_GRID;
    for(let iy=0;iy<kh;iy+=cs){
      for(let ix=0;ix<kw;ix+=cs){
        const cx=kx+ix, cy=ky+iy;
        const alt=(Math.floor(ix/cs)+Math.floor(iy/cs))%2===0;
        r(cx,cy,Math.min(cs,kw-ix),Math.min(cs,kh-iy), alt?'#d4d0c6':'#c8c2b4');
      }
    }
    ctx.strokeStyle='rgba(88,82,72,0.22)';
    ctx.lineWidth=1;
    for(let gx=kx;gx<kx+kw;gx+=cs){
      ctx.beginPath();
      ctx.moveTo(gx+0.5,ky); ctx.lineTo(gx+0.5,ky+kh); ctx.stroke();
    }
    for(let gy=ky;gy<ky+kh;gy+=cs){
      ctx.beginPath();
      ctx.moveTo(kx,gy+0.5); ctx.lineTo(kx+kw,gy+0.5); ctx.stroke();
    }
    ctx.strokeStyle='rgba(60,54,48,0.35)';
    ctx.strokeRect(kx+0.5,ky+0.5,kw-1,kh-1);
  })();

  const dz0=MAY_FLAT_DOOR_ZONE_REL;
  const base='#9a7860';
  r(RX,RY+RH-6,dz0.x,6,base);
  r(RX+dz0.x+dz0.w,RY+RH-6,RW-dz0.x-dz0.w,6,base);

  const wallMain='#ebeae8';
  r(RX-14,RY-28,16,RH+36,wallMain);
  r(RX+RW-2,RY-28,16,RH+36,wallMain);
  r(RX-14,RY-30,RW+28,26,'#f6f5f4');
  ctx.strokeStyle='rgba(0,0,0,0.055)'; ctx.lineWidth=1;
  ctx.strokeRect(RX-13,RY-29,RW+26,24);
  r(RX-14,RY-34,RW+28,6,'#e8e8e6');

  if(!skipWindow) renderMayFlatWindow(RX,RY,RW,RH,tick);

  // Kitchen nook — wall tiles aligned with kitchen floor strip
  (function mayFlatKitchenTiles(){
    const bx=RX+MAY_FLAT_KITCHEN_X0, by=RY-26, bw=MAY_FLAT_KITCHEN_W, bh=RY+RH-12-by;
    r(bx,by,bw,bh,'#e4d4bc');
    ctx.strokeStyle='rgba(125,108,88,0.38)';
    ctx.lineWidth=1;
    for(let gx=bx;gx<bx+bw;gx+=15){
      for(let gy=by;gy<by+bh;gy+=13){
        if(gx>=bx+bw-17&&gy<by+30)continue;
        ctx.strokeRect(Math.floor(gx)+0.5,Math.floor(gy)+0.5,14,12);
      }
    }
    r(bx+bw-18,by,18,32,'#ebeae8');
    ctx.strokeStyle='rgba(72,66,60,0.12)'; ctx.strokeRect(bx+0.5,by+0.5,bw-1,bh-1);
  })();

  (function(){
    const px=RX+MAY_FLAT_WIN_REL.x+MAY_FLAT_WIN_REL.w+8, py=RY-28, pw=44, ph=26;
    r(px-3,py-3,pw+6,ph+6,'#453c36');
    r(px-1,py-1,pw+2,ph+2,'#ddd8d0');
    r(px,py,pw,ph,'#faf8f4');
    ctx.fillStyle='#2a2830'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText('MAY', px+pw/2, py+9);
    ctx.textAlign='left';
    const gx0=px+5, gy0=py+11, cellW=(pw-10)/7, cellH=(ph-14)/5;
    ctx.strokeStyle='rgba(55,55,68,0.28)'; ctx.lineWidth=1;
    for(let row=0;row<5;row++) for(let col=0;col<7;col++){
      ctx.strokeRect(gx0+col*cellW+0.5, gy0+row*cellH+0.5, cellW-1, cellH-1);
    }
    ctx.strokeStyle='#c03038'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(px+pw-13, py+ph-9, 5.2, 0, Math.PI*2); ctx.stroke();
  })();

  const flatDrawOrder=[...MAY_FLAT_LAYOUT_REL].sort((a,b)=>{
    const za=mayFlatPieceZ(a.type), zb=mayFlatPieceZ(b.type);
    if(za!==zb)return za-zb;
    return (a.y+a.h)-(b.y+b.h);
  });
  for(const o of flatDrawOrder){
    drawMayFlatFurniturePiece(RX+o.x,RY+o.y,o);
  }

  (function mayFlatPackClutter(){
    const x0=RX+40, y0=RY+124;
    r(x0,y0,28,6,'#c83838'); r(x0+4,y0-2,18,4,'#f0ece8');
    r(RX+224,RY+168,16,8,'#e8e4dc'); r(RX+226,RY+170,12,3,'#584848');
    r(RX+76,RY+96,14,5,'#d8d0c8'); ctx.strokeStyle='rgba(80,72,64,0.35)';
    ctx.strokeRect(RX+76.5,RY+96.5,13,4);
    if(!skipWindow&&!G.cleared[5])
      drawMayFlatAirpodsOnTable(RX+150,RY+62,tick);
  })();

  const dz=MAY_FLAT_DOOR_ZONE_REL;
  const ddx=RX+dz.x, ddy=RY+RH-10;
  r(ddx,ddy,dz.w,10,'#4a3038');
  r(ddx+3,ddy+10,dz.w-6,4,'#f0c8d8');
  ctx.strokeStyle='rgba(30,18,24,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(ddx+0.5,ddy+0.5,dz.w-1,9);
}

function normalizeDialogSpeaker(sp){
  return String(sp||'').replace(/^\u2605\s*/,'').trim();
}

/** Word-wrap for monospace dialog / battle cards — keeps text inside panel width */
function wrapDialogCanvasLines(ctx,text,maxWidth){
  const s=String(text||'').trim();
  if(!s)return[''];
  const words=s.split(/\s+/).filter(Boolean);
  const lines=[];
  let cur='';
  for(const w of words){
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width<=maxWidth) cur=test;
    else {
      if(cur) lines.push(cur);
      if(ctx.measureText(w).width>maxWidth){
        let acc='';
        for(let i=0;i<w.length;i++){
          const ch=w[i];
          const t2=acc+ch;
          if(ctx.measureText(t2).width<=maxWidth) acc=t2;
          else {
            if(acc) lines.push(acc);
            acc=ch;
          }
        }
        cur=acc;
      } else cur=w;
    }
  }
  if(cur) lines.push(cur);
  return lines.length?lines:[''];
}

/** Portrait inside dialog frame — aspect-preserving (no stretch), letterboxed */
function drawDialogPortraitFit(img, px, py, pw, ph){
  if(!img.complete||img.naturalWidth<=0)return;
  const nw=img.naturalWidth, nh=img.naturalHeight;
  const sc=Math.min(pw/nw, ph/nh);
  const dw=Math.round(nw*sc), dh=Math.round(nh*sc);
  const ox=px+Math.round((pw-dw)/2), oy=py+Math.round((ph-dh)/2);
  ctx.fillStyle='#161624';
  ctx.fillRect(px,py,pw,ph);
  ctx.drawImage(img,0,0,nw,nh,ox,oy,dw,dh);
}

function drawDialog(lines,speaker='',opts){
  opts=opts||{};
  const narrowBattle=!!opts.narrowBattle;
  const bx=6;
  const bw=narrowBattle?Math.floor(W-238):(W-12);
  let bh=narrowBattle?116:122;
  let by=narrowBattle?(H-14-bh):(H-128);
  const norm=normalizeDialogSpeaker(speaker);
  const nl=norm.toLowerCase();
  let portraitImg=null;
  if(nl==='grandma') portraitImg=DIALOG_GRANDMA_PORTRAIT;
  else if(nl==='gary') portraitImg=DIALOG_GARY_PORTRAIT;
  else if(nl==='may') portraitImg=DIALOG_MAY_PORTRAIT;
  else if(nl==='wing') portraitImg=DIALOG_WING_PORTRAIT;
  else if(nl==='sadonna') portraitImg=DIALOG_SADONNA_PORTRAIT;
  else if(nl==='kobe') portraitImg=DIALOG_KOBE_PORTRAIT;
  else if(nl==='dad') portraitImg=DIALOG_DAD_PORTRAIT;
  else if(nl==='jo') portraitImg=DIALOG_JO_PORTRAIT;
  else if(nl==='charlie') portraitImg=CHARLIE_IMG;
  const PW=96, PH=96;

  let textLeft=bx+16;
  if(portraitImg)
    textLeft=Math.min(bx+12+PW+18, bx+bw-52);

  let wrappedBody=[];
  let lineGap=narrowBattle?17:21;
  let bodyFontPx=narrowBattle?12:14;
  if(narrowBattle){
    ctx.font=`${bodyFontPx}px monospace`;
    const maxTextW=Math.max(64,(bx+bw)-textLeft-14);
    for(const ln of lines){
      for(const raw of String(ln||'').split('\n'))
        wrappedBody.push(...wrapDialogCanvasLines(ctx,raw,maxTextW));
    }
    const lineCount=Math.max(1,wrappedBody.length);
    const innerNeed=34+lineCount*lineGap+26;
    const battleMaxH=Math.min(292,H-36);
    bh=Math.min(Math.max(116,innerNeed),battleMaxH);
    by=H-14-bh;
  }

  if(speaker){
    const labelSpeaker=String(speaker).trim();
    ctx.font='bold 12px monospace';
    const chipW=Math.min(bw-12,Math.max(72,ctx.measureText(labelSpeaker).width+18));
    r(bx,by-24,chipW+4,24,C.uiB); r(bx+2,by-22,chipW,20,C.uiBg);
    ctx.fillStyle=C.white;
    ctx.save();
    ctx.beginPath(); ctx.rect(bx+6,by-21,chipW-4,17); ctx.clip();
    ctx.fillText(labelSpeaker,bx+9,by-8);
    ctx.restore();
  }

  r(bx-3,by-3,bw+6,bh+6,C.uiB);
  r(bx,by,bw,bh,C.uiBg);
  ctx.strokeStyle=C.uiB2;ctx.lineWidth=2;ctx.strokeRect(bx+5,by+5,bw-10,bh-10);
  ctx.strokeStyle=C.uiB;ctx.lineWidth=1;ctx.strokeRect(bx+7,by+7,bw-14,bh-14);

  if(portraitImg){
    const px=bx+12, py=by+bh-PH-12;
    const img=portraitImg;
    if(img.complete && img.naturalWidth>0){
      drawDialogPortraitFit(img, px, py, PW, PH);
    } else {
      r(px,py,PW,PH,'#161624');
    }
    ctx.strokeStyle=C.uiB2;ctx.lineWidth=2;ctx.strokeRect(px+1,py+1,PW-2,PH-2);
    ctx.strokeStyle=C.uiB;ctx.lineWidth=1;ctx.strokeRect(px+3,py+3,PW-6,PH-6);
  }

  ctx.fillStyle=C.white;
  ctx.font=`${bodyFontPx}px monospace`;
  const innerPanelTop=by+9;
  const textTop=innerPanelTop+(narrowBattle?8:10);
  const clipX=textLeft-8;
  const clipY=innerPanelTop;
  const clipW=Math.max(40,(bx+bw-10)-clipX);
  const clipBottomPad=narrowBattle?18:14;
  const clipH=Math.max(40,(by+bh-clipBottomPad)-clipY);
  ctx.save();
  ctx.beginPath();
  ctx.rect(clipX,clipY,clipW,clipH);
  ctx.clip();
  ctx.textBaseline='top';
  let ly=textTop;
  if(narrowBattle){
    for(const wl of wrappedBody){
      ctx.fillText(wl,textLeft,ly);
      ly+=lineGap;
    }
  } else {
    ctx.font='14px monospace'; lineGap=21;
    const maxTextW=(bx+bw)-textLeft-14;
    for(const ln of lines){
      for(const raw of String(ln||'').split('\n')){
        const subLines=wrapDialogCanvasLines(ctx,raw,maxTextW);
        for(const sl of subLines){
          ctx.fillText(sl,textLeft,ly);
          ly+=lineGap;
        }
      }
    }
  }
  ctx.restore();

  if(Math.floor(Date.now()/480)%2===0){
    ctx.fillStyle=C.uiB; ctx.fillText('\u25bc',bx+bw-22,by+bh-10);
  }
}

function drawCockpitNightHKProcedural(wx,wy,ww,wh,t,spx){
  spx=spx||0;
  const g=ctx.createLinearGradient(wx,wy,wx,wy+wh);
  g.addColorStop(0,'#181008');
  g.addColorStop(0.3,'#3e2618');
  g.addColorStop(0.55,'#6a3820');
  g.addColorStop(1,'#0c0606');
  ctx.fillStyle=g;
  ctx.fillRect(Math.floor(wx),Math.floor(wy),Math.ceil(ww),Math.ceil(wh));
  ctx.fillStyle='rgba(255,140,60,0.1)';
  ctx.fillRect(Math.floor(wx),Math.floor(wy+wh*0.26),Math.ceil(ww),14);
  const px1=Math.floor((t*0.16+spx*0.22)%28);
  for(let i=-1;i<Math.ceil(ww/36)+2;i++){
    const bx=Math.floor(wx+i*38-px1);
    const bw=20+((i*13+t)>>2)%16;
    const bh=Math.floor(wh*(0.26+(((i<<3)+(t>>1))%42)/125));
    ctx.fillStyle='#0c0404';
    ctx.fillRect(bx,Math.floor(wy+wh-bh),bw,bh);
    const seed=i*31+(t>>2);
    ctx.fillStyle='#f4dc78';
    for(let ry=10;ry<bh-4;ry+=11){
      for(let rx=5;rx<bw-5;rx+=8){
        if((((seed+rx+ry)>>2)%6)!==0) ctx.fillRect(bx+rx,Math.floor(wy+wh-bh+ry),4,5);
      }
    }
  }
  const px2=Math.floor((t*0.26+spx*0.34)%20);
  for(let i=-1;i<Math.ceil(ww/46)+2;i++){
    const bx=Math.floor(wx+i*50-px2);
    const bw=28+((i*17+t)%22);
    const bh=Math.floor(wh*(0.38+(((i*5)+(t>>1))%48)/95));
    ctx.fillStyle='#050203';
    ctx.fillRect(bx,Math.floor(wy+wh-bh),bw,bh);
    ctx.fillStyle='#c8a060';
    const seed2=i*19+t;
    for(let ry=12;ry<bh;ry+=13){
      for(let rx=7;rx<bw-5;rx+=9){
        if((((seed2+rx*3+ry)>>3)%5)!==0) ctx.fillRect(bx+rx,Math.floor(wy+wh-bh+ry),3,4);
      }
    }
  }
}

function drawCockpitWindshieldBackdrop(wx,wy,ww,wh,t,spx){
  spx=spx||0;
  const drift=Math.floor(spx*0.58)%512;
  const img=COCKPIT_HK_BG;
  if(img.complete&&img.naturalWidth>0){
    const iw=img.naturalWidth, ih=img.naturalHeight;
    const sc=Math.max(ww/iw,wh/ih);
    const dw=Math.ceil(iw*sc), dh=Math.ceil(ih*sc);
    const dx=Math.floor(wx+(ww-dw)/2-drift*0.35), dy=Math.floor(wy+(wh-dh)/2);
    ctx.drawImage(img,0,0,iw,ih,dx,dy,dw,dh);
    ctx.fillStyle='rgba(48,26,16,0.22)';
    ctx.fillRect(Math.floor(wx),Math.floor(wy),Math.ceil(ww),Math.ceil(wh));
  }else drawCockpitNightHKProcedural(wx,wy,ww,wh,t,spx);
  ctx.fillStyle='rgba(12,10,14,0.14)';
  ctx.fillRect(Math.floor(wx),Math.floor(wy+wh*0.52),Math.ceil(ww),Math.ceil(wh*0.48));
}
