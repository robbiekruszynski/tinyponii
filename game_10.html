function playBusHonk(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    const ac=new AC();
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='square';
    o.frequency.setValueAtTime(280,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(110,ac.currentTime+0.14);
    g.gain.setValueAtTime(0.09,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime+0.42);
  }catch(_){}
}

function mayFlatFootBlocked(px,py){
  if(G.indLoc!=='may_apt')return false;
  const RX=MAY_APT_RX, RY=MAY_APT_RY;
  for(const o of MAY_FLAT_LAYOUT_REL){
    const ax=RX+o.x, ay=RY+o.y;
    if(px>ax&&px<ax+o.w&&py>ay&&py<ay+o.h)return true;
  }
  return false;
}
/** Sprite-centre / point → zone hit for future SPACE/use prompts ({ id, name, … }). */
function mayFlatFurnitureAt(px,py){
  const RX=MAY_APT_RX, RY=MAY_APT_RY;
  for(let i=MAY_FLAT_LAYOUT_REL.length-1;i>=0;i--){
    const o=MAY_FLAT_LAYOUT_REL[i];
    const ax=RX+o.x, ay=RY+o.y;
    if(px>=ax&&px<=ax+o.w&&py>=ay&&py<=ay+o.h)return o;
  }
  return null;
}

function extTile(col,row){
  if(col<0||col>=ECOLS||row<0||row>=EROWS)return T_VOID;
  return EXT_MAP[row][col];
}
// Any foot/hit box sample overlapping a door tile (single-point checks miss the narrow house door)
function doorTileUnderMay(){
  const seeds=[];
  for(const [px,py] of [[G.mx+9,G.my+8],[G.mx+9,G.my+14],[G.mx+9,G.my+22],[G.mx+9,G.my+30],[G.mx+5,G.my+18],[G.mx+13,G.my+18]]){
    seeds.push([Math.floor(px/TILE),Math.floor(py/TILE)]);
  }
  const seen=new Set();
  for(const [col,row] of seeds){
    for(const [dc,dr] of [[0,0],[0,-1],[0,-2],[0,1],[-1,0],[1,0]]){
      const c=col+dc,r=row+dr;
      const key=c+','+r;
      if(seen.has(key))continue;
      seen.add(key);
      const tt=extTile(c,r);
      if(tt===T_HOUSE_D||tt===T_CAFE_D||tt===T_JO_DOOR||tt===T_APT_D)return tt;
    }
  }
  return null;
}

function caveTile(col,row){
  if(col<0||col>=CCOLS||row<0||row>=CROWS)return T_CAVE_W;
  return CAVE_MAP[row][col];
}
function canStepExt(x,y){
  const pts=[[x+2,y+2],[x+16,y+2],[x+2,y+20],[x+16,y+20]];
  return pts.every(([px,py])=>EXT_WALK.has(extTile(Math.floor(px/TILE),Math.floor(py/TILE))));
}
function canStepCave(x,y){
  const pts=[[x+2,y+2],[x+16,y+2],[x+2,y+20],[x+16,y+20]];
  return pts.every(([px,py])=>CAVE_WALK.has(caveTile(Math.floor(px/TILE),Math.floor(py/TILE))));
}
function canStepInd(x,y){
  const house=G.indLoc==='house'||G.indLoc==='jo_house';
  const apt=G.indLoc==='may_apt';
  const RX=apt?MAY_APT_RX:(house?160:180), RY=apt?MAY_APT_RY:(house?80:100), RW=apt?MAY_APT_RW:(house?320:280);
  const pts=[[x+2,y+2],[x+16,y+2],[x+2,y+20],[x+16,y+20]];
  const maxPy=apt?MAY_APT_MAXPY:(house?340:325);
  const inBounds=([px,py])=>px>=RX+10&&px<=RX+RW-30&&py>=RY+20&&py<=maxPy;
  if(apt)return pts.every(p=>inBounds(p)&&!mayFlatFootBlocked(p[0],p[1]));
  return pts.every(inBounds);
}

// Family dish stack + wash bucket (reads as pail — wide rim, taper, bail — not a tower)
function drawDishesEncounter(ox,oy,tick=0){
  const x=Math.floor(ox),y=Math.floor(oy);
  const wobble=Math.floor(Math.sin(tick*0.08)*2);
  const yy=y+wobble;
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.beginPath(); ctx.ellipse(x+28,yy+31,24,4,0,0,Math.PI*2); ctx.fill();

  // --- Plate stack (left): horizontal ellipses only ---
  const lx=x+6, sy=yy+10;
  ctx.strokeStyle='#9a9caf'; ctx.lineWidth=1;
  for(let i=0;i<6;i++){
    const dy=sy+i*3.5;
    const rw=15-i*0.35;
    ctx.fillStyle=i%2===0?'#eef0f6':'#dde2ec';
    ctx.beginPath(); ctx.ellipse(lx+11,dy,rw,3.2,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  }
  ctx.fillStyle='#fafbff'; ctx.beginPath(); ctx.ellipse(lx+11,sy-3,9,2.8,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // --- Plastic / enamel bucket (right): opening wider than base + wire handle ---
  const bx=x+30, by=yy+10;
  ctx.fillStyle='#95a0ac';
  ctx.beginPath();
  ctx.moveTo(bx+3, by+9);
  ctx.bezierCurveTo(bx, by+17, bx+1, by+25, bx+6, by+29);
  ctx.lineTo(bx+22, by+29);
  ctx.bezierCurveTo(bx+27, by+25, bx+28, by+17, bx+25, by+9);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='#687484'; ctx.stroke();

  ctx.fillStyle='#c8d0d8';
  ctx.beginPath(); ctx.ellipse(bx+14, by+9, 13, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#7a8894'; ctx.stroke();

  ctx.fillStyle='#6aacd8';
  ctx.beginPath(); ctx.ellipse(bx+14, by+11, 10, 3.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.ellipse(bx+11,by+10,3,1.2,0,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='#5a6874'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath();
  ctx.arc(bx+14, by+8, 12, Math.PI*1.08, Math.PI*1.92);
  ctx.stroke();
  ctx.lineCap='butt'; ctx.lineWidth=1;
}

// ============================================================
// 6. EXTERIOR MAP DRAWING  (with camera)
// ============================================================
function updateCamera(){
  G.camX=Math.max(0,Math.min(Math.floor(G.mx+9-W/2),(ECOLS-20)*TILE));
  G.camY=Math.max(0,Math.min(Math.floor(G.my+11-H/2),(EROWS-15)*TILE));
}

function drawExtTile(col,row){
  const sx=col*TILE-G.camX, sy=row*TILE-G.camY;
  if(sx>W||sx<-TILE||sy>H||sy<-TILE)return;
  const t=EXT_MAP[row][col];
  const tk=G.tick;

  // Determine if this tile is on a car road (for street rendering)
  const isHRoad=(row===1||row===13||row===18); // row 1 = north arterial (westbound cars), not sidewalk
  const isVRoad=(col===4||col===14);  // vertical car roads

  switch(t){
    case T_VOID: {
      // Sky shows through most void tiles (north edge etc.).
      // West/east columns and south rim stay opaque so sunset layers don't bleed in stripes.
      if(col===0||col===ECOLS-1||row===EROWS-1)
        r(sx,sy,TILE,TILE,'#0a0a14');
      break;
    }

    case T_SIDE: {
      if(isHRoad||isVRoad){
        // Dark asphalt road
        r(sx,sy,TILE,TILE,'#252320');
        r(sx,sy,TILE,TILE,'rgba(180,80,20,0.05)');
        // Yellow centre dashes
        if(isHRoad&&col%2===0) r(sx+2,sy+TILE/2-1,TILE-4,2,'#d4a800');
        if(isVRoad&&row%2===0) r(sx+TILE/2-1,sy+2,2,TILE-4,'#d4a800');
        // SIDEWALK KERBS — raised lighter strips at road edges (pedestrian zones)
        if(isHRoad){
          r(sx,sy,TILE,4,'#9a8a68'); // top kerb = sidewalk strip
          r(sx,sy+TILE-4,TILE,4,'#9a8a68'); // bottom kerb
          r(sx,sy,TILE,1,'#baa880'); // highlight
          r(sx,sy+TILE-4,TILE,1,'#baa880');
        }
        if(isVRoad){
          r(sx,sy,4,TILE,'#9a8a68');
          r(sx+TILE-4,sy,4,TILE,'#9a8a68');
          r(sx,sy,1,TILE,'#baa880');
          r(sx+TILE-4,sy,1,TILE,'#baa880');
        }
        // Crosswalk zebra at intersections
        if((col===4&&(row===1||row===13||row===18))||(col===14&&(row===1||row===13||row===18))){
          for(let cw=0;cw<3;cw++) r(sx+4+cw*9,sy+5,6,TILE-10,'rgba(255,255,255,0.09)');
        }
        if((col+row*3)%5===0) r(sx+8,sy+18,12,4,'rgba(100,120,180,0.10)');
      } else {
        // Pavement / sidewalk — lighter warm flagstone
        r(sx,sy,TILE,TILE,'#7a6e52');
        if((col+row)%2===0) r(sx+1,sy+1,TILE-2,TILE-2,'#857560');
        r(sx,sy,TILE,1,'#9a8a6a'); r(sx,sy,1,TILE,'#9a8a6a');
        r(sx+TILE-1,sy,1,TILE,'#5a5040'); r(sx,sy+TILE-1,TILE,1,'#5a5040');
        if((col*7+row*3)%9===0) r(sx+6,sy+20,14,4,'rgba(200,80,40,0.07)');
      }
      break;
    }

    case T_MTN: {
      // Mountains behind grandma — dark silhouette at dusk
      const mh=(col*5+row*7)%3;
      r(sx,sy,TILE,TILE,'#2a2838'); // deep purple-grey base
      const pk=mh===0?3:mh===1?5:1;
      r(sx+pk,sy+2,TILE-pk*2,TILE-4,'#343048');
      r(sx+pk+4,sy+2,TILE-pk*2-8,TILE/2+2,'#3e3858'); // ridge
      // Warm amber sky-glow on peak tops
      r(sx+pk+6,sy+2,TILE-pk*2-12,6,'rgba(220,110,40,0.4)');
      // Dark tree silhouettes at base
      r(sx+2,sy+TILE-10,4,10,'#1a1828');
      r(sx+9,sy+TILE-14,5,14,'#1a1828');
      r(sx+18,sy+TILE-11,4,11,'#1a1828');
      r(sx+24,sy+TILE-13,5,13,'#1a1828');
      break;
    }

    case T_GRASS:
      // Dusk grass — deep green with amber edge
      r(sx,sy,TILE,TILE,'#2e4820');
      r(sx+2,sy+2,TILE-4,TILE-4,'#384e28');
      r(sx,sy,TILE,2,'rgba(180,90,20,0.2)'); // warm edge
      break;

    case T_WATER: {
      // Harbour water — static highlights (no scrolling shimmer / flash)
      r(sx,sy,TILE,TILE,'#1e4878');
      r(sx,sy,TILE,TILE,'rgba(40,100,180,0.6)');
      r(sx+4,sy+7,TILE-8,3,'rgba(100,170,230,0.28)');
      r(sx+6,sy+18,TILE-12,2,'rgba(140,200,250,0.22)');
      r(sx+2,sy+24,TILE-4,2,'rgba(70,130,200,0.22)');
      r(sx,sy,TILE,TILE,'rgba(200,100,30,0.06)');
      // Bottom-right pond: soft drifting shadows as fish below the surface
      if(col>=22&&row>=14&&row<=17){
        const fk=tk*0.04+col*7+row*11;
        for(let fi=0;fi<3;fi++){
          const ox=Math.sin(fk+fi*2.1)*5+(fi*11+col*3)%14;
          const oy=Math.cos(fk*0.7+fi)*3+fi*5;
          ctx.fillStyle='rgba(8,24,48,0.22)';
          ctx.beginPath();
          ctx.ellipse(sx+TILE/2+ox-4,sy+TILE/2+oy,10-fi*2,4-fi,0.15*(fi-1),0,Math.PI*2);
          ctx.fill();
        }
      }
      break;
    }

    case T_APT: {
      // Apartment building — HK residential tower, warm lit windows at dusk
      const aptBase=(col%2===0)?'#2e3a4e':'#283244';
      r(sx,sy,TILE,TILE,aptBase);
      r(sx+1,sy+1,TILE-2,TILE-2,'rgba(0,0,0,0.2)');
      // Window grid — most lit warm at dusk
      for(let wr=0;wr<2;wr++) for(let wc=0;wc<2;wc++){
        const lit=(col*5+row*7+wr*3+wc*11)%5!==0;
        const wx=sx+4+wc*14, wy=sy+5+wr*12;
        r(wx,wy,8,7,lit?'#f0c870':'#1a2030');
        if(lit){ r(wx+1,wy+1,3,2,'rgba(255,220,160,0.5)'); }
      }
      // AC units
      if((col+row)%3===0) r(sx+2,sy+3,6,4,'#1e2838');
      break;
    }

    case T_HOUSE:
      r(sx,sy,TILE,TILE,'#7a3828');
      r(sx+2,sy+2,TILE-4,TILE-4,'#b05838');
      if(row===9){
        r(sx,sy,TILE,7,C.houseRoof);
        r(sx+4,sy+1,TILE-8,6,'rgba(220,100,40,0.5)'); // sunset glow on roof
      }
      if(G.hasBoarding&&!G.farewellDone&&row===10){
        const lg=Math.floor(tk/10)%6; const lgoff=lg<3?lg:5-lg;
        r(sx+13,sy+2+lgoff,6,6,'#f8c060');
      }
      r(sx+6,sy+8,8,8,'#f8e898'); r(sx+18,sy+8,8,8,'#f8e898');
      break;

    case T_JO_HOUSE:
      r(sx,sy,TILE,TILE,'#7a3828');
      r(sx+2,sy+2,TILE-4,TILE-4,'#b05838');
      if(row===9){
        r(sx,sy,TILE,7,C.houseRoof);
        r(sx+4,sy+1,TILE-8,6,'rgba(220,100,40,0.5)');
      }
      r(sx+6,sy+8,8,8,'#f8e898'); r(sx+18,sy+8,8,8,'#f8e898');
      break;

    case T_CAFE:
      // NO TITLE — white building. Sign text drawn as overlay in drawExtNPCs (after all tiles).
      r(sx,sy,TILE,TILE,'#e8e4dc');
      r(sx+1,sy+1,TILE-2,TILE-2,'rgba(220,140,60,0.06)');
      // Header bar (dark strip — text added by overlay)
      if(row===2) r(sx,sy,TILE,16,'#111111');
      // Storefront glass drawn once in drawNoTitleCafeWindowOverlay (multi-tile, ~4× prior area)
      break;

    case T_BLDG: {
      // ── HK CITY BUILDING — rich dusk palette ──
      // Vary building style by position (grandma / village side cols 17+ → warm red tones like village houses)
      const villageEast=col>=17;
      const style=(col*3+row*7)%5;
      const bases=villageEast
        ?['#5a2218','#682818','#4a1e14','#722820','#5e2618']
        :['#1e2d42','#243040','#1a2838','#2a3048','#223038'];
      const accents=villageEast
        ?['#7a3830','#884028','#6a3028','#904038','#783428']

    }
  }
}

// opts.skyOnly: gradient + sun + rays + clouds only (no baked mountains/skyline/harbour).
// Use when parallax draws the sole horizon — avoids double-stacked city silhouettes (title screen).
function drawSunsetSky(opts){
  opts=opts||{};
  const skyOnly=!!opts.skyOnly;
  const t=G.tick;
  const ph=Math.sin(t*0.0006)*0.5+0.5;

  // Northern sky band + deep void below — full-width sunset only reads from the top
  const skyBand=Math.floor(H*0.64);
  const sky=ctx.createLinearGradient(0,0,0,skyBand);
  sky.addColorStop(0.00,`rgb(${18+Math.floor(ph*10)},10,${50+Math.floor(ph*20)})`);
  sky.addColorStop(0.18,`rgb(${55+Math.floor(ph*25)},22,${80+Math.floor(ph*20)})`);
  sky.addColorStop(0.36,`rgb(${150+Math.floor(ph*40)},${60+Math.floor(ph*20)},50)`);
  sky.addColorStop(0.55,`rgb(${220+Math.floor(ph*25)},${115+Math.floor(ph*28)},40)`);
  sky.addColorStop(0.72,`rgb(${235},${145+Math.floor(ph*20)},55)`);
  sky.addColorStop(0.88,`rgb(${160+Math.floor(ph*22)},${72+Math.floor(ph*15)},38)`);
  sky.addColorStop(1.00,`rgb(${42+Math.floor(ph*18)},${28},${22})`);
  ctx.fillStyle='#0a0a14'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,skyBand);

  // Sun — large, upper-right
  const sunX=W*0.82, sunY=H*0.065;
  const oh=ctx.createRadialGradient(sunX,sunY,40,sunX,sunY,210);
  oh.addColorStop(0,'rgba(255,185,60,0.48)'); oh.addColorStop(0.4,'rgba(240,100,20,0.20)'); oh.addColorStop(1,'rgba(180,30,0,0)');
  ctx.fillStyle=oh; ctx.beginPath(); ctx.arc(sunX,sunY,210,0,Math.PI*2); ctx.fill();
  const ih=ctx.createRadialGradient(sunX,sunY,12,sunX,sunY,65);
  ih.addColorStop(0,'rgba(255,248,195,0.92)'); ih.addColorStop(0.5,'rgba(255,185,60,0.68)'); ih.addColorStop(1,'rgba(255,80,10,0)');
  ctx.fillStyle=ih; ctx.beginPath(); ctx.arc(sunX,sunY,65,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(255,${220+Math.floor(ph*28)},90,1)`;

    ctx.fillStyle=`rgba(255,${125+i*6},40,1)`;
    ctx.beginPath(); ctx.moveTo(sunX,sunY);
    ctx.lineTo(sunX+Math.cos(a-0.028)*H*2.5, sunY+Math.sin(a-0.028)*H*2.5);
    ctx.lineTo(sunX+Math.cos(a+0.028)*H*2.5, sunY+Math.sin(a+0.028)*H*2.5);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  if(!skyOnly){
  // Far mountains — shifted up so more skyline reads against the northern sky
  const may=H*0.50;

  const mtnA=[[0,85,72],[72,58,58],[130,105,62],[192,68,68],[260,115,57],[317,78,62],[379,100,58],[437,64,68],[505,120,58],[563,72,68],[631,95,58],[686,60,62],[746,110,57],[803,70,62]];

  for(const [bx,bh,bw] of sky2){

  hg.addColorStop(0.5,`rgba(${145},58,16,0.20)`); hg.addColorStop(1,'rgba(60,20,5,0)');
  ctx.fillStyle=hg; ctx.fillRect(0,hary,W,H*0.18);
  ctx.save(); ctx.globalAlpha=0.24+ph*0.10; ctx.strokeStyle=`rgba(255,${190+Math.floor(ph*42)},82,1)`; ctx.lineWidth=1;
  for(let sl=0;sl<7;sl++){const sy2=hary+sl*11;const sx2=((t*0.055+sl*75)%(W+110))-55;ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(sx2+55,sy2);ctx.stroke();}
  ctx.restore();

  } else {
  // One continuous dusk wash under the gradient — parallax layers sit on this (no second skyline from sky2/mountains)
  const wash=ctx.createLinearGradient(0,skyBand-90,0,H);
  wash.addColorStop(0,'rgba(52,34,38,0)');
  wash.addColorStop(0.22,'rgba(44,28,36,0.28)');
  wash.addColorStop(0.55,'rgba(28,20,34,0.72)');
  wash.addColorStop(1,'rgba(10,10,20,1)');
  ctx.fillStyle=wash;
  ctx.fillRect(0,skyBand-110,W,H-(skyBand-110)+8);
  }

  // Clouds — bigger and more visible
  ctx.save();
  for(const cs of [
    {sp:0.052,a:0.28+ph*0.08,cy:H*0.04,rs:[{r:90,h:16},{r:62,h:12},{r:40,h:10}]},
    {sp:0.082,a:0.20+ph*0.07,cy:H*0.10,rs:[{r:62,h:12},{r:42,h:10},{r:28,h:8}]},
    {sp:0.115,a:0.14+ph*0.05,cy:H*0.16,rs:[{r:44,h:10},{r:30,h:8},{r:20,h:6}]},
  ]){
    ctx.globalAlpha=cs.a; ctx.fillStyle='rgba(255,215,165,1)';
    for(let ci=0;ci<5;ci++){
      const cx=((t*cs.sp+ci*(W+90)/5)%(W+220))-110;
      for(let pi=0;pi<cs.rs.length;pi++){const {r:cr,h:ch}=cs.rs[pi];ctx.beginPath();ctx.ellipse(cx+pi*cr*0.52,cs.cy+pi*3,cr,ch,0,0,Math.PI*2);ctx.fill();}
    }
  }
  ctx.restore();
}


// ── PARALLAX BACKGROUND: 3 depth layers between sky and foreground ──
// Scrolls at fractional speeds relative to camera for depth illusion
function drawParallaxBg(opts){
  opts=opts||{};
  const hb=opts.horizonBoost|0;
  const t=G.tick;
  const phase=Math.sin(t*0.0006)*0.5+0.5;

  // Horizon Y — higher on screen → more parallax city reads above the tile field
  const horizY=Math.min(Math.floor(H*0.30), Math.max(5,-Math.floor(G.camY*0.35)+42))+hb;

  // ══ LAYER 1: Distant mountains (slowest parallax, 0.08× camera speed) ══
  const mx=-(G.camX*0.08);
  const mtnH=55;
  const mtnY=horizY+18;
  // Mountain silhouettes — purple-grey peaks blurred by distance
  ctx.save();ctx.globalAlpha=0.55;
  const mtnPeaks=[
    [0,mtnH*0.6,90],[90,mtnH*0.8,70],[160,mtnH*0.5,80],[240,mtnH*0.9,60],
    [300,mtnH*0.7,75],[375,mtnH*1.0,65],[440,mtnH*0.65,80],[520,mtnH*0.85,70],
    [590,mtnH*0.5,80],[670,mtnH*0.75,90],[760,mtnH*0.9,65],[825,mtnH*0.6,80],
  ];
  // Base gradient for mountains
  const mtnGrad=ctx.createLinearGradient(0,mtnY-mtnH,0,mtnY+20);
  mtnGrad.addColorStop(0,'rgba(55,45,80,0.9)');
  mtnGrad.addColorStop(0.6,'rgba(40,35,65,0.8)');
  mtnGrad.addColorStop(1,'rgba(30,25,50,0)');
  ctx.fillStyle=mtnGrad;
  for(const [bx,bh,bw] of mtnPeaks){
    const px=((bx+mx)%(W+200))-100; // parallax wrap
    // Draw as a trapezoid via overlapping rects
    const steps=Math.floor(bh/4);
    for(let s=0;s<steps;s++){
      const frac=s/steps;
      const w2=bw*(1-frac*0.7);
      const xoff=(bw-w2)/2;
      ctx.fillRect(px+xoff, mtnY-bh+s*4, w2, 5);
    }
    // Snow cap
    ctx.fillStyle='rgba(220,200,240,0.25)';
    ctx.fillRect(px+bw*0.3, mtnY-bh, bw*0.4, 8);
    ctx.fillStyle=mtnGrad;
    // Amber glow on peak edge from setting sun
    ctx.fillStyle='rgba(200,100,40,0.15)';
    ctx.fillRect(px+bw*0.55, mtnY-bh, bw*0.2, bh*0.4);
    ctx.fillStyle=mtnGrad;
  }
  ctx.restore();

  // ══ LAYER 2: Mid-distance blurred city (0.25× camera speed) ══
  const bx2=-(G.camX*0.25);
  const cityY=horizY+16;
  const cityBlds=[
    [10,65,24],[34,42,18],[52,78,22],[74,50,20],[94,88,18],[112,35,24],
    [136,70,20],[156,55,18],[174,82,22],[196,45,20],[216,68,18],[234,92,16],
    [250,50,22],[272,76,20],[292,58,18],[310,84,22],[332,48,20],[352,72,18],
    [370,62,22],[392,88,18],[410,44,24],[434,78,20],[454,56,18],[472,86,22],
    [494,48,20],[514,72,18],[532,60,22],[554,80,18],[572,46,24],[596,74,20],
    [616,58,18],[634,82,22],[652,50,20],[672,66,18],[690,90,22],[712,44,20],[734,76,22],[756,52,20],[778,84,24],[802,48,22],[826,68,20],
  ];
  ctx.save();ctx.globalAlpha=0.58;
  for(const [bbx,bbh,bbw] of cityBlds){
    const px=((bbx+bx2)%(W+300))-50;
    // Building face — very muted deep blue-purple
    const bldCol=`rgba(${28+Math.floor((bbx)%20)},${22+Math.floor((bbh)%15)},${52+Math.floor((bbx*bbh)%25)},1)`;
    ctx.fillStyle=bldCol;
    ctx.fillRect(px, cityY-bbh, bbw, bbh+8);
    // Tiny lit windows (sparse, warm)
    ctx.fillStyle='rgba(240,200,120,0.6)';
    for(let wr=0;wr<Math.floor(bbh/14);wr++){
      for(let wc=0;wc<Math.floor(bbw/10);wc++){
        if((bbx*3+bbh*7+wr*5+wc*11)%5!==0){
          ctx.fillRect(px+3+wc*9, cityY-bbh+4+wr*13, 4, 5);
        }
      }
    }
    // Sunset glow on upper face
    ctx.fillStyle='rgba(200,90,30,0.1)';
    ctx.fillRect(px, cityY-bbh, bbw, bbh*0.3);
    // Antenna
    if(bbh>70){ ctx.fillStyle='rgba(30,20,45,0.9)'; ctx.fillRect(px+bbw/2-1,cityY-bbh-7,2,8); }
  }
  // Ground haze below mid-city
  const cityHaze=ctx.createLinearGradient(0,cityY,0,cityY+18);
  cityHaze.addColorStop(0,'rgba(180,80,30,0.12)');
  cityHaze.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cityHaze;ctx.fillRect(0,cityY,W,18);
  ctx.restore();

  // ══ LAYER 3: Near-background buildings (0.45× camera speed, more detail) ══
  const bx3=-(G.camX*0.45);
  const nearY=horizY+26;
  const nearBlds=[
    [0,55,30],[30,38,22],[52,68,26],[78,45,24],[102,80,22],[124,52,28],
    [152,72,24],[176,60,22],[198,84,26],[224,48,24],[248,70,22],[270,58,28],
    [298,88,24],[322,46,22],[344,76,26],[370,62,24],[394,90,22],[416,50,28],
    [444,72,24],[468,58,22],[490,80,26],[516,44,24],[540,68,22],[562,56,28],
    [590,86,24],[614,48,22],[636,74,26],[662,58,24],[686,82,22],[708,52,28],
    [736,70,24],[760,60,22],[782,78,26],[808,44,24],[832,66,22],[856,54,28],
    [884,76,26],[918,48,24],[952,70,22],[986,54,26],
  ];
  ctx.save();ctx.globalAlpha=0.78;
  for(const [bbx,bbh,bbw] of nearBlds){
    const px=((bbx+bx3)%(W+400))-80;
    ctx.fillStyle=`rgba(${22+Math.floor(bbx%18)},${18+Math.floor(bbh%12)},${44+Math.floor((bbx*bbh)%22)},1)`;
    ctx.fillRect(px, nearY-bbh, bbw, bbh+5);
    // More visible windows — mix warm yellow and cool blue
    for(let wr=0;wr<Math.floor(bbh/12);wr++){
      for(let wc=0;wc<Math.floor(bbw/8);wc++){
        const lit=(bbx*7+bbh*5+wr*3+wc*11)%6;
        if(lit!==0&&lit!==3){
          const warm=lit<3;
          ctx.fillStyle=warm?'rgba(240,190,100,0.7)':'rgba(140,190,230,0.5)';
          ctx.fillRect(px+2+wc*8, nearY-bbh+3+wr*12, 4, 6);
        }
      }
    }
    // Amber-orange upper wash from sunset
    ctx.fillStyle='rgba(200,80,20,0.12)';
    ctx.fillRect(px, nearY-bbh, bbw, bbh*0.25);
    if(bbh>65){ ctx.fillStyle='rgba(25,18,40,0.95)'; ctx.fillRect(px+bbw/2-1,nearY-bbh-5,2,6); }
  }
  // Ground fade
  const nearHaze=ctx.createLinearGradient(0,nearY,0,nearY+14);
  nearHaze.addColorStop(0,'rgba(160,70,20,0.16)');
  nearHaze.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nearHaze;ctx.fillRect(0,nearY,W,14);
  ctx.restore();

  // ══ West of village green belt: ridge silhouettes (grandma-side horizon) ══
  const WEST_MTN_PARALLAX=0.11;
  const villageWestWx=17*TILE;
  const westAnchor=villageWestWx-G.camX*WEST_MTN_PARALLAX;
  ctx.save();
  ctx.globalAlpha=0.52;
  const westBase=horizY+18;
  const westGrad=ctx.createLinearGradient(0,westBase-68,0,westBase+24);
  westGrad.addColorStop(0,`rgba(${42+Math.floor(phase*12)},${28+Math.floor(phase*10)},${58+Math.floor(phase*14)},0.92)`);
  westGrad.addColorStop(0.55,'rgba(34,26,52,0.82)');
  westGrad.addColorStop(1,'rgba(22,18,38,0)');
  ctx.fillStyle=westGrad;
  const westPeaks=[
    [-40,58,48],[12,72,52],[66,48,44],[118,64,50],[172,52,46],[224,70,54],[276,44,40],
  ];
  for(const [ox,bh,bw] of westPeaks){
    const px=westAnchor+ox;
    if(px>W+100||px+bw<-100)continue;
    const steps=Math.max(4,Math.floor(bh/4));
    for(let s=0;s<steps;s++){
      const frac=s/steps,w2=bw*(1-frac*0.70),xoff=(bw-w2)/2;
      ctx.fillRect(px+xoff,westBase-bh+s*4,w2,5);
    }
    ctx.fillStyle='rgba(240,200,120,0.18)';
    ctx.fillRect(px+bw*0.26,westBase-bh,bw*0.42,8);
    ctx.fillStyle='rgba(200,85,35,0.12)';
    ctx.fillRect(px+bw*0.48,westBase-bh,bw*0.2,bh*0.38);
    ctx.fillStyle=westGrad;
  }
  ctx.restore();

  // ══ Beyond golden shrine (far map-east): ridge line stays right of the statue ══
  const EAST_MTN_PARALLAX=0.11;
  const shrineEastWx=25*TILE;
  const eastAnchor=shrineEastWx-G.camX*EAST_MTN_PARALLAX;
  ctx.save();
  ctx.globalAlpha=0.6;
  const eastBase=horizY+15;
  const eastGrad=ctx.createLinearGradient(0,eastBase-72,0,eastBase+28);
  eastGrad.addColorStop(0,`rgba(${46+Math.floor(phase*14)},${30+Math.floor(phase*10)},${68+Math.floor(phase*16)},0.94)`);
  eastGrad.addColorStop(0.58,'rgba(38,30,62,0.85)');
  eastGrad.addColorStop(1,'rgba(26,20,44,0)');
  ctx.fillStyle=eastGrad;
  const eastPeaks=[
    [0,62,54],[52,46,46],[100,72,52],[154,54,48],[204,66,50],[254,42,42],[296,58,46],[344,50,40],[388,56,44],
  ];
  for(const [ox,bh,bw] of eastPeaks){
    const px=eastAnchor+ox;
    if(px>W+120||px+bw<-120)continue;
    const steps=Math.max(4,Math.floor(bh/4));
    for(let s=0;s<steps;s++){
      const frac=s/steps,w2=bw*(1-frac*0.72),xoff=(bw-w2)/2;
      ctx.fillRect(px+xoff,eastBase-bh+s*4,w2,5);
    }
    ctx.fillStyle='rgba(248,210,130,0.22)';
    ctx.fillRect(px+bw*0.28,eastBase-bh,bw*0.44,9);
    ctx.fillStyle='rgba(215,95,38,0.16)';
    ctx.fillRect(px+bw*0.52,eastBase-bh,bw*0.22,bh*0.42);
    ctx.fillStyle=eastGrad;
  }
  ctx.restore();

  // ══ Moving clouds at 3 speeds ══
  ctx.save();
  for(let layer=0;layer<3;layer++){
    const speed=0.08+layer*0.06;
    const alpha=0.12+layer*0.06;
    const cloudY=horizY*0.3+layer*H*0.05;
    ctx.globalAlpha=alpha+phase*0.04;
    ctx.fillStyle='rgba(255,200,150,1)';
    for(let ci=0;ci<3;ci++){
      const cx=((t*speed+ci*(W/3)+layer*120)%(W+200))-100;
      const rad=50+layer*20+ci*10;
      ctx.beginPath();ctx.ellipse(cx,cloudY,rad,8+layer*3,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+rad*0.5,cloudY-5,rad*0.6,6+layer*2,0,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

function drawCityNPCs(){
  const t=G.tick;
  // Each pedestrian: world road they walk on, speed, offset, color scheme
  const walkers=[
    // Row 5 pavement pedestrians (walking east-west)
    {row:5, dir:'right', speed:0.3, phase:0,    skin:'#d4a870', shirt:'#4a6888'},
    {row:5, dir:'left',  speed:0.25,phase:160,  skin:'#c8b878', shirt:'#884848'},
    {row:5, dir:'right', speed:0.35,phase:320,  skin:'#d4a870', shirt:'#486848'},
    // Row 13 road pedestrians
    {row:13,dir:'right', speed:0.28,phase:80,   skin:'#d4b86a', shirt:'#884468'},
    {row:13,dir:'left',  speed:0.22,phase:240,  skin:'#c4906a', shirt:'#4a4888'},
    // Col 4 pavement (north-south)
    {col:4, dir:'down',  speed:0.2, phase:100,  skin:'#d4a870', shirt:'#388848'},
    {col:4, dir:'up',    speed:0.18,phase:280,  skin:'#c8906a', shirt:'#884830'},
    // Named characters stay inside their buildings (see interior scenes)
    {row:5, dir:'right', speed:0.15,phase:440,  skin:'#d4b86a', shirt:'#5a7840', village:true},
    {row:5, dir:'left',  speed:0.12,phase:580,  skin:'#c8a860', shirt:'#8a6030', village:true},
    {col:17,dir:'down',  speed:0.14,phase:120,  skin:'#d4b06a', shirt:'#6a5030', village:true, villagecol:true},
    {col:17,dir:'up',    speed:0.11,phase:350,  skin:'#c8a058', shirt:'#486040', village:true, villagecol:true},
    {row:12,dir:'right', speed:0.13,phase:200,  skin:'#d4b86a', shirt:'#5a3828', village:true, vrow:12},
    {row:12,dir:'left',  speed:0.10,phase:480,  skin:'#c0906a', shirt:'#405830', village:true, vrow:12},
  ];

  for(const w of walkers){
    let wx=0, wy=0;
    if(w.col!==undefined&&w.villagecol){
      const rH1=14*TILE, sY1=3*TILE, pg1=((t*w.speed+w.phase)%rH1);
      wx=w.col*TILE+8;
      wy=w.dir==='down' ? sY1+pg1 : sY1+(rH1-pg1);
    } else if(w.row!==undefined&&w.vrow){
      const rW2=6*TILE, sX2=17*TILE, pg2=((t*w.speed+w.phase)%rW2);
      wx=w.dir==='right' ? sX2+pg2 : sX2+(rW2-pg2);
      wy=w.vrow*TILE+10;
    } else if(w.row!==undefined){
      const rW3=w.village?7*TILE:13*TILE, sX3=w.village?17*TILE:1*TILE, pg3=((t*w.speed+w.phase)%rW3);
      wx=w.dir==='right' ? sX3+pg3 : sX3+(rW3-pg3);
      wy=w.row*TILE+10;
    } else {
      const rH4=17*TILE, sY4=1*TILE, pg4=((t*w.speed+w.phase)%rH4);
      wx=w.col*TILE+8;
      wy=w.dir==='down' ? sY4+pg4 : sY4+(rH4-pg4);
    }
    const sx=wx-G.camX, sy=wy-G.camY;
    if(sx<-52||sx>W+52||sy<-52||sy>H+52) continue;
    drawPedestrian(sx,sy,w.skin,w.shirt,t+w.phase);
  }
}

// Animated cars — one-way loop on actual road tiles only.
// SOUTHBOUND: col4 rows 1→18  EASTBOUND: row18 cols4→14
// NORTHBOUND: col14 rows18→1  WESTBOUND: row1 cols14→4 (top road)
// BONUS: row13 eastbound cols4→13 (+ westbound lower lane) — bus encounter sits col2, clear of those loops
function drawCityOverlay(){
  const t=G.tick;

  function hcar(wx,wy,color,dir){
    const sx=wx-G.camX, sy=wy-G.camY;
    if(sx>-40&&sx<W+40&&sy>-40&&sy<H+40) drawCar(sx,sy,color,dir);
  }
  function vcar(wx,wy,color,dir){
    const sx=wx-G.camX, sy=wy-G.camY;
    if(sx>-40&&sx<W+40&&sy>-40&&sy<H+40) drawCarV(sx,sy,color,dir);
  }

  // ── SOUTHBOUND: col 4, rows 1→18 (17 tiles = 544px) ──
  const c4wx=4*TILE+2;  // world x: left lane of col4
  const c4top=1*TILE+2, c4bot=18*TILE+2, c4h=c4bot-c4top;
  vcar(c4wx, c4top+((t*0.55)%c4h),         '#d02828','down');
  vcar(c4wx, c4top+((t*0.55+c4h/2)%c4h),   '#d8b800','down');

  // ── EASTBOUND: row 18, cols 4→14 (10 tiles = 320px) ──
  const r18wy=18*TILE+4; // world y: row 18 top lane
  const r18L=4*TILE, r18R=14*TILE, r18w=r18R-r18L;
  hcar(r18L+((t*0.5)%r18w),         r18wy,'#2848a8','right');
  hcar(r18L+((t*0.5+r18w/2)%r18w),  r18wy,'#286828','right');

  // ── NORTHBOUND: col 14, rows 18→1 (17 tiles) ──
  const c14wx=14*TILE+14; // right lane of col14
  vcar(c14wx, c4bot-((t*0.55)%c4h),          '#8a2888','up');
  vcar(c14wx, c4bot-((t*0.55+c4h/2)%c4h),    '#c03030','up');

const CAVE_DRAW_OFFSET_Y = 20; // shift cave down a bit, leaving room for HUD

// Wall-mounted torch — sconce + shaft + layered flame (warm flicker)
function drawCaveTorch(px,py,phase){
  const t=G.tick;
  const fk=Math.sin(t*0.17+phase)*0.5+0.5;
  const fk2=Math.sin(t*0.41+phase*1.9)*0.5+0.5;
  const flick=fk*0.62+fk2*0.38;
  const bx=Math.floor(px), by=Math.floor(py);

  // Wall shadow behind bracket (reads as mounted on cave wall)
  r(bx-10,by+6,12,28,'rgba(0,0,0,0.35)');
  // Iron sconce: strap + shelf holding the bowl
  r(bx-9,by+8,5,22,'#1e1814');
  r(bx-10,by+12,8,5,'#282018'); // arm into room
  r(bx-10,by+18,9,4,'#302218');
  // Fire bowl / cradle
  r(bx-8,by+7,12,6,'#3a2e22');
  r(bx-7,by+8,10,4,'#261e18');
  r(bx-6,by+11,8,2,'#141008'); // bowl lip shadow

  // Wooden shaft + bindings (classic handheld torch read)
  r(bx-5,by+14,8,30,'#463428');
  r(bx-6,by+22,10,3,'#2a2018');
  r(bx-6,by+34,10,3,'#2a2018');
  r(bx-6,by+42,10,2,'#1c1410'); // charred tip

  // Flame origin — sits in bowl, wanders slightly with draft
  const ox=Math.round((flick-0.5)*3), oy=Math.round((fk2-0.5)*2);
  const fx=bx+ox+2, fy=by+oy+5;

  ctx.save();
  // Wide ambient halo (reads as light on nearby rock)
  const halo=ctx.createRadialGradient(fx+5,fy-14,1,fx+6,fy-10,38+flick*14);
  halo.addColorStop(0,`rgba(255,245,190,${0.35+flick*0.35})`);
  halo.addColorStop(0.25,`rgba(255,160,55,${0.22+flick*0.18})`);
  halo.addColorStop(0.55,`rgba(200,80,25,${0.08+flick*0.06})`);
  halo.addColorStop(1,'rgba(60,20,8,0)');
  ctx.fillStyle=halo;
  ctx.fillRect(bx-36,by-52,88,72);

  // Outer flame body — stacked taper (pixel torch silhouette)
  const layers=[
    {x:-11,y:-24,w:26,h:15,a:`rgba(255,${72+fk*40},18,${0.82+flick*0.18})`},
    {x:-9,y:-32,w:22,h:13,a:`rgba(255,${108+fk*45},28,${0.78+flick*0.22})`},
    {x:-7,y:-40,w:17,h:11,a:`rgba(255,${150+fk*50},48,${0.72+flick*0.28})`},
    {x:-5,y:-47,w:12,h:9,a:`rgba(255,210,120,${0.65+flick*0.3})`},
    {x:-3,y:-54,w:8,h:8,a:`rgba(255,248,220,${0.55+flick*0.35})`},
  ];
  for(const L of layers){
    r(fx+L.x,fy+L.y,L.w,L.h,L.a);
  }
  // Core hotspot (bright tongue)
  const coreW=4+Math.round(flick*2), coreH=5+Math.round(fk*2);
  r(fx-Math.floor(coreW/2),fy-50,coreW,coreH,`rgba(255,255,235,${0.75+flick*0.25})`);

  // Occasional upward sparks
  const sp=(Math.floor(t*0.85+phase*40)%31);
  if(sp<5){
    const sx=fx+4+(sp%3), sy=fy-56-(sp+t)%9;
    r(sx,sy,2,2,`rgba(255,230,160,${0.6+flick*0.4})`);
    r(sx-3,sy-4,1,1,'rgba(255,200,80,0.85)');
  }
  ctx.restore();

  // Warm pool on floor below
  const fg=ctx.createLinearGradient(bx-40,by+42,bx+44,by+58);
  fg.addColorStop(0,'rgba(255,90,30,0)');
  fg.addColorStop(0.45,`rgba(255,110,45,${0.055+flick*0.07})`);
  fg.addColorStop(1,'rgba(255,90,30,0)');
  ctx.fillStyle=fg;
  ctx.fillRect(bx-42,by+40,88,22);
}

function drawCaveMap(){
  const vg=ctx.createRadialGradient(W*0.48,H*0.38,20,W*0.52,H*0.58,520);
  vg.addColorStop(0,'#100c0a'); vg.addColorStop(0.45,'#070504'); vg.addColorStop(1,'#010101');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  const off=CAVE_DRAW_OFFSET_Y;

  for(let row=0;row<CROWS;row++){
    for(let col=0;col<CCOLS;col++){
      const t=CAVE_MAP[row][col];
      const x=col*TILE, y=row*TILE+off;
      switch(t){
        case T_CAVE_W:{
          const wb='#241c18', wd='#140f0d';
          r(x,y,TILE,TILE,wb);
          r(x+2,y+2,TILE-4,TILE-4,'#1a1512');
          if(row<2){
            r(x+8,y,6,TILE/2,wd);
            ctx.fillStyle='#140f0d';
            for(let si=0;si<5;si++){
              const px=x+3+si*7; const hang=5+(si+col)%5;
              ctx.fillRect(px,y,2,hang);
              ctx.fillRect(px+1,y+hang,1,3);
            }
          }
          if(row>=2) r(x+10,y+TILE-6,TILE-20,4,'rgba(0,0,0,0.35)');
          break;
        }
        case T_CF:{
          r(x,y,TILE,TILE,'#342a22');
          r(x,y,TILE,1,'#423428'); r(x,y,1,TILE,'#423428');
          r(x+6,y+18,TILE-12,2,'rgba(0,0,0,0.45)');
          if((col+row*3)%5===0){
            r(x+14,y+22,10,2,'rgba(255,255,255,0.04)');
            r(x+16,y+23,4,1,'rgba(180,200,255,0.06)');
          }
          break;
        }
        case T_CEXIT:
          r(x,y,TILE,TILE,'#3a3428');
          r(x,y,4,TILE,'rgba(40,55,68,0.2)');
          r(x,y,4,4,'rgba(160,190,210,0.05)');
          break;
        case T_CENC:
          if(!G.cleared[2]){
            r(x,y,TILE,TILE,'#1e161c');
            r(x+4,y+6,TILE-8,TILE-12,'rgba(18,10,16,0.92)');
            const flick=Math.sin(G.tick*0.09)*0.5+0.5;
            r(x+10,y+8,TILE-20,TILE-18,`rgba(28,18,32,${0.45+flick*0.2})`);
            ctx.fillStyle=`rgba(140,25,38,${0.18+flick*0.32})`;
            ctx.fillRect(x+22,y+12,4,3);
            ctx.fillStyle='rgba(255,255,255,0.06)';
            ctx.fillRect(x+14,y+24,(G.tick%40)<20?8:6,2);
          } else {
            r(x,y,TILE,TILE,C.caveF);
            r(x,y,TILE,1,C.caveFL); r(x,y,1,TILE,C.caveFL);
          }
          break;
        case T_BOARD:
          r(x,y,TILE,TILE,C.caveF);
          if(G.cleared[2]&&!G.hasBoarding){
            const glow=Math.sin(G.tick*0.08)*0.15+0.55;
            ctx.fillStyle=`rgba(200,190,140,${glow*0.35})`;
            ctx.fillRect(x+7,y+9,18,12);
            r(x+8,y+10,16,10,'#e8e0c0');
            ctx.fillStyle='#706030';ctx.font='7px monospace';
            ctx.fillText('BCN',x+9,y+18);
          }
          break;
      }
    }
  }
  // Wall torches — spaced along the cave route (flicker phases staggered)
  drawCaveTorch(2*TILE+10,3*TILE+off-6,0);
  drawCaveTorch(8*TILE+4,4*TILE+off-8,1.7);
  drawCaveTorch(14*TILE-6,5*TILE+off-4,0.9);
  drawCaveTorch(17*TILE+2,4*TILE+off-6,3.1);

  ctx.fillStyle='rgba(18,8,28,0.22)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.fillRect(0,0,W,72);
  ctx.fillRect(0,H-88,W,88);

  ctx.fillStyle='rgba(0,0,0,0.32)';
  ctx.fillRect(0,CROWS*TILE+off,W,H-(CROWS*TILE+off));
}

// Bright clear-day vista for May's flat window — no rain
function drawMayAptWindowView(t){
  const ph=Math.sin(t*0.0007)*0.5+0.5;
  const skyH=Math.floor(H*0.72);
  const sk=ctx.createLinearGradient(0,0,0,skyH);
  sk.addColorStop(0,`rgb(${218+Math.floor(ph*28)},${238+Math.floor(ph*14)},255)`);
  sk.addColorStop(0.38,`rgb(${255},${228+Math.floor(ph*18)},${178+Math.floor(ph*12)})`);
  sk.addColorStop(0.72,`rgb(${255},${194+Math.floor(ph*14)},${132+Math.floor(ph*10)})`);
  sk.addColorStop(1,`rgb(${248},${168+Math.floor(ph*12)},${108})`);
  ctx.fillStyle='#f4fbff';

  ctx.beginPath(); ctx.arc(sunX,sunY,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,252,215,0.95)';
  ctx.beginPath(); ctx.arc(sunX,sunY,17,0,Math.PI*2); ctx.fill();

  const drift=Math.sin(t*0.018)*14;

  ctx.fillRect(0,hz,W,H-hz);

  const bob=Math.sin(t*0.012)*3;
  r(20+bob,hz-54,44,54,'rgba(95,115,138,0.82)');
  r(72+bob,hz-78,38,78,'rgba(85,105,128,0.85)');

  r(232+bob,hz-48,36,48,'rgba(98,115,135,0.8)');

  ctx.globalCompositeOperation='screen';
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.fillRect(0,0,W,H);

  const roamL=CX+CW+28, roamR=RX+RW-68;
  const smooth=t=>{const x=Math.max(0,Math.min(1,t));return x*x*(3-2*x);};
  function shuttle(ph,period,a,b,dwell){
    const d=dwell===undefined?0.27:dwell,m=Math.max(1e-6,1-2*d);
    const u=((tick+ph)%period)/period;
    if(u<d)return a;
    if(u>d+m)return b;
    return a+(b-a)*smooth((u-d)/m);

  function cafeGuestShadow(gx,gy){ r(gx+3,gy+29,18,4,'rgba(0,0,0,0.16)'); }

  drawCafeGuestFront(RX+RW-96,RY+138,tick,'#586058','#282818');

  // Sodonna & Wing — spaced along counter so name plates don't overlap
  const sodX=CX+6, sodY=RY+38;
  const wingX=CX+74, wingY=sodY;
  r(sodX+3,sodY+29,18,4,'rgba(0,0,0,0.18)');

  drawSadonna(sodX,sodY);
  drawWing(wingX,wingY,0);

  function cafeLabel(x,y,name){
    ctx.font='bold 8px monospace';
    const tw=ctx.measureText(name).width;
    r(x-2,y-14,tw+8,12,'#1a1a1a');
    ctx.fillStyle='#f0f0f0';
    ctx.fillText(name,x+2,y-4);
  }
  cafeLabel(sodX,sodY,'Sadonna');
  cafeLabel(wingX,sodY-14,'Wing');

  // May + Kobe (clamped to room)
  const miy=Math.min(Math.max(indY,RY+20),RY+RH-30);
  const mix=Math.min(Math.max(indX,RX+10),RX+RW-30);
  drawMay(mix,miy,tick,G.facing||'down');
  drawKobe(mix-26,miy+4,tick,G.facing);
  cafeLabel(mix,miy,'May');
  cafeLabel(mix-26,miy+4,'Kobe');

  // Talk prompt — between Sodonna & Wing behind counter
  const sd=Math.hypot(mix-((sodX+wingX)/2+11),miy-(CY+40));
  if(sd<90){
    r(mix-38,miy-26,88,14,'rgba(0,0,0,0.75)');
    ctx.fillStyle='#a8e870';ctx.font='bold 8px monospace';
    ctx.fillText('ENTER: talk',mix-34,miy-14);
  }

  // Door bottom-center
  r(RX+RW/2-12,RY+RH-2,24,7,'#1a1a1a');
  r(RX+RW/2-10,RY+RH,20,5,'#888');

  // Dark band below — keep some dusk bleed visible at canvas edges
  const bbGrad=ctx.createLinearGradient(0,RY+RH+12,0,H);
  bbGrad.addColorStop(0,'rgba(12,10,18,0.88)');
  bbGrad.addColorStop(1,'rgba(26,18,34,0.72)');
  ctx.fillStyle=bbGrad;
  ctx.fillRect(0,RY+RH+10,W,H-(RY+RH+10));
  ctx.fillStyle='rgba(200,200,200,0.5)';ctx.font='10px monospace';ctx.textAlign='center';
  ctx.fillText('ENTER: talk   \u2193 walk south to exit',W/2,RY+RH+38);ctx.textAlign='left';
}

function normalizeDialogSpeaker(sp){
  return String(sp||'').replace(/^\u2605\s*/,'').trim();
}

function drawDialog(lines,speaker=''){
  const bx=6,by=H-128,bw=W-12,bh=122;
  const norm=normalizeDialogSpeaker(speaker);
  const grandmaPortrait=norm.toLowerCase()==='grandma';
  const PW=96, PH=96;

  r(bx-3,by-3,bw+6,bh+6,C.uiB);
  r(bx,by,bw,bh,C.uiBg);
  ctx.strokeStyle=C.uiB2;ctx.lineWidth=2;ctx.strokeRect(bx+5,by+5,bw-10,bh-10);
  ctx.strokeStyle=C.uiB;ctx.lineWidth=1;ctx.strokeRect(bx+7,by+7,bw-14,bh-14);

  let textLeft=bx+16;
  if(grandmaPortrait){
    const px=bx+12, py=by+bh-PH-12;
    const img=DIALOG_GRANDMA_PORTRAIT;
    if(img.complete && img.naturalWidth>0){
      ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight, px, py, PW, PH);
    }
    ctx.strokeStyle=C.uiB2;ctx.lineWidth=2;ctx.strokeRect(px+1,py+1,PW-2,PH-2);
    ctx.strokeStyle=C.uiB;ctx.lineWidth=1;ctx.strokeRect(px+3,py+3,PW-6,PH-6);
    textLeft=Math.min(px+PW+18, bx+bw-56);
  }

  if(speaker){
    const labelSpeaker=String(speaker).trim();
    const sw=Math.min(labelSpeaker.length*9+18,200);
    r(bx,by-24,sw+4,24,C.uiB); r(bx+2,by-22,sw,20,C.uiBg);
    ctx.fillStyle=C.white;ctx.font='bold 12px monospace';
    ctx.fillText(labelSpeaker,bx+9,by-8);
  }
  ctx.fillStyle=C.white;ctx.font='14px monospace';
  let ly=by+28;
  for(const ln of lines){
    for(const sub of ln.split('\n')){ctx.fillText(sub,textLeft,ly);ly+=21;}
  }
  if(Math.floor(Date.now()/480)%2===0){
    ctx.fillStyle=C.uiB;ctx.fillText('\u25bc',bx+bw-24,by+bh-10);
  }
}

// opts.titleScreen: no rain, skyline sits lower (sky dominates top), lighter grade for readability
function drawBattleRainBackdrop(fr, opts){
  opts=opts||{};
  const title=!!opts.titleScreen;
  const ox=G.camX, oy=G.camY;
  G.camX=Math.max(0, Math.min(23*TILE+32-W/2, (ECOLS-20)*TILE));
  G.camY=Math.max(0, Math.min(5*TILE, (EROWS-15)*TILE));
  drawSunsetSky(title?{skyOnly:true}:undefined);
  drawParallaxBg(title?{horizonBoost:Math.floor(H*0.26)}:undefined);
  G.camX=ox; G.camY=oy;

  if(title){
    ctx.fillStyle='rgba(255,236,215,0.085)';
    ctx.fillRect(0,0,W,Math.floor(H*0.52));
    ctx.fillStyle='rgba(14,18,32,0.38)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,248,235,0.045)';
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle='rgba(14,16,24,0.78)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(6,8,14,0.35)';
    ctx.fillRect(0,0,W,H);

    ctx.strokeStyle='rgba(215,225,240,0.22)';
    ctx.lineWidth=1;
    const t=fr*6;
    for(let i=0;i<140;i++){
      const ix=(i*317+t+i*i)%W;
      const iy=(i*149+t*2+i*7)%H;
      ctx.beginPath(); ctx.moveTo(ix,iy); ctx.lineTo(ix-5,iy+15); ctx.stroke();
    }
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    for(let i=0;i<55;i++){
      const ix=(i*401+fr*8)%W;
      const iy=(fr*5+i*23)%H;
      ctx.beginPath(); ctx.moveTo(ix,iy); ctx.lineTo(ix-2,iy+18); ctx.stroke();
    }
  }
}

function drawBattlePeeSplash(fr){
  const bx=W-218, by=H-268;
  const wob=(Math.sin(fr*0.31)*4)+(Math.sin(fr*0.17)*3);
  ctx.save();
  ctx.strokeStyle='rgba(252,228,80,0.92)';
  ctx.lineCap='round'; ctx.lineJoin='round';
  for(let i=0;i<7;i++){
    ctx.lineWidth=6+i*0.9;
    ctx.globalAlpha=Math.max(0.25,0.62-i*0.07);
    ctx.beginPath();
    ctx.moveTo(bx-38+i*11+wob,by+42);
    ctx.quadraticCurveTo(bx+12+i*4,by-25-(fr%20+i*3),bx-20+i*13,by-58-i*2);
    ctx.stroke();
  }
  ctx.restore();
  ctx.save();
  ctx.globalAlpha=0.52;
  ctx.fillStyle='#d4b820';
  ctx.beginPath();
  ctx.ellipse(bx-8,by+54,76,18,0.08,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=0.38;
  ctx.fillStyle='#f8ec68';
  ctx.beginPath();
  ctx.ellipse(bx-14,by+48,58,12,-0.12,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBattle(){
  if(G.curEnc<0) return;
  const enc=ENC_DATA[G.curEnc];
  const fr=G.tick;
  const attacksDone=G.kobeAttacks||0;
  const kobePhase=G.kobePhase||0;
  const kLead=enc.kobeLead===true;

  if(enc.sprite==='naked'){
    drawBattleRainBackdrop(fr);
    for(let i=1;i<=8;i++)r(0,H-134-i*26,W,2,`rgba(18,20,26,${0.06+i*0.035})`);
  } else {
    r(0,0,W,H,'#141c2c');
    for(let i=1;i<=8;i++)r(0,H-134-i*26,W,2,`rgba(60,80,120,${0.12+i*0.05})`);
  }
  if(enc.sprite==='bus'){
    const pulse=(Math.sin(fr*0.42)+1)*0.5;
    ctx.strokeStyle=`rgba(255,235,140,${0.12+pulse*0.35})`;
    ctx.lineWidth=2;
    for(let i=0;i<5;i++){
      ctx.beginPath(); ctx.arc(W-108,H-268,28+i*22+pulse*14,-0.55,0.55); ctx.stroke();
    }
    ctx.font=`bold ${14+Math.floor(pulse*10)}px monospace`;
    ctx.fillStyle=`rgba(255,215,90,${0.55+pulse*0.45})`;
    ctx.textAlign='center';
    ctx.fillText(['BRMMM','HONK','SSHHHK'][Math.floor(fr/16)%3],W-168,H-318);
    ctx.textAlign='left'; ctx.lineWidth=1;
  }

  r(W-260,H-180,230,12,'#202840');r(W-258,H-192,226,4,'#303858');
  r(10,H-140,200,12,'#202840');r(12,H-152,196,4,'#303858');

  const hitShake=(kobePhase===2)?Math.floor(Math.sin(fr*1.2)*4):0;
  ctx.save();ctx.translate(W-210+hitShake,H-330);ctx.scale(2.4,2.4);
  if(enc.sprite==='agent')drawAgent(0,0);
  else if(enc.sprite==='invoice')drawInvoice(0,0,fr);
  else if(enc.sprite==='dishes')drawDishesEncounter(0,0,fr);
  else if(enc.sprite==='bus')drawBusEncounter(0,0,fr);
  else drawNaked(0,0,fr);
  ctx.restore();

  const homeX=kLead?52:22;

  if(kLead){
    ctx.save();ctx.translate(4,H-208);ctx.scale(1.15,1.15);drawMay(0,0,fr,'right');ctx.restore();
    if(kobePhase===0||kobePhase===3){
      ctx.save();ctx.translate(homeX,H-236);ctx.scale(2.05,2.05);drawKobe(0,0,fr);ctx.restore();
    } else {
      const kbx=G.kobeBattleX||homeX;
      ctx.save();ctx.translate(kbx,H-236);ctx.scale(2.05,2.05);drawKobe(0,0,fr);ctx.restore();
      if(kobePhase===1) drawWoof(kbx+14,H-252);
      if(kobePhase===2){
        if(G.kobeAttackPick===1){
          drawBattlePeeSplash(fr);
          ctx.fillStyle='rgba(232,200,40,0.42)';
          ctx.fillRect(W-278,H-268,135,36);
          ctx.fillStyle='#b89810';ctx.font='bold 18px monospace';ctx.textAlign='center';
          ctx.fillText('MARK!',W-208,H-246);ctx.textAlign='left';
        } else {
          r(W-235,H-285,55,32,'rgba(255,220,80,0.5)');
          ctx.fillStyle='#f0e840';ctx.font='bold 18px monospace';ctx.textAlign='center';
          ctx.fillText('CHOMP!',W-208,H-263);ctx.textAlign='left';
        }
      }
    }
  } else {
    ctx.save();ctx.translate(60,H-230);ctx.scale(2,2);drawMay(0,0,fr,'down');ctx.restore();
    if(kobePhase===0||kobePhase===3){
      ctx.save();ctx.translate(22,H-176);ctx.scale(1.6,1.6);drawKobe(0,0,fr);ctx.restore();
    } else {
      const kbx=G.kobeBattleX||22;
      ctx.save();ctx.translate(kbx,H-176);ctx.scale(1.6,1.6);drawKobe(0,0,fr);ctx.restore();
      if(kobePhase===1) drawWoof(kbx+10,H-190);
      if(kobePhase===2){
        if(G.kobeAttackPick===1){
          drawBattlePeeSplash(fr);
          ctx.fillStyle='rgba(232,200,40,0.42)';
          ctx.fillRect(W-278,H-268,135,36);
          ctx.fillStyle='#b89810';ctx.font='bold 18px monospace';ctx.textAlign='center';
          ctx.fillText('MARK!',W-208,H-246);ctx.textAlign='left';
        } else {
          r(W-235,H-285,55,32,'rgba(255,220,80,0.5)');
          ctx.fillStyle='#f0e840';ctx.font='bold 18px monospace';ctx.textAlign='center';
          ctx.fillText('CHOMP!',W-208,H-263);ctx.textAlign='left';
        }
      }
    }
  }

  const ibx=W-244,iby=14;
  r(ibx-3,iby-3,234,62,C.uiB);r(ibx,iby,228,56,C.uiBg);
  ctx.fillStyle=C.white;ctx.font='bold 13px monospace';ctx.fillText(enc.name,ibx+8,iby+20);
  r(ibx+8,iby+32,188,10,'#2a2a3a');
  const hp=Math.max(0,(1-attacksDone)/1);
  r(ibx+8,iby+32,Math.round(188*hp),10,hp>0.5?C.green:hp>0.25?C.orange:C.red);
  ctx.fillStyle='#888';ctx.font='10px monospace';ctx.fillText('HP',ibx+200,iby+41);

  const mbx=12,mby=H-172;
  r(mbx-3,mby-3,188,56,C.uiB);r(mbx,mby,182,50,C.uiBg);
  ctx.fillStyle=C.white;ctx.font='bold 13px monospace';
  if(kLead){
    ctx.fillText('KOBE',mbx+8,mby+18);
    ctx.fillStyle='#b8a898';ctx.font='11px monospace';ctx.fillText('May holds the leash',mbx+8,mby+30);
  } else {
    ctx.fillText('MAY',mbx+8,mby+18);
    ctx.fillStyle='#c49a5a';ctx.font='11px monospace';ctx.fillText('+ KOBE',mbx+8,mby+30);
  }
  const mayHP=G.mayHP||G.mayMaxHP||5;
  const maxHP=G.mayMaxHP||5;
  r(mbx+8,mby+38,162,8,'#2a2a3a');
  r(mbx+8,mby+38,Math.round(162*mayHP/maxHP),8,mayHP>2?'#3aaa3a':'#cc3030');
  ctx.fillStyle='#888';ctx.font='9px monospace';ctx.fillText(`HP ${mayHP}/${maxHP}`,mbx+8,mby+58);

  if(G.battlePhase==='enemyrecoil'&&G.enemyAttackMsg){
    const [title,desc]=G.enemyAttackMsg;
    r(W/2-140,H/2-36,280,72,'rgba(0,0,0,0.88)');
    r(W/2-140,H/2-36,280,2,'#e84040');
    ctx.fillStyle='#ff8080';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText(title,W/2,H/2-14);
    ctx.fillStyle='#e8d8c8';ctx.font='10px monospace';
    const lines2=desc.split('\n');
    lines2.forEach((l,i)=>ctx.fillText(l,W/2,H/2+8+i*14));
    ctx.textAlign='left';
    const shake=Math.floor(Math.sin(G.battleTimer*20)*3);
    ctx.save();ctx.translate(shake,0);
    if(kLead){
      ctx.save();ctx.translate(homeX+shake,H-236);ctx.scale(2.05,2.05);drawKobe(0,0,G.tick);ctx.restore();
    } else {
      ctx.save();ctx.translate(60+shake,H-230);ctx.scale(2,2);drawMay(0,0,G.tick,'down');ctx.restore();
    }
    ctx.restore();
  }

  const bp=G.battlePhase;
  if(bp==='dialogue'){
    const line=enc.lines[Math.min(G.dline,enc.lines.length-2)];
    drawDialog([line],enc.name);
  } else if(bp==='attack'){
    drawDialog([kLead?'What will Kobe do?':'What will you do?'],'May');

}

// MOVEMENT HELPERS
// ============================================================
function moveExt(dx,dy,dt){
  if(!dx&&!dy)return;
  const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;
  const nx=G.mx+dx*SPEED*dt, ny=G.my+dy*SPEED*dt;
  if(canStepExt(nx,G.my))G.mx=nx;
  if(canStepExt(G.mx,ny))G.my=ny;
  G.mx=Math.max(TILE+1,Math.min(G.mx,(ECOLS-2)*TILE-19));
  G.my=Math.max(TILE+1,Math.min(G.my,(EROWS-2)*TILE-23));
  // Track all 4 facing directions
  if(Math.abs(dx)>Math.abs(dy)){
    G.facing=dx>0?'right':'left';
  } else {
    G.facing=dy>0?'down':'up';
  }
}
function moveCave(dx,dy,dt){
  if(!dx&&!dy)return;
  const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;
  const nx=G.caveX+dx*SPEED*dt, ny=G.caveY+dy*SPEED*dt;
  if(canStepCave(nx,G.caveY))G.caveX=nx;
  if(canStepCave(G.caveX,ny))G.caveY=ny;
  G.caveX=Math.max(0,Math.min(G.caveX,(CCOLS-1)*TILE-19));
  G.caveY=Math.max(0,Math.min(G.caveY,(CROWS-1)*TILE-23));
  if(Math.abs(dx)>Math.abs(dy)){
    G.facing=dx>0?'right':'left';
  } else {
    G.facing=dy>0?'down':'up';
  }
}
function moveInd(dx,dy,dt){
  if(!dx&&!dy)return;
  const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;
  const nx=G.indX+dx*SPEED*dt, ny=G.indY+dy*SPEED*dt;
  if(canStepInd(nx,G.indY))G.indX=nx;
  if(canStepInd(G.indX,ny))G.indY=ny;
  const house=G.indLoc==='house'||G.indLoc==='jo_house';
  const apt=G.indLoc==='may_apt';
  const RX=apt?MAY_APT_RX:(house?160:180), RY=apt?MAY_APT_RY:(house?80:100), RW=apt?MAY_APT_RW:(house?320:280);
  G.indX=Math.max(RX+8,Math.min(G.indX,RX+RW-46));
  G.indY=Math.max(RY+18,Math.min(G.indY,apt?MAY_APT_MAXPY:(house?325:305)));
  if(Math.abs(dx)>Math.abs(dy)){
    G.facing=dx>0?'right':'left';
  } else {
    G.facing=dy>0?'down':'up';
  }
}

function checkExtSpecial(aPressed){
  // Doors first — feet can overlap T_HOUSE_D while centre tile is grass/path; encounters/taxi used centre-only and blocked re-entry
  const dtDoor=doorTileUnderMay();
  if(dtDoor===T_HOUSE_D||dtDoor===T_CAFE_D||dtDoor===T_JO_DOOR||dtDoor===T_APT_D){
    if(aPressed){
      if(dtDoor===T_HOUSE_D)return{type:'indoor',loc:'house'};
      if(dtDoor===T_JO_DOOR)return{type:'indoor',loc:'jo_house'};
      if(dtDoor===T_CAFE_D)return{type:'indoor',loc:'cafe'};
      if(dtDoor===T_APT_D)return{type:'indoor',loc:'may_apt'};
    }
    return{type:'door_prompt'};
  }
  const cx=G.mx+9, cy=G.my+11;
  const col=Math.floor(cx/TILE), row=Math.floor(cy/TILE);
  const t=extTile(col,row);
  // Auto-triggers (step-on)
  if(t===T_ENC1&&!G.cleared[0])return{type:'enc',id:0};
  if(t===T_ENC2&&!G.cleared[1])return{type:'enc',id:1};
  if(t===T_ENC_DISHES&&!G.cleared[3])return{type:'enc',id:3};
  if(t===T_ENC_BUS&&!G.cleared[4])return{type:'enc',id:4};
  if(t===T_CAVE_E) return{type:'cave'};
  // Taxi: step-on, check conditions
  if(t===T_TAXI){
    if(G.hasBoarding&&G.farewellDone&&G.cabFarewellDone) return{type:'airport'};
    if(G.hasBoarding&&!G.farewellDone)
      return{type:'taxi_blocked',msg:'Visit Grandma — talk to her inside.'};
    if(G.hasBoarding&&G.farewellDone&&!G.cabFarewellDone)
      return{type:'taxi_blocked',msg:'Step outside from home first — everyone\'s at the cab.'};
    if(!G.hasBoarding) return{type:'taxi_blocked',msg:'You need your boarding pass.'};
  }
  // Gary NPC: ENTER/SPACE press when nearby
  const gdx=Math.hypot(G.mx-NPC_GARY.wx,G.my-NPC_GARY.wy);
  if(gdx<48){
    if(aPressed) return{type:'npc',who:'gary'};
    return{type:'npc_prompt',who:'gary'};
  }
  return null;
}
function checkCaveSpecial(){
  const cx=G.caveX+9, cy=G.caveY+11;
  const col=Math.floor(cx/TILE), row=Math.floor(cy/TILE);
  const t=caveTile(col,row);
  if(t===T_CENC&&!G.cleared[2])return{type:'enc',id:2};
  if(t===T_BOARD&&G.cleared[2]&&!G.hasBoarding&&!G.boardingPickup)return{type:'boarding'};
  if(t===T_CEXIT)return{type:'exit'};
  return null;
}

// ============================================================
// 10. STATE MACHINE & GAME LOOP
// ============================================================
function getInput(){
  let dx=0,dy=0;
  if(G.keys['ArrowLeft']||G.keys['a'])dx-=1;
  if(G.keys['ArrowRight']||G.keys['d'])dx+=1;
  if(G.keys['ArrowUp']||G.keys['w'])dy-=1;
  if(G.keys['ArrowDown']||G.keys['s'])dy+=1;
  dx+=G.tdir.x; dy+=G.tdir.y;
  return{dx:Math.max(-1,Math.min(1,dx)),dy:Math.max(-1,Math.min(1,dy))};
}

let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;G.tick++;
  ctx.clearRect(0,0,W,H);
  const {dx,dy}=getInput();

  // ── TITLE ──
  if(G.mode==='TITLE'){
    drawTitle();
    if(G.aBtn){G.aBtn=false;G.mode='INTRO';flashScreen();}
  }

  // ── INTRO (bedroom cutscene) ──
  else if(G.mode==='INTRO'){
    drawIntroBedroom();
    if(G.aBtn){
      G.aBtn=false;
      G.introLine++;
      if(G.introLine>=INTRO_LINES.length){
        G.mode='EXPLORE';G.introLine=0;flashScreen();
      }
    }
  }

  // ── EXPLORE (exterior map) ──
  else if(G.mode==='EXPLORE'){
    moveExt(dx,dy,dt);
    G.hist.push({x:G.mx,y:G.my});
    if(G.hist.length>HIST_LEN)G.hist.shift();
    const hi=Math.max(0,G.hist.length-1-DOG_DELAY);
    G.kx=G.hist[hi].x-6; G.ky=G.hist[hi].y+6;
    updateCamera();
    G.cooldown=Math.max(0,G.cooldown-dt);
    let onDoorPrompt=false,onNpcPrompt=false,taxiMsg='';
    if(G.cooldown<=0){
      const hit=checkExtSpecial(G.aBtn);
      if(hit){
        const consume=hit.type==='indoor'||hit.type==='npc';
        if(consume) G.aBtn=false;
        if(hit.type==='door_prompt'){onDoorPrompt=true;}
        else if(hit.type==='npc_prompt'){onNpcPrompt=true;}
        else if(hit.type==='taxi_blocked'){taxiMsg=hit.msg;}
        else {
          G.cooldown=1.5;
          if(hit.type==='enc'){
            G.curEnc=hit.id;G.dline=0;G.battlePhase=null;G.kobeAttacks=0;G.kobePhase=0;G.kobeBattleX=kobeHeroX();G.battleTimer=0;G.kobeAttackPick=0;
            G.mode='BATTLE';flashScreen();
          } else if(hit.type==='indoor'){
            G.prevMX=G.mx;G.prevMY=G.my;
            G.indLoc=hit.loc;
            if(hit.loc==='may_apt'){
              G.indX=MAY_APT_RX+204;G.indY=MAY_APT_RY+88;
              G.indKX=G.indX-28;G.indKY=G.indY+6;
            } else {
              G.indX=240;G.indY=200;G.indKX=210;G.indKY=210;
            }
            if(hit.loc==='house') G.visitedHouse=true;
            else if(hit.loc==='cafe') G.visitedCafe=true;
            G.mode='INDOOR';
            flashScreen();
          } else if(hit.type==='cave'){
            G.caveX=2*TILE+8;G.caveY=2*TILE+8;G.caveKX=TILE+8;G.caveKY=2*TILE+14;
            G.mode='CAVE';flashScreen();
          } else if(hit.type==='airport'){
            G.mode='AIRPORT';G.airSub=0;G.airLine=0;G.airChoice=0;
            G.kobeBoltActive=false;G.kobeBoltX=148;flashScreen();
          } else if(hit.type==='npc'){
            G.mode='NPC_TALK';G.npcWho=hit.who;G.npcLine=0;flashScreen();
          }
        }
      }
    } else {
      const peek=checkExtSpecial(false);
      if(peek&&peek.type==='door_prompt') onDoorPrompt=true;
    }
    drawExtMap();
    drawExtNPCs();
    const ks=G.kx-G.camX, ky2=G.ky-G.camY;
    drawKobe(ks,ky2,G.tick,G.facing);
    const msx=G.mx-G.camX, msy=G.my-G.camY;
    drawMay(msx,msy,G.tick,G.facing||'down');
    // Name tag above May
    npcNameTag(msx+2,msy,'May','#f8e8d8');
    // Name tag above Kobe
    npcNameTag(ks+2,ky2,'Kobe','#d8c8a0');
    drawHUD();
    // Farewell indicator
    if(G.hasBoarding&&!G.farewellDone){
      const hsx=20*TILE+16-G.camX, hsy=9*TILE-10-G.camY;
      if(hsx>-40&&hsx<W+40&&hsy>-20&&hsy<H){
        const pa=Math.floor(G.tick/14)%4,po=pa<2?pa:3-pa;
        r(hsx-28,hsy-4+po,72,18,'rgba(0,0,0,0.7)');
        ctx.fillStyle='#f8c860';ctx.font='bold 10px monospace';ctx.textAlign='center';
        ctx.fillText('Grandma — talk inside home \u2665',hsx+8,hsy+10+po);ctx.textAlign='left';
      }
    }
    // Prompts
    if(onDoorPrompt||onNpcPrompt){
      r(msx-36,msy-26,96,16,'rgba(0,0,0,0.8)');
      ctx.fillStyle='#a8e870';ctx.font='bold 10px monospace';
      ctx.fillText(onNpcPrompt?'ENTER: Talk':'ENTER: Enter',msx-32,msy-13);
    }
    if(taxiMsg){
      r(W/2-110,H-50,220,30,'rgba(0,0,0,0.8)');
      ctx.fillStyle='#f0c860';ctx.font='bold 11px monospace';ctx.textAlign='center';
      ctx.fillText(taxiMsg,W/2,H-30);ctx.textAlign='left';
    }
    if(G.tick<500){
      r(0,H-22,W,22,'rgba(0,0,0,0.5)');
      ctx.fillStyle='rgba(200,190,160,0.8)';ctx.font='11px monospace';ctx.textAlign='center';
      ctx.fillText('WASD/Arrows: move  \u2014  SPACE/ENTER: interact',W/2,H-7);
      ctx.textAlign='left';
    }
  }

  // ── BATTLE ──
  else if(G.mode==='BATTLE'){
    const enc=ENC_DATA[G.curEnc];
    G.battleTimer=(G.battleTimer||0)+dt;
    if(!G.battlePhase){
      G.battlePhase='dialogue';G.dline=0;G.kobeAttacks=0;G.kobePhase=0;
      G.kobeBattleX=kobeHeroX();G.battleTimer=0;G.kobeAttackPick=0;
      G.busHonkPlayed=false;
      G.mayHP=G.mayMaxHP;
      G.enemyAttackMsg='';
    }

    if(G.battlePhase==='dialogue'){
      drawBattle();
      if(G.aBtn){G.aBtn=false;G.dline++;if(G.dline>=enc.lines.length-1){
        // ENEMY ATTACKS FIRST before player can act
        G.battlePhase='enemyattack';G.battleTimer=0;
      }}
    } else if(G.battlePhase==='enemyattack_first'||G.battlePhase==='enemyattack'){
      const dmg=1;
      G.mayHP=Math.max(1,G.mayHP-dmg);
      if(G.curEnc===4&&!G.busHonkPlayed){playBusHonk();G.busHonkPlayed=true;}
      const attackMsgs=[
        ['📋 PAPERWORK AVALANCHE!','Contracts buried May!\n-1 HP'],
        ['💸 INVOICE STRIKE!','The bill hit hard!\n-1 HP'],
        ['🌧️ COLD RAIN CHILL!','Water drips from the stone.\n-1 HP'],
        ['💧 SOAPY WAVE!','Bucket splash!\n-1 HP'],
        ['📣 DIESEL KLAXON!','Horn + brakes.\nKobe\'s whole skull rattles!\n-1 HP'],
      ];
      G.enemyAttackMsg=attackMsgs[G.curEnc]||attackMsgs[0];
      G.battlePhase='enemyrecoil';G.battleTimer=0;
    } else if(G.battlePhase==='enemyrecoil'){
      drawBattle();
      if(G.battleTimer>1.2){G.enemyAttackMsg='';G.battleTimer=0;G.battlePhase='attack';}
    } else if(G.battlePhase==='attack'){
      drawBattle();
      if(G.keys['ArrowUp']||G.keys['w']) G.kobeAttackPick=0;
      if(G.keys['ArrowDown']||G.keys['s']) G.kobeAttackPick=1;
      if(G.aBtn){G.aBtn=false;G.battlePhase='koberun';G.kobeBattleX=kobeHeroX();G.kobePhase=1;G.battleTimer=0;}
    } else if(G.battlePhase==='koberun'){
      G.kobeBattleX+=W*1.4*dt;
      drawBattle();
      if(G.kobeBattleX>W-260){G.kobePhase=2;G.battleTimer=0;G.battlePhase='kobebite';}
    } else if(G.battlePhase==='kobebite'){
      drawBattle();
      if(G.battleTimer>0.6){G.kobeAttacks=(G.kobeAttacks||0)+1;G.kobePhase=3;G.kobeBattleX=kobeHeroX();G.battleTimer=0;G.battlePhase='kobereturn';}
    } else if(G.battlePhase==='kobereturn'){
      drawBattle();
      if(G.battleTimer>0.4){G.kobePhase=0;G.battleTimer=0;G.battlePhase='result';}
    } else if(G.battlePhase==='result'){
      drawBattle();
      if(G.aBtn){
        G.aBtn=false;
        G.cleared[G.curEnc]=true;
        const wasEnc=G.curEnc;
        G.curEnc=-1;G.dline=0;G.battlePhase=null;G.kobeAttacks=0;G.kobePhase=0;
        G.kobeBattleX=kobeHeroX();G.battleTimer=0;G.enemyAttackMsg='';G.kobeAttackPick=0;
        G.mayHP=G.mayMaxHP; // heal after battle
        G.cooldown=1.6;flashScreen();
        if(wasEnc===2){G.mode='CAVE';}else{G.mode='EXPLORE';}
      }
    }
  }

  // ── NPC_TALK (Gary outside) ──
  else if(G.mode==='NPC_TALK'){
    updateCamera();
    drawExtMap();drawExtNPCs();
    const ks2=G.kx-G.camX,ky3=G.ky-G.camY;
    drawKobe(ks2,ky3,G.tick,G.facing);
    drawMay(G.mx-G.camX,G.my-G.camY,G.tick,G.facing||'down');
    npcNameTag(G.mx-G.camX+2,G.my-G.camY,'May','#f8e8d8');
    npcNameTag(ks2+2,ky3,'Kobe','#d8c8a0');
    drawHUD();
    const npcLines={
      gary:[
        {sp:'Gary', tx:'(He looks up from his phone.)'},
        {sp:'Gary', tx:'Heard you are leaving today.'},
        {sp:'May',  tx:'Barcelona. Yeah.'},
        {sp:'Gary', tx:'That is incredible. For real.'},
        {sp:'Gary', tx:'Do not forget us. Well — remember\nthe good parts.'},
        {sp:'May',  tx:'Ha. Yeah. The good parts.'},
        {sp:'Gary', tx:'Go get it. 🤙'},
      ],
    };
    const nlines=npcLines[G.npcWho]||[{sp:'???',tx:'...'}];
    const nl=nlines[Math.min(G.npcLine,nlines.length-1)];
    drawDialog([nl.tx],nl.sp);
    if(G.aBtn){G.aBtn=false;G.npcLine++;if(G.npcLine>=nlines.length){G.mode='EXPLORE';G.cooldown=1.2;}}
  }

  // ── INDOOR ──
  else if(G.mode==='INDOOR'){
    moveInd(dx,dy,dt);
    G.indKX=G.indX-28; G.indKY=G.indY+6;
    if(G.cooldown<=0){
      const loc=G.indLoc;
      if(loc==='may_apt'&&mayFlatAptExitTriggered()){
        G.mode='EXPLORE';
        snapOutsideMayApt();
        G.indLoc='';
        G.cooldown=0.45;updateCamera();flashScreen();
      } else if(G.indY>310&&(loc==='house'||loc==='jo_house')){
        const ih=loc==='house';
        if(ih&&G.hasBoarding&&G.farewellDone&&!G.cabFarewellDone){
          G.mode='CAB_FAREWELL';
          G.cabFwLine=0;
          snapOutsideMayHouse();
          G.indLoc='';
          G.cooldown=0.55;updateCamera();flashScreen();
        } else {
          G.mode='EXPLORE';
          if(ih) snapOutsideMayHouse();
          else snapOutsideJoHouse();
          G.indLoc='';
          G.cooldown=0.45;updateCamera();flashScreen();
        }
      }
    }
    if(G.indLoc==='cafe'&&G.indY>290&&G.cooldown<=0){
      G.mode='EXPLORE';G.mx=G.prevMX;G.my=G.prevMY;
      G.cooldown=0.45;updateCamera();flashScreen();
    }
    // Indoor NPC interaction
    if(G.aBtn&&G.cooldown<=0){
      if(G.indLoc==='cafe'){
        const cafeStaffMidX=236;
        const sd=Math.hypot(G.indX-cafeStaffMidX,G.indY-100);
        if(sd<90){G.aBtn=false;G.mode='INDOOR_TALK';G.indNpcLine=0;G.indNpcWho='couple';G.cooldown=1.0;}
      } else if(G.indLoc==='house'){
        const gxN=256, gyN=216;
        const nearGrandma=Math.hypot(G.indX-gxN,G.indY-gyN)<102;
        if(G.hasBoarding&&!G.farewellDone&&!nearGrandma) G.aBtn=false;
        else {
          G.aBtn=false;G.mode='INDOOR_TALK';G.indNpcLine=0;
          G.indNpcWho=(G.hasBoarding&&!G.farewellDone)?'house_boarding_sendoff':(G.farewellDone?'house_revisit':'house_browse');
          G.cooldown=1.0;
        }
      } else if(G.indLoc==='jo_house'){
        G.aBtn=false;G.mode='INDOOR_TALK';G.indNpcLine=0;G.indNpcWho='jo_house';G.cooldown=1.0;
      } else if(G.indLoc==='may_apt'){
        G.aBtn=false;G.mode='INDOOR_TALK';G.indNpcLine=0;G.indNpcWho='may_apt_browse';G.cooldown=1.0;
      }
    }
    if(G.indLoc==='house')
      drawHouseInterior(G.indX,G.indY,G.tick,false,0,null,null,null,null,false,'may');
    else if(G.indLoc==='jo_house')
      drawHouseInterior(G.indX,G.indY,G.tick,false,0,null,null,null,null,false,'jo');
    else if(G.indLoc==='may_apt')
      drawMayAptInterior(G.indX,G.indY,G.tick);
    else
      drawCafeInterior(G.indX,G.indY,G.tick);
    if(G.indLoc==='may_apt'?mayFlatNearDoorPrompt():G.indY>300){
      r(W/2-80,H-50,160,26,'rgba(0,0,0,0.6)');
      ctx.fillStyle='rgba(200,190,160,0.8)';ctx.font='12px monospace';ctx.textAlign='center';
      ctx.fillText(G.indLoc==='may_apt'?'Door (corner) — step into doorway':'Walk south to exit',W/2,H-32);ctx.textAlign='left';
    }
    // Interact prompt
    r(W/2-90,H-50,180,22,'rgba(0,0,0,0.5)');
    ctx.fillStyle='rgba(200,190,160,0.7)';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText(G.indLoc==='may_apt'?'SPACE: talk    \u2199 bottom-left: exit':'SPACE/ENTER: talk  \u2193 south: exit',W/2,H-33);ctx.textAlign='left';
    G.cooldown=Math.max(0,G.cooldown-dt);
  }

  // ── INDOOR_TALK ──
  else if(G.mode==='INDOOR_TALK'){
    const sendHL=(G.indLoc==='house'&&G.indNpcWho==='house_boarding_sendoff')?G.indNpcLine:-1;
    if(G.indLoc==='house')
      drawHouseInterior(G.indX,G.indY,G.tick,false,0,null,null,null,null,false,'may',sendHL);
    else if(G.indLoc==='jo_house')
      drawHouseInterior(G.indX,G.indY,G.tick,false,0,null,null,null,null,false,'jo');
    else if(G.indLoc==='may_apt')
      drawMayAptInterior(G.indX,G.indY,G.tick);
    else
      drawCafeInterior(G.indX,G.indY,G.tick);
    const indLines={
      couple:[
        {sp:'Sadonna', tx:'MAY! Oh my god, today is the day!'},
        {sp:'Wing',    tx:'Barcelona!! We are so happy for you!'},
        {sp:'Sadonna', tx:'We already planned our visit. 😄'},
        {sp:'Wing',    tx:'Kobe is going to LOVE the beach.'},
        {sp:'May',     tx:'You two are the best. Genuinely.'},
        {sp:'Sadonna', tx:'Go!! Go!! Send photos!! ☀️'},
      ],
      jo_house:[
        {sp:'Jo', tx:'May! Shoes off — Charlie,\noff the good cushions.'},
        {sp:'Jo', tx:'I stole Grandma\'s floor plan,\nthen stole half the living room\nfor counter space.'},
        {sp:'May', tx:'Jo... this kitchen is enormous.'},
        {sp:'Jo', tx:'Island dreams on a HK salary.\nEat something before you fly.'},
        {sp:'Charlie', tx:'Woof.'},
      ],
      house_browse:[
        {sp:'Grandma', tx:'Come, sit! Let me look at you!'},
        {sp:'Grandma', tx:'Barcelona girl! So beautiful!'},
        {sp:'May',     tx:"Grandma, I'm literally the same."},
        {sp:'Grandma', tx:'You are DIFFERENT. I can see it!'},
      ],
      house_boarding_sendoff:HOUSE_BOARDING_SENDOFF_LINES,
      house_revisit:[
        {sp:'Grandma', tx:'Back already? The kettle\'s still warm.'},
        {sp:'May',     tx:'Wanted one more pass through home.'},
        {sp:'Grandma', tx:'Stay as long as you like, mei mei.'},
      ],
      may_apt_browse:[
        {sp:'May', tx:'Four boxes and a duffel.\nEverything left is just walls.'},
        {sp:'May', tx:'Barcelona tonight. Hard to believe.'},
        {sp:'Kobe', tx:'Woof.'},
      ],
    };
    const il=indLines[G.indNpcWho]||[{sp:'...',tx:'...'}];
    const ll=il[Math.min(G.indNpcLine,il.length-1)];
    if(G.indNpcWho==='house_boarding_sendoff'&&G.indNpcLine===9) drawWoof(G.indX-34,G.indY);
    else if(G.indNpcWho==='may_apt_browse'&&G.indNpcLine===2) drawWoof(G.indX-34,G.indY);
    drawDialog([ll.tx],ll.sp);
    if(G.aBtn){G.aBtn=false;G.indNpcLine++;if(G.indNpcLine>=il.length){
      if(G.indNpcWho==='house_boarding_sendoff') G.farewellDone=true;
      G.mode='INDOOR';G.cooldown=1.0;
    }}
  }

  // ── CAVE ──
  else if(G.mode==='CAVE'){
    moveCave(dx,dy,dt);
    // Kobe in cave
    G.caveHist.push({x:G.caveX,y:G.caveY});
    if(G.caveHist.length>HIST_LEN)G.caveHist.shift();
    const chi=Math.max(0,G.caveHist.length-1-DOG_DELAY);
    G.caveKX=G.caveHist[chi].x-6;
    G.caveKY=G.caveHist[chi].y+6;
    G.cooldown=Math.max(0,G.cooldown-dt);
    if(G.cooldown<=0){
      const ch=checkCaveSpecial();
      if(ch){
        if(ch.type==='enc'){
          G.curEnc=ch.id;G.dline=0;G.mode='BATTLE';G.cooldown=1.5;flashScreen();
        } else if(ch.type==='boarding'){
          G.boardingPickup=true;
          G.pickLine=0;G.mode='BOARDING';G.cooldown=1.5;flashScreen();
        } else if(ch.type==='exit'){
          G.mode='EXPLORE';G.cooldown=1.5;updateCamera();flashScreen();
        }
      }
    }
    drawCaveMap();
    // Draw Kobe + May offset by cave draw offset
    drawKobe(G.caveKX,G.caveKY+CAVE_DRAW_OFFSET_Y,G.tick,G.facing||'down');
    drawMay(G.caveX,G.caveY+CAVE_DRAW_OFFSET_Y,G.tick,G.facing||'down');
    // Cave HUD
    r(0,0,W,24,'rgba(0,0,0,0.7)');
    ctx.fillStyle=C.white;ctx.font='bold 13px monospace';
    ctx.fillText('The Cave',8,17);
    if(!G.cleared[2]){ctx.fillStyle='rgba(200,160,80,0.8)';ctx.fillText('\u26a0 Something lurks here...',120,17);}
    else if(!G.hasBoarding){ctx.fillStyle=C.gold;ctx.fillText('\u2605 Find the boarding pass!',120,17);}
  }

  // ── BOARDING PASS PICKUP ──
  else if(G.mode==='BOARDING'){
    drawCaveMap();
    drawKobe(G.caveKX,G.caveKY+CAVE_DRAW_OFFSET_Y,G.tick,G.facing||'down');
    drawMay(G.caveX,G.caveY+CAVE_DRAW_OFFSET_Y,G.tick,G.facing||'down');
    const bl=BOARDING_LINES[Math.min(G.pickLine,BOARDING_LINES.length-1)];
    if(G.pickLine===2)drawWoof(G.caveKX+4,G.caveKY+CAVE_DRAW_OFFSET_Y);
    drawDialog([bl.tx],bl.sp);
    if(G.aBtn){
      G.aBtn=false;
      G.pickLine++;
      if(G.pickLine>=BOARDING_LINES.length){
        G.hasBoarding=true;
        G.mode='CAVE';G.cooldown=1.5;
      }
    }
  }

  // ── FAREWELL ──
  else if(G.mode==='FAREWELL'){
    G.fwTimer+=dt;
    if(G.fwSub===0){
      // NPCs walk toward May — auto after 1.2s
      drawFarewellScene();
      if(G.fwTimer>1.2){G.fwSub=1;G.fwLine=0;}
    } else if(G.fwSub===1){
      drawFarewellScene();
      if(G.aBtn){
        G.aBtn=false;
        G.fwLine++;
        if(G.fwLine>=FAREWELL_LINES.length){G.fwSub=2;G.fwTimer=0;G.fwFade=0;}
      }
    } else {
      // Fade out
      G.fwFade+=dt*1.2;
      drawFarewellScene();
      if(G.fwFade>=1.2){
        G.farewellDone=true;
        G.mode='EXPLORE';
        snapOutsideMayHouse();
        G.indLoc='';
        G.cooldown=0.55;updateCamera();flashScreen();
      }
    }
  }

  // ── CAB FAREWELL (kerbside, after house farewell + boarding pass) ──
  else if(G.mode==='CAB_FAREWELL'){
    drawCabFarewellScene();
    if(G.aBtn){
      G.aBtn=false;
      G.cabFwLine++;
      if(G.cabFwLine>=CAB_FAREWELL_LINES.length){
        G.cabFarewellDone=true;
        G.mode='AIRPORT';G.airSub=0;G.airLine=0;G.airChoice=0;
        G.kobeBoltActive=false;G.kobeBoltX=148;
        flashScreen();
      }
    }
  }

  // ── AIRPORT ──
  else if(G.mode==='AIRPORT'){
    drawAirport();
    if(G.airSub===0){
      // Agent asks
      drawDialog([AIRPORT_AGENT],'Gate Agent');
      if(G.aBtn){G.aBtn=false;G.airSub=1;}
    } else if(G.airSub===1){
      // YES/NO choice
      drawDialog([AIRPORT_AGENT],'Gate Agent');
      drawYesNo(G.airChoice);
      if(G.keys['ArrowUp']||G.keys['w'])G.airChoice=0;
      if(G.keys['ArrowDown']||G.keys['s'])G.airChoice=1;
      if(G.aBtn){
        G.aBtn=false;
        if(G.airChoice===0){
          G.airSub=2;G.airLine=0; // YES path
        } else {
          G.airSub=3;G.airLine=0;G.kobeBoltActive=true;G.kobeBoltX=148; // NO path
        }
      }
    } else if(G.airSub===2){
      // YES result
      const lines=AIRPORT_YES;
      const l=lines[Math.min(G.airLine,lines.length-1)];
      drawDialog([l.tx],l.sp||'');
      if(G.aBtn){
        G.aBtn=false;G.airLine++;
        if(G.airLine>=lines.length){
          G.mode='TAKEOFF';G.toPhase=0;G.toTimer=0;
          G.planeX=60;G.planeY=340;G.cloudOff=0;flashScreen();
        }
      }
    } else if(G.airSub===3){
      // NO path — Kobe bolts
      if(G.kobeBoltActive){G.kobeBoltX+=220*dt;}
      const noLines=G.airLine<AIRPORT_NO_1.length?AIRPORT_NO_1:AIRPORT_NO_2;
      const noIdx=G.airLine<AIRPORT_NO_1.length?G.airLine:G.airLine-AIRPORT_NO_1.length;
      const nL=noLines[Math.min(noIdx,noLines.length-1)];
      drawDialog([nL.tx],nL.sp||'');
      if(G.aBtn){
        G.aBtn=false;G.airLine++;
        const total=AIRPORT_NO_1.length+AIRPORT_NO_2.length;
        if(G.airLine>=total){
          G.mode='TAKEOFF';G.toPhase=0;G.toTimer=0;
          G.planeX=60;G.cloudOff=0;flashScreen();
        }
      }
    }
  }

  // ── TAKEOFF ──
  else if(G.mode==='TAKEOFF'){
    G.toTimer+=dt;G.cloudOff+=80*dt;
    if(G.toPhase===0){
      if(G.toTimer>TAKEOFF_PAUSE_BEFORE_ROLL){
        const rollT=G.toTimer-TAKEOFF_PAUSE_BEFORE_ROLL;
        G.planeX+=rollT*68*dt;
      }
      drawTakeoff();
      if(G.planeX>W+60){G.toPhase=1;G.toTimer=0;}
    } else if(G.toPhase===1){
      G.planeX+=155*dt;
      drawTakeoff();
      if(G.toTimer>2.2){G.toPhase=2;G.toTimer=0;}
    } else if(G.toPhase===2){
      drawTakeoff();
      if(G.aBtn&&G.toTimer>4){
        G.aBtn=false;G.mode='CREDITS';G.credTimer=0;
      }
    }
  }

  // ── CREDITS ──
  else if(G.mode==='CREDITS'){
    G.credTimer+=dt;
    drawCredits();
    if(G.aBtn&&G.credTimer>4){
      G.aBtn=false;
      // Restart
      G.mode='TITLE';G.cleared=[false,false,false,false,false];
      G.hasBoarding=false;G.farewellDone=false;G.cabFarewellDone=false;G.boardingPickup=false;
      G.mx=2*TILE+8;G.my=8*TILE+8;G.kx=2*TILE-18;G.ky=8*TILE+14;
      G.hist.length=0;for(let i=0;i<HIST_LEN;i++)G.hist.push({x:G.mx,y:G.my});
      G.caveHist.length=0;for(let i=0;i<HIST_LEN;i++)G.caveHist.push({x:G.caveX,y:G.caveY});
      G.visitedHouse=false;G.visitedCafe=false;G.introLine=0;G.tick=0;G.cabFwLine=0;
    }
  }

  G.aBtn=false;
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
